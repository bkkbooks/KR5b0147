front:
  text: 要修科儀戒律鈔卷之七唐七
  hash: sha256:036d47a348a74c9ce264ca3441180fbd79b72ff40d8a8be07506acc9641f7c40
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_007-001a, image: hfl/0205/0205-020.png}
body:
  text: 三洞道士朱法滿編罪報科夫淨心直道王法所不能加動念全真地獄去來無畏若以六根取著五道輪回輕重出自身行報對皆由己分毫分不失冥府書愆三元品戒經曰天官三十六曹地水各四十二曹三官九署百二十曹曹置一考官百二十考吏一千二百考兵萬二千考士隨人生時作罪以考促之三元罪戒品目天官一宫中府十二曹地官一宫中府十四曹水官一宫中府十四曹上真禪號髙下尊卑功過儀典上真衆聖朝禮旋行功過儀典上真大聖遊宴從駕功過儀典上真總校生死圖籙功過上真總領生死命籍算録功過上真總領生死功德輕重功過上真總領鬼神功德報叙轉輪功過上真總領鬼神幽責開度功過上真總領升度死魂更生輕重功過上真總領死魂受錬安靈功過上真總領神仙得道年月品秩功過上真總領萬魔謡歌之音功過學上道不信經戒懷疑兩心之罪學上道輕慢聖文評論經典罪學上道輕慢師主違師主盟誓罪學上道毀謗師父不崇大義罪學上道竊取經書無有師宗罪學上道學無師而授弟子罪學上道誘取經書而傳弟子罪學上道得經書而無師盟戒受罪學上道受經不依經科年月傳授罪學上道受經傳授非其人罪學上道受法師門無開度之功罪學上道無功而傳授弟子罪學上道傳法宿奏不合而傳罪學上道傳經不宿奏五帝罪學上道傳經無信賤道法之罪學上道遏斷賢路自取功名罪學上道朝半八節不禮師罪學上道不修齊直之罪學上道齊直不精之罪學上道誦經越略之罪學上道旋行越次爭競罪學上道恚怒師尊父母罪學士及百姓子攻繫善人罪學士及百姓子惡口赤舌罪學士及百姓子評論師主百姓罪學士及百姓子飲酒失性罪學士及百姓子殺生隂賊罪學士及百姓子貪欲驕逸罪學士及百姓子穢濁道法罪學士及百姓子呪詛神鬼罪學士及百姓子殺害衆生罪學士及百姓子綺言兩舌不信罪學士及百姓子姧淫穢濁罪學士及百姓子盜竊人物罪學士及百姓子嫉賢妬能罪學士及百姓子背師恩愛罪學士及百姓子欺背口舌罪學士及百姓子泄露天文罪學士及百姓子毁謗經法罪學士及百姓子修經中悔罪學士及百姓子不忠於上罪學士及百姓子罔略於下罪學士及百姓子欺罔同學罪學士及百姓子欺罔百姓罪學士及百姓子口善心惡罪學士及百姓子說人過惡罪學士及百姓子輕慢三光罪學士及百姓子穢慢神鬼罪右六十條罪由天官一宮中府十二曹地官一宫中府十四曹水官一宫中府十四曹風刀考官主之天官左宫左府十二曹地官左宫左府十四曹水官左宫左府十四曹學士及百姓子𡜍妒同學罪學士及百姓子淫華妄語罪學士及百姓子貪利無厭罪學士及百姓子精祿重寶不施散罪學士及百姓子樂人寶物入已罪學士及百姓子願人傷敗流散罪學士及百姓子私畜刀杖兵器罪學士及百姓子屠割六畜殺生罪學士及百姓子射剌野獸飛鳥罪學士及百姓子燒山捕獵罪學士及百姓子捕魚張筌罪學士及百姓子金銀器食罪學士及百姓子貪樂榮祿虛正罪學士及百姓子燒敗見物罪學士及百姓子飲食投水中罪學士及百姓子貪濁滋味肥葷罪學士及百姓子貪食五辛罪學士及百姓子草書僞意罪學士及百姓子合聚羣衆罪學士及百姓子圖謀人婦女非學士及百姓子心謀國事罪學士及百姓子圖謀人家物事罪學士及百姓子粗物易人好物罪學士及百姓子交關天子侯王罪學士及百姓子干知天時星宿罪學士及百姓子火燒田野山林罪學士及百姓子斫伐樹木摘果華罪學士及百姓子與惡人交遊親近罪學士及百姓子交關流俗華競罪學士及百姓子在人中獨食之罪學士及百姓子與世間交關婚姻事罪學士及百姓子放蕩世間伎樂罪學士及百姓子面譽世人隂毀人罪學士及百姓子說人尊上善惡罪學士及百姓子泄露人隂惡私鄙罪學士及百姓子攻擊善人禍生無端罪學士及百姓子妄視人書疏司微罪學士及百姓子與女人行獨語罪學士及百姓子男女同座羣居罪學士及百姓子男女共食交錯衣物罪學士及百姓子男女教化不善罪學士及百姓子自貴憍逸罪學士及百姓子因恨報𡨚罪學士及百姓子離别家室罪學士及百姓子落子傷胎罪學士及百姓子親宗族踈異姓罪學士及百姓子毒藥投水傷生罪學士及百姓子偏愛弟子罪學士及百姓子收集人衆罪學士及百姓子投書譛世人罪學士及百姓子自許用性之罪學士及百姓子妄作忌諱罪學士及百姓子希人物事罪學士及百姓子評論師友長短罪學士及百姓子輕慢經教法言罪學士及百姓子薄賤他人老病罪學士及百姓子棄薄乞人罪學士及百姓子承勢以陵世間罪學士及百姓子阿黨所親罪學士及百姓子父母兄弟别離各居罪右六十條罪由天官左宫左府十二曹地官左宫左府十四曹水官左宫左府十四曹太陽水官考吏主之天官右宫右府十二曹地官右宫右府十四曹水官右宫右府十四曹學士及百姓子瞋恚弟子罪學士及百姓子恚責世人罪學士及百姓子不放生度死罪學士及百姓子富貴忘師罪學士及百姓子食諸天齊果忘道罪學士及百姓子信人言恚師主罪學士及百姓子唱論人惡事罪學士及百姓子笑人頑暗貧賤罪學士及百姓子勸人為惡事罪學士及百姓子禁人作善事罪學士及百姓子快人過失罪學士及百姓子去就背向罪學士及百姓子五嶽三河無簡名罪學士及百姓子汙穢五嶽三河罪學士及百姓子奪人所欲罪學士及百姓子馳騁流俗爭競世間罪學士及百姓子慶弔世間求悅衆人罪學士及百姓子仍他人功為巳德罪學士及百姓子名人飲食好惡罪學士及百姓子驚怛百姓衰厄罪學士及百姓子驚怛鳥獸促著窮地罪學士及百姓子驚怖老小之罪學士及百姓子輕陵官長有司罪學士及百姓子論議世間曲直罪學士及百姓子妄論國家衰盛罪學士及百姓子施惠追吝罪學士及百姓子籠飛鳥走獸罪學士及百姓子快人家喪禍罪學士及百姓子以𣗥剌橫人行道罪學士及百姓子拜禮鬼神之罪學士及百姓子祼形三光之罪學士及百姓子呵罵風雲雷雨罪學士及百姓子換借不遠之罪學士及百姓子罔人求榮稱罪學士及百姓子傲慢三寶輕忽天尊罪學士及百姓子謀人君長師父罪學士及百姓子勸人不孝父母兄弟罪學士及百姓子矯稱自異號為真人罪學士及百姓子信用外道術邪見罪學士及百姓子無經師說學欺詐人神罪學士及百姓子衣服盈餘弗散窮人罪學士及百姓子竊寫人經戒慢露罪學士及百姓子榮飾衣褐華麗罪學士及百姓子身不潔淨上髙座罪學士及百姓子穢慢師門不恭罪學士及百姓子師有哀憂不建齊請罪學士及百姓子棄師父追世盛罪學士及百姓子豪貴隨逐希望罪學士及百姓子師疾厄不侍省罪學士及百姓子遠危厄逐寬樂罪學士及百姓子出入道户不關啓罪學士及百姓子妄與他人入道户語罪學士及百姓子齊請不為三官遷功罪學士及百姓子自愁家門不念他窮厄罪學士及百姓子家有喪疾怨道咎師罪學士及百姓子得師經道而自稱已得罪學士及百姓子傳師道法不折送功信罪學士及百姓子八節不請師言五帝罪學士及百姓子遨遊無度縱恣罪學士及百姓子登髙望下罪右六十條罪由天官右宫右府十二曹地官右宫右府十四曹水官右宫右府十四曹太隂水官考吏主之真藏經曰盜竊人物者死入金槌獄妄取人一錢以上者死入鑊湯獄妄言綺語者死入拔舌獄因恨殺人者死入五牢大地獄貪瞋癡佷者死入大檻獄慢老欺人者死入酆都獄呪詛毒心者死入八闥獄罵詈髙聲者死入迷犁獄訾毀謗人者死入北寒獄兩舌便佞者死入火山獄持人長短者死入碓地獄好言人惡者死入黑暗獄毀善自譽者死入大劔獄自驕我慢者死入燋火獄蓄毒藥人者死入石灰獄投書譛人者死入黃泉大闥獄輕慢經教者死入障明獄謗毀聖文者死入銅火獄恃威凌物者死入炎爐獄殺生淫祀者死入沸山獄燒野山林遊獵者死入分形獄評論師長者死入磨山獄貪惜財物者死入餓鬼獄言人隂事者死入黑水獄要修科儀戒律鈔卷之七
