  text: 要修科儀戒律鈔卷之九唐九
  hash: sha256:8c6f6e21c4c9d74216f5d867deb00783af7c1650a76c1e12646ecc8c60573651
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_009-001a, image: hfl/0205/0205-082.png}
body:
  text: 三洞道士朱法滿編衣服鈔夫超出塵纍依庇法城晨夕勤修離邪歸正以潔法服乃可朝真穢黷褻裳如何謁聖然褐是日月之象帔為氣數之衣出入行來彌須貴敬一人有失能敗法徒總以澆訛從何取則今時之輩或以淨衣穢慢或以法服借人或坐地而染塵泥或藉牀而當氈席使神童而靡衛令道俗以驚嗟巾帽不整尚纍於傍人實衣猿狙以周公之服者矣千真科曰道衆威儀事在嚴整衣服清潔行可觀則生世善心諸天稱歎若形儀幔黷不喜衆心不堪就請毁辱道法即是道寶有虧斷大慈種若為衆儀人所欽慕即是道寶光顯法門有寄科曰通服中華長裙大袖與俗有别不得與白衣參服袍裘皮靴角柄食器皆須漆素而巳不繁金銀銅器若朝修行事禮謁衆聖皆威儀法服隨法位次若上清衣紫靈寶通黃三五衣絳非行事時荆黃壞色而巳不得紋綾羅錦炫惑時俗女官又不得金玉叉釧花裝粉飾一則入道通惡二則非為敬心太真科曰勿貪細滑華綺珍竒寶冠纓絡當服法服粗澀而巳淨以周身不得廣大蔽形止寒不得重厚過三通者即以施人也四極明科曰帔令廣四尺九寸以應四時之數長五尺五寸以法天地之氣裏青表紫當全二十四條裏全十五條內外三十九條以應三十九帝真之位爾者身備帝皇之章便應冠帝皇之服故也無有此服不得妄動寶經詠一句則響徹九天萬帝臨軒九真存位所應不輕單衣誦經天魔侵景萬精亂音神喪氣散死入幽泉魂𩲸艱辛不得入仙有此法服威章給玉童玉女各十二人典衛侍真不得妄借異人并犯殗穢輕慢真服五犯仙道不成十犯被考右官身死充掠刀山食火二十四獄又曰女子學上清白日升天之法受寶玉訣修行大洞皆元君夫人之位入室之日當冠元君之服披紫紗褐令用二丈四尺身袖長短就令取足當使兩袖作十六條身中二十三條合三十九條又作青紗之裙令用四十五尺作八幅幅長四尺九寸餘作襻腰分幅作三十二條此則飛青之裙也元君之服也身冠此服萬真束帶千魔駭形給玉童玉女各十二人典掌法服也無此服不得詠上經五犯伐功十犯隂官所考自然經訣曰褐背長三尺六寸三十條若鹿皮巾褐至佳皮褐無條數也登真隱訣曰上道法衣巾褐不假人衣服牀寢不共之也奉六天山川魔神者弗入其室弗享其饌勿著其衣勿冠其巾又云褐者尋字邊曷乃取日下月旨要大顯是日月字今褐則是日月衣而法二景者可以左邊為九條右邊為十條條者是間中片片耳勿數縫處世中用三十二條事無所據其長短大小隨人耳洞玄經云三十條長三尺六寸升玄威儀云廾玄法師巾褐常以服身當有淨衣朝拜時易之服身衣可於靜外拜不得入户玄都律曰若齋堂衣冠履笏不整罰油五升禮拜鈔有四一稽首二作禮三遵科四心禮夫入道修真朝謁為本登齋遜謝禮拜為先整肅一心虔恭五體從粗入妙仰賴於斯歷下登髙必資於此一明稽首本際經第四云稽首三禮右繞七匝第五云稽首作禮繞百千匝行道之時或三遍或百遍或千遍或萬遍以如前釋其三遍者論云主三還之即是三遍凡言稽首皆有三意一則激今大衆使有回向二則示有宗仰非為專擅三則法有珍貴令其寶重登真隱訣云稽首再禮者先一拜額叩地次再禮合為三拜若言再拜稽首者即先兩禮後額叩地一禮合為三禮稽首三禮是其義也書云稽開也開兩手將頭首稽留至地故云稽首經言五體投地者四支并頭為五體也升玄經云天師作禮長跪脫巾以頭頂叩地九過二明禮拜其拜之時或一或三本際經云稽首三禮是三禮升玄之衆仙登進皆禮太上一禮本際經云是諸大衆各禮一拜依位而坐一拜則表大道無二三拜明三寶圓成升玄威儀經云升玄法師朝方一禮用五篇威儀引官常行悔過東方為始玄都律云若男女官不朝拜決杖二十罰算一紀佩仙靈籙童子不朝拜決杖一十罰算百日籙生道民不朝拜考病一年因緣經云禮拜腰不申來生得背傴報千真科曰朝晡禮拜三寶得作低牀禮拜壇上若行道歎願得於地鋪席上不得於髙牀廣平牀長牀方牀上禮拜並不合宜深莊崇敬譬如見世間尊貴尚不牀上相聞何況謁聖朝真而於牀上啓白此犯冥考一百日若於路相逢無席得於地上禮地上禮時手至地得屈指指背著地不使塵汚掌心名為護淨四明心禮者又云升玄法師自可朝暮行心禮不必勞形於風塵平旦正中日入人定夜半雞鳴六時常正坐東西南北務在閉目叩齒如朝法回心隨方想禮心念口言便足感降天真矣明真科云大慈之道無量福田屈折禮拜叩頭自持以施遜謝之辭而心丹意盡精誠若到自然感徹身體疲弊不任牽曵可以心拜於天真無煩於屈折苟外飾而心怠亦勞形於禮拜耳信向之士心口相應捨香禮願已徹諸天生罪死對靡不釋然此並施於老病之儀少壯庸人聞之而不在意一則返生我慢二則無勵物三則事莊勤苦四則信敬無從黃籙簡文云禮拜之時東方九拜東南方十二拜南方三拜西南方十二拜西方七拜西北方十二拜北方五拜東北方十二拜下方十二拜上方三十二拜日宫三拜月宫七拜星宿九拜五嶽再禮此則略舉一齋衆齋並籍禮拜為務各以端坐何顯威儀定志經云叩頭自摶血出斛數亦要莫止此則施於少壯年堪之儀坐起鈔夫入道崇真次位行坐倚立須依典儀人不位分法則無緒矣千真科曰入衆坐起皆有法則若坐時男先上左腳正履近牀下次上右腳徐徐手拓牀近前下左腳取履次下右腳安徐徐而起女前右腳若入堂時先於門外端衣笏正褐帔東身斂簡存想堂中法衆如十方天尊如得道衆聖如現在國王如州縣府主若入堂時若有兩頭東西門各隨左右入若門西坐者從門西入若東坐者可開東入不得於門上交過玄都律曰道士女冠登齋起居皆當關白監齋禮法師一拜次禮經堂三拜而去還亦如法有違罰香一斤到齋堂坐不正體罰朱半兩若坐起不庠序雅步罰香一斤若行不依次弟罰香半斤若唱善聲不齊罰油五升若坐起不揖讓失儀罰香半斤律曰若齋次當法事而因起居逃遁不返為衆所紏者罰油一升若臨行道事與外人言罰香一斤若垂髮馳步罰香一斤律曰道士大洞法師不得與俗人同共食食則觸忤身神違律考病五十日金籙簡文曰登齋施安坐起威儀法師牀在西東向坐弟子南面安牀北向坐師牀在南向北坐弟子當東面安牀西向坐師牀在東向西坐弟子當北面安牀南向坐師牀在北向南坐弟子當西面安牀東向坐師弟子不得同在一面坐也又曰坐起皆以職位為上職位同者以年尊為上年同者當以仁德為上又曰坐起威儀應起之時弟子當先下西向侍師然後下座若還師先上座弟子即位處禮一拜而坐黃籙簡文曰奉經威儀出入經宿皆當朝禮經堂動靜以聞還亦然違犯考由監正曹旨教經云坐起五氣上中氣次正治次內治次别治散氣次百五十將軍籙次七十五將軍籙次十將軍籙次童子次仙官上靈官次更今若受法同以先受為上後受為下男女不得雜錯若所佩籙將軍種數同日受者當以奉道先後次登真隱訣云男女同席而坐息列罪於北玄若犯汚穢殃注三祖升玄威儀云法師不得坐人下坐除勢力所加升玄法師坐起當下本師除受道者升玄法師不得與鄙賤人交遊往來除行道遇伴升玄經云齋會行道時諸正一道士不得與上清大洞法師共同席坐上清大洞法師不得與五篇靈寶法師共同席坐及傳服飾衣物靈寶五篇法師復不得與升玄內教法師共同席坐盟威法師喪服儀云受法從下之髙各有次位受治籙老君自然五法中盟大盟上清即以上清為極不見出升玄之服相與承用升玄服制三月大盟上清並服一期若論服之多少足明上下可知若據升玄一經獨稱髙極耳監齋鈔夫登齋就食必須謹節啜羮把碗亦備威儀執筋捉匙皆須俯仰升玄經云太上勑陵陽監厨視食有十事一念道恩二念師恩三當念衆為良福田四當念主人賞别真偽能供賢善五當自慶得在僚𨽻備充道流六當念食主人意重勿令衆人輕説美惡嫌擇不善七者主人若設非法之食不得令前八者若衆中有求非法之食即便黜遣不預食例九者上下共相顧望務盡庠序十者無畏後食當有增減千真科曰居常齋厨下監厨一人先自檢校厨頭果菜調和生熟氣味並令得所次看日時圭影天隂取漏刻正齋時齋時至巳鳴鍾召食各送食器於齋堂量坐處位次安置斂鍾訖行道歎願歎願竟各坐定矣行水一遍然始就食尊卑得緒前下先師柈監厨人長跪擎柈於先師座前節衆人鳴磬子一下座頭大德祝曰建齋為道真為道種道父道母真人神人仙人聖人或共為道同共飲食長生無極竟柈下先師座前次下齋官食行食人低聲各唱果菜飯食名示衆齋人各捧器物承受若不須者勿取大德顧望看食通至下周遍竟節衆人鳴磬子一下云請能食大衆安庠正坐無語無笑以就食食時亦不鳴唇亦無啜欱之聲亦不咯唾亦不申聲吐氣亦不驚匙打筯上座緩食行食之時事事三過從上次第行食訖從下收上行食時至是時應受非時不得輒索齋欲了斂取衆生飯散與衆生非監厨人不得向厨下有所科索飲食來不及齋即須下堂食若強入齋堂即名觸食衆食未了食飽輒起即名驚座觸衆若自居常齋無先師柈即無先師祝即有出衆生祝食了行飲一遍次行水一遍各收食器竟節衆人鳴磬一下唱曰齋食巳竟各隨竟下息大德乃以次捧食器出堂歸房盥漱監厨人檢校不得一人不出若犯一條對衆各罰二十禮若應俗人齋供坐起受食並同唯受果不得有受有不受俗人恐生諫擇之意但總受之食竟餘果並安面前節衆人鳴磬子一下唱曰白大衆齋餘長食充主人無礙用同者默然不同者説三唱訖齋官或有父母師主老病得取北餘果即起白云某甲有父母師主老病令將某果歸家餉遺上座大德答云好將去若不此者並令主人收充家中無礙用或問日齋時合出衆生飯不答曰棄賢世界初開元始命行道真人行教為主遍嘗百草以得五穀活於人一切餓鬼無種植功於齋之次各出飯七粒答真人德施與一切衆生名為神農飯亦名衆生飯一切衆生得此飯一粒能飽千日出生飯祝三一曰今日是吉日齋戒向太上中食天行厨主人福無量二曰二玄上道四極清靈太一帝君百神安寧受糧三宫灌溉脾靈上饗太和餐味五馨魂胎之命七液流停百關通和五臟華明雙皇合景飛行上清三曰勤修大道法精心感太冥真降魔魅却衆祅皆滅形七祖生南宫兆身登上清福既無不普此食施衆生喫糜粥祝二一曰今日清淨服食仙糧行香喫粥壽命延長二曰乾元亨利貞身為入法王糜粥入腹五臟清涼漱口祝曰楊枝潄口眼目明好願得一枝供養大道道在一樹多葉多香願得一枝供養十方升玄經曰中後不得食有榖氣物有穀氣者不得以近口水玉脂石松术黃精雲英靈飛散枸杞等藥食無時不在禁例旨教經曰早旦喫粥日中一食自是之後水不過齒千真科曰若齋食時有五事一先當步圭馭影二則鳴鐘集衆三則行水洗淨四則打磬就食五則説先師食祝若不為此五事非人淨齋名為盜食科曰諸入齋人每有常科若先約三斗不可加減減為犯盜多取亦然若行食時果菜已上並不可長取若意貪長取此亦犯盜若行食時上座須量下座須用多少不可過取升玄經云上下共相顧望科曰道法平等不間親踈亦無貴賤同處一衆護惜無偏若人人作情來求輒與此不存衆衆即破壞各冝愼之科曰若是齋時俗人來乞食者監厨之人即須借問能齋以不若能齋與食若不能齋深示因果使知罪福非為吝惜欲令返悟謹守道法是第一慈若不示語衆生得罪科曰住立道場皆須衆食登齋應供十方共同擊磬鳴鐘召集法衆非是齋人不預斯食同建福善道俗無遮限客閉門衆所同醜或有問者食則有限客乃無遮既不神通何能供給答曰主客之人遞互為作本供既少客數又多聽可均分減口讓哺此是人情勿冝杜絶科曰將常住食以私餉遺及以歸私房者準盜論科曰常住之物十方共用遞互相付百代常行不可當時任意取用不得共制乃自用意分次歸私並犯五逆罪科曰盜十方齋供衆物或為頭首私自入己入火坑獄萬劫方出更入酆都六十年考長為餓鬼食禁忌鈔夫欲安身先資食息雖為輔益五臟亦能患害六腑若依禁忌可尊生矣老君養身經云人飲食愼勿伏食甚熱食勿令汗液流入食中傷人人食冷勿令齒痛食熱勿令灼唇食畢當摩腹三百除百病諸水銀不得近牙齒發斷腫善落齒諸礬石不生入藥食之破心肝諸桂不可日日嚼食之損骨壞筋諸空腹不用見臭尸尸氣入脾舌上白膜起口常臭宜飲酒見之觸寒未解食熱成剌風諸飽食沐髮作頭風銅器蓋食汗入食中發惡瘡內疽熱食汗出勿洗面失顔色及覺面上如蟲行飲水勿急咽久成氣病及水瘕瘕者癖也飽食勿即卧久作氣病令背疼傷飢卒飽反成心癡及食癖飽食走馬久成心瘕飲水走傷心飽久成心痛飽食太走久成氣病諸山水土中出泉流者不可久常食作癭病食後必動搖以通調百脈醎傷筋酸傷骨苦傷心皆勿多食大渴氣不行大飽氣不藏勿生食害腸胃冷食傷膀胱大食百脈閉塞食熱傷腸食冷傷胃酸密勿多食泄下向水漿不見影勿飲桃味酸多食令人有熱杏味酸多食傷筋骨損人年梨味苦令人寒中金瘡及産婦勿食櫻桃味甘調中益脾氣蒲萄味甘治腸間水調中利小便作酒長飲主利水道薤味辛利病人除寒熱搗之塗金瘡除熱去水氣苜蓿味甘可久食利人蓼味辛芥味辛除腎邪氣久食令人寒大麥味酸食之令人多熱蕪荑味辛除邪久食調五臟殺長蟲小麥味甘下熱除腸熱稻米味甘令人多熱大豆令身重多熱蕪菁一名羅伏味苦利五臟輕身益氣要修科儀戒律鈔卷之九
