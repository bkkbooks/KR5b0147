body:
  text: 三洞道士朱法滿編齊名鈔夫入靜登真要資齊戒假其形外之法以暢心內之儀度人經云天地運終亦當修齊行香誦經星宿錯度日月失昏亦當修齊行香誦經四時失度隂陽不調亦當修齊行香誦經國主有災兵革四興亦當修齊行香誦經疫毒流行兆民死傷亦當修齊行香誦經師犮命過亦當修齊行香誦經夫齊戒誦經功德甚重上消天災保鎮帝王下禳毒害以度兆民生死受賴其福難勝聖紀經云齊有六種第一上清齊有二法一者絶羣獨晏靜氣遺形二者清壇肅侣依太真儀格先拔九玄次及家門後及己身第二靈寶齊有六法一曰金籙齊救度國王二曰黃籙齊拔度祖世三曰明真齊懴悔九幽四曰三元齊首謝犯科五曰八節齊懴洗宿新之過六曰自然齊為百姓祈福第三洞神齊精簡為上絶塵期靈第四太一齊以恭肅為首第五㫖教齊以清素為貴第六塗炭齊以勤苦為功以此諸齊目自古至今儀格甚重時移代異不無詳略於靈寶齊中或為半景半景之齊即是宿啓宿啓齊無言功唯只一時兩時懴悔亦不三時上香既闕步虛亦略禮經一節或小小齊中三歎願隨時去取逐便製儀既非大集心逹而已齊月鈔三元品戒云正月天官檢校之月七月地官檢校之月十月水官檢校之月此三月並可長齊度人經云正月長齊為上世亡魂七月長齊以為巳身十月長齊安鎮國𧙓明真科曰正月三月五月七月九月十一月一年六齊月㫖教經云此六齊月上三天令天帝太一使者司察天下人過失此日能齊令除十苦拜謁太上上清八道祕言經云正月三月四月六月七月八月九月十月十一月此九月九真齊月齊日鈔玄都六獻經曰正月十五日天官校戒上元齊日七月十五日地官校戒中元齊日十月十五日水官校戒下元齊日此三日能齊三官勒名善簿皇人本行經云月中三齊一日十五日二十九日乃可清齊上清飛玄經曰西王母常以正月二月四月六月七月八月九月十一月十二月一年十月月三日五日九日十五日二十五日一月五日清齊攝心元始錫禪西元九靈上真仙母給九色鳳衣鳳雲之舄神鳳紫輪飛行羽蓋二十四乘令百姓子男女人至此日能清齊誦念隨心獲果去三千之重罪契九天而受福聖紀經云正月七日名舉遷賞會七月七日名慶生中會十月五日名建生大會右三會之曰三官考核功過依日齊戒呈章賞會以祈景福又云五臘日正月一日名天臘五月初五日名地臘七月七日名道德臘十月一日名民歲臘十二月節日名王侯臘五臘通三元名八解日皆可設淨供建齊求福兼祀先亡名為孝子得福無量餘日名為淫祀有罪明真科曰月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日名為十直齊㫖教經曰一日北斗下八日北斗司殺鬼下十四日太一使者下十五日天帝下天帝下者日月星宿諸官俱下十八日天一下二十三日太一八神使者下二十四日北辰下二十八日下太一下二十九日中太一下三十日上太一下太一下者日月五星二十八宿璇璣玉衡七星北斗司命司録司罰司殺大聖尊神妙行真人天帝大王俱下當此之日天神地祇莫不傾悚周行天下伺人善惡其日有執心精進不違經教親敬守戒誦經行道遠宣法教太一歡喜益其𥮅祿度著左契刻名玉籙拜為真人其日若殺生詐欺淫盜罵辱道士訾毀經教太一大怒減其𥮅祿度著右契下名三官稱為罪人若甲子日太一遣中臺大使下八節日太一八神下此日並攝齊太一歡悅庚申日身中伏尸上言人罪過本命日受法之身吏兵上天計人功失並須攝齊三皇內文曰甲子日天皇直官下以夜半時甲戌日天皇直官下以黃昏時甲申日地皇直官下以晡時甲午曰地皇直官下以日中時甲辰日人皇直官下以食時甲寅日人皇直官下以平旦時右天官下直五嶽四瀆之神各依方列位科察喜惡言功記過無不上聞兆當以其日修齊定籙南昌丁卯日天皇直官下以日出時丁丑日天皇直官下以雞鳴時丁酉日地皇直官下以日入時丁亥日地皇直官下以人定時丁未日人皇直官下以日昳時丁已日人皇直官下以禺中時右六丁日是三皇之隂神日也依日持齊五嶽真人各遣五神營衛記名仙籙也齊時鈔千真科曰齊時先步圭取影天隂日以水刻分時皇人本行經曰齊依時不依時法先竪尺圭圭上為尺寸於中庭依二十四氣取圭影之長短以為法焉立春後影長六尺五寸以為時五尺六寸為非時雨水後影長六尺以為時五尺二寸為非時驚蟄後影長五尺五寸以為時四尺七寸為非時春分後影長五尺以為時四尺二寸為非時清明後影長四尺五寸以為時三尺七寸為非時榖雨後影長四尺以為時三尺三寸為非時立夏後影長三尺五寸以為時二尺七寸為非時小滿後影長三尺以為時二尺二寸為非時芒種後影長二尺五寸以為時一尺七寸為非時夏至後影長二尺以為時一尺二寸為非時小暑後影長二尺五寸以為時一尺七寸為非時大暑後影長三尺以為時二尺二寸為非時立秋後影長三尺五寸以為時二尺七寸為非時處暑後影長四尺以為時三尺二寸為非時白露後影長四尺五寸以為時三尺七寸為非時秋分後影長五尺以為時四尺二寸為非時寒露後影長五尺五寸以為時四尺七寸為非時霜降後影長六尺以為時五尺二寸為非時立冬後影長六尺五寸以為時五尺七寸為非時小雪後影長七尺以為時六尺二寸為非時大雪後影長七尺五寸以為時六尺七寸為非時冬至後影長八尺以為時七尺二寸為非時小寒後影長七尺五寸以為時六尺七寸為非時大寒後影長七尺以為時六尺二寸為非時皇人曰諸善男女持齊不失節度童子記名天官簿中若犯戒失度為地官所考罰法師鈔玄都律云夫齊者正以清虛為體恬靜為業謙卑為本恭敬為事戰戰兢兢如履氷谷肅肅栗栗如對嚴君至經句處起禮拜當一心稱善隨意願念唯令丹苦必蒙感應今以建齊之家非不用意應赴之者多不存法特由大德我慢使下訛怠鈔集此律略示恭勤自然訣下曰夫感天地致羣神通仙道洞至真解積世罪滅凶咎却怨家修盛德治疾病濟一切物莫近乎齊金籙簡文曰登齊當舉髙德法師一人都講一人監齊一人侍經一人侍香一人侍燈一人明日行道各典所署師一人廣須宣令太真科曰若就齊戒儀大德之人應當前行前坐約語徒衆必使齊整勿使主人有所嫌鄙或各爭異論無有畏忌非唯道俗賢善同惡亦乃十方大聖冥鑒為罪招殃各自己受太真科曰作齊之家請清廉道士患無多耳請人不限於數令不篤信者聞之生於歸敬自積福德非齊不濟然清廉之人實堪歸敬貪淫之輩人我甚髙就請應物恆希先首設所簡選曽不責躬為建福家作大患害能自退省是稱道子金籙簡文曰建齊之家未至一宿當自沐浴灑掃內外丁勑大小齊等一心太真科曰齊官宿到悉香湯沐浴畢俱入法堂宣示科戒威儀庠序有違一刑律論科曰不從法師各私用意二刑論科曰不及宿啓不得入齊今時之人明朝尚闕行道今夜宿啓豈為存懷或貪求外緣或房中睡卧分簡受職即有闕如明日行香乃生推注當由法師夜不宣告臨事沸亂喧爭一則冥府書愆二則交違法事三則不生敬信四則福善無憑論云為不善於顯明之中者人得而誅之為不善於幽暗之中者鬼得而誅之明乎人明乎鬼然後能獨行老君云天網恢恢踈而不失既當主人禮供豈得坐致愆殃幸各思之令從已悟太真科曰齊官具受宣告不得與外人交言二刑論科曰齊日清靜存神念道標門斷客內外禁隔千真科曰建齊之家未至三日灑掃內外於門首竪一長幡標門使人客知之葷辛之侣不敢至家敬信之人來乃恭肅都講鈔夫行齊引衆唱說為先知去就之儀定早晚之節敷齊威儀曰都講其職也克明正典詮舉職任至如行道時節禮誦容止先鳴法鼓次引朋衆法則儀敬慿唱說夫以建齊行事都講要用明能一則參詳法師二則知主人齊意三則先定時節四則擊鼓鳴鐘若參詳法師者先取法師進止可不進退要共評論不得自出一意專制法徒若知主人齊意者若主人吉樂齊威儀恱衆若主人疾厄齊勤苦為務先定三時六時行道之數金籙簡文云朝中日入人定夜半雞鳴為六時行道若三時者朝中人定而巳太真科曰兒為人告齊皆三時下息苦救急謝罪消災請福皆晝夜誦詠祝願不得卧息若積日疲困分時下息讀經說戒晝夜不輟行道齊同不得虧闕若齊官病則啓告衆則退出齊堂齊所嚴肅不得養痾養痾别房勿喧齊所若幸堪在齊登堂整肅不得低睡密相督勵不須行罰行罰參差乖祈感之至平常修習用黜罰之科使內外齊同今攺昏見曉師不得濫罰弟子弟子受罰不得有辭所罰必謬許有薄訴達心而巳不得苦言苦言怨己師與弟子同五行論若三時行道當中後下息至晡時夜半下息至雞鳴餘皆上講誦經若六時行道當中後下息至晡時黃昏後下息至人定夜半後下息至雞鳴三時下息餘時皆上講誦經使心目同注意念玄虛舉動施為每依儀典若擊鼓鳴鐘招仙集聖法鼓有二一則叩齒二則金鐘玉磬一則叩齒者威儀云先鳴法鼓次引朋衆然鳴法鼓或三通七通九通十通十二通二十四通三十六通四十九通七十二通八十一通隨時所用老君經序云叩齒三咽液三也升玄經云即便叩齒七通為七曜道明當發故生神章云叩齒九通升玄又云叩齒十二通三噓又云叩齒二十四通度人經云叩齒三十二通上聞三十二天升玄經云天師西向叩齒七七四十九通太上東向叩齒七十二通又云太上叩齒九九八十一通上清八道祕言經曰叩齒之法左左相叩名曰折制天鐘右右相叩名曰震椎天磬中央上下對相叩名曰嚴鳴天鼓若卒遇凶惡不祥當折天鐘三十六通若經凶辟邪威神大祝當椎天磬若存思念道致真招靈當鳴天鼓叩齒雖一其實有三故凶惡而畏天鐘之響山神而攝天磬之洞招神而肅天鼓之震矣宫商有節希微內感不可以一概而求不可以偶然而合召也酆都記云鮑𦔳濟北人年四十餘亦無道術中風至口面齒常自啄年得一百二十七後遇大水隨長壽河而死北帝數遣殺鬼取之鬼不敢近鬼官問其故殺鬼答云此人乃多方術以制於我常行叩齒鳴打天鼓以警身神神不得散鬼氣不得入也二則鐘磬者太真科曰齊堂之前經臺之上皆懸金鐘玉磬鐘磬依時鳴行道上講悉先叩擊非唯警戒人衆亦乃感動羣靈神人相關同時集㑹弘道濟物盛德交歸又曰法身叩鐘清嚴束帶諦心存神與已相見調槌正擊漸微至著數十二二十四三十六隨衆多少皇人本行經曰鳴鐘正法服先至鐘所手執鐘槌祝曰圓槌震法鐘流聲遍十方入下通長夜登髙響玉房九幽聞離苦七祖上仙堂鳴三下法隂數生於二成於十爪彈十下發長牙之音陽數生於一成於九次引九槌震瓊瑶之響三下者上聞清微禹餘大赤之三天中應無色色欲之三界下警地獄餓鬼畜生之三徒三天三界三徒三三為九故九槌也斂長法斂長二十七槌上九通九天之道君中九覺九宫之真帝下九招九幽之苦魂連三下合四九三十六槌上聞三十六天帝中應三十六部尊經下徹三十六地户若得法左仙童記善若失法右玉女記惡明各詳之犯科冥考玄都律曰若都講行事不唱自罰香一斤今出家之人不依節制鳴鐘信任在下師主又無儀非但依帔鞋履不端亦乃遲疾之節失度一則人聞可醜二則龜鏡失常寫圖樣以示人庶當來而可監齊鈔夫道因聖顯福寄人弘若不紏彈無遵典憲敷齊威儀云篤勵虧怠彈紏愆過不偏不黨無隱無濫秉執憲章務存允愜然所為法事要假其人若不切磋何取成例只可依法勿惜人情升玄經云監齊十事一者令設供之家先齊前三日投辭於法師陳說所願并修所請齊人姓名道位多少法師受辭即對辭主騰辭上剌請監齊官屬二者令供主還家更報所請齊人云巳投辭上剌訖冝各潔淨勿與俗人共同牀座莫作諸惡不善之行此至齊竟保全身口意一如太上威儀之令三者令供主不得盜鬼神之餘物及市買熟食以供齊人四者令供主見有異人聞齊欲來聽經者不得計飲食之費遏截不聽五者令供主上剌訖還家便於靜室齊堂燒香明燈為監齊官屬當下監察六者供主不得辭託齊事不供當賔客七者當令供主解齊布施隨家豐儉一錢一縷亦足表心八者令供主不得緩帶裙裳如給使法九者令供主不得迎師有人去便不送是去就異心皆思忘義十者不得令供主因解齊之餘以解神福是名貪利惜費無恭肅心玄都律云主人內外不預相檢勑音聲髙厲者罰油五升若主供辦諸物有闕罰油二升若執紏見過不彈私隱罰油六升若受闕不啓上𥙷罰油三升若齊人妄言綺語論及私鄙罰香一斤油五升朱三兩律曰若有犯威儀彈紏不伏者當啓告三寶退出齊次若彈紏不實以罪罪之若上座法師自覺有失須收愆送失如不自收監齊准法彈紏若法事有虧從一至三監齊依事罰紏若從三以上斷功削除宣示同學不得容在法座若監齊容縱不紏亦與同罪侍香鈔夫水以洗塵香能破穢假茲百和託信三清敷齊威儀云侍香其職也炎爐肅整芳馨恆然使畢夜煙流終朝火續此法事之所先宜晨昏而勿怠本際經云散天香花猶如雪下繽紛芳馥恱樂衆心又云燌百和反風名香散萬種天樹寶花衆篇經云飛香八湊流電揚烽又云金童揚香月宫散花定志云百和寶香不燌自薰升玄經云香氣苾芬薰於八方五符序云然百和之香以破穢又云燒香醮五帝看流芳所歸氣正上中央黃帝先降氣東流者青帝先降氣南流者赤帝先降氣西流者白帝先降氣北流者黑帝先降玄都律曰誥朝拜竟其日燒香災殃自滅違律罰𥮅一紀玄都律云若翻覆香火罰香二斤若侍香煙中絶罰油四斤若臨燒香突行罰油二斤若行香不洗手漱口罰油二斤登真隱訣曰香者天真用茲以通感地祇緣斯以達言是以祈念存注必燒之於左右特以此煙能照玄達意亦有侍衛之者宣讃辭誠故也又云建城縣及髙陵並有然石一燒令赤便永不糜耗得一丸以燒香實為省要侍燈鈔夫就齊入靜燈燭居先朗耀八門光暉九夜續明之功既舉長更之福可修敷齊威儀云侍燈其職也蘭釭晚映係明西日灼爍壇場照灼清夜若遇權停值風暫息賔主參詳與時興廢幸勿抑斷用虧成典登真隱談曰真人攝日暉以通照役月精以朗幽四極明科曰立春春分之日然九燈於中庭立夏夏至然三燈立秋秋分然七燈立冬冬至然五燈本命之日然十二燈夜半露出燈下春則向東夏則向南秋則向西冬則向北本命則向太歲叩齒二十四通祝曰髙上太真萬聖帝皇五帝玉司總仙監真今日吉良八節開陳陽絶隂考絶滅九隂於今永始拔釋七玄免脫火鄉永離刀山三塗五苦不纍我身得同天地長保帝晨五願八㑹靡不如言畢解巾叩頭百二十過當額向地而叩竟復巾仰天心念我身今日上享天恩賜友形骸受生飛仙因仰咽二十四氣止如此三年宿愆並除身與真同不履五苦脫過火鄉尅得真人遊宴玉房可謂妙訣愼勿輕宣金籙簡文曰拔度生死建齊於中庭土壇縱廣上壇二丈四尺下三丈二尺開四面四角上下十門門廣五尺闌纂標榜法天象地壇中央安一長燈令長九尺上然九燈每令光明上照九天下照九幽於門外四面各安九燈合三十六燈以圍壇金籙簡文云入堂靜明燈訖向燈三拜呪曰正一陽光熖上朱煙開光童子一十二人洞照一宅及得我身百邪摧落殺鬼萬千光明朗徹通真達靈升入無形與道自然畢退出堂滅燈呪曰玄隂閉光長燈續明太陽巳朗八威開清燈通太隂光附景生日月二真與我合并便滅火本命上然燈以照七𩲸行年上然燈以照三魂太歲上然燈以照一身大墓上然燈以照朽骸小墓上然燈以照太隂堂前然七燈以照七世中庭然九燈以照九幽俠門然二燈以照宫宅地戶然二十四燈以照二十四生氣八方然八燈以照八卦中央然九燈以照九宫天門然十燈以照十方然二十八燈以照二十八宿然三十二燈以照三十二天然五燈以照五嶽金籙簡文曰然燈威儀功德至重上照諸天下明諸地八方九夜並見光明侍燈之官勤為用意每令燈光竟夕明真齊儀曰於中庭然九燈於竿上以照九幽壇四面各然九燈合三十六燈露經中庭巡繞九幽燈燒香行道禮懴也黃籙簡文曰然九十神燈明真科曰若有災急可丹書五篇真文於中庭五方安又上金五兩仆五龍以鎮五篇五色紋繒之信以鎮五帝春則然九燈亦可九十燈亦可九百燈夏則然三燈亦可三十燈亦可三百燈秋則然七燈亦可七十燈亦可七百燈冬則然五燈亦可五十燈亦可五百燈四季之月則然十二燈亦可百二十燈亦可千二百燈中央安一長竿上然九燈玄都律曰若侍燈火中滅罰香一斤若翻燈燭罰油五升要修科儀戒律鈔卷之八
