body:
  text: 三洞道士朱法滿編齋名鈔夫入靜登眞要資齋戒假其形外之法以暢心内之儀度人經云天地運終亦當修齋行香誦經星宿錯度日月失昏亦當修齋行香誦經四時失度隂陽不調亦當修齋行香誦經國主有災兵革四興亦當修齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師犮命過亦當修齋行香誦經夫齋戒誦經功德甚重上消天災保鎭帝王下禳毒害以度兆民生死受頼其福難勝聖紀經云齋有六種第一上清齋有二法一者絶羣獨晏靜氣遺形二者清壇肅侣依太眞儀格先拔九玄次及家門後及己身第二靈寳齋有六法一曰金籙齋救度國王二曰黄籙齋拔度祖世三曰明眞齋懴悔九幽四曰三元齋首謝犯科五曰八節齋懴洗宿新之過六曰自然齋爲百姓祈福第三洞神齋精簡爲上絶塵期靈第四太一齋以恭肅爲首第五㫖教齋以清素爲貴第六塗炭齋以勤苦爲功以此諸齋目自古至今儀格甚重時移代異不無詳略於靈寳齋中或爲半景半景之齋即是宿啓宿啓齋無言功唯只一時兩時懴悔亦不三時上香旣闕歩虚亦略禮經一節或小小齋中三歎願隨時去取逐便製儀旣非大集心逹而已齋月鈔三元品戒云正月天官檢校之月七月地官檢校之月十月水官檢校之月此三月並可長齋度人經云正月長齋爲上世亡䰟七月長齋以爲巳身十月長齋安鎭國𧙓明眞科曰正月三月五月七月九月十一月一年六齋月㫖教經云此六齋月上三天令天帝太一使者司察天下人過失此日能齋令除十苦拜謁太上上清八道祕言經云正月三月四月六月七月八月九月十月十一月此九月九眞齋月齋日鈔玄都六獻經曰正月十五日天官校戒上元齋日七月十五日地官校戒中元齋日十月十五日水官校戒下元齋日此三日能齋三官勒名善簿皇人本行經云月中三齋一日十五日二十九日乃可清齋上清飛玄經曰西王母常以正月二月四月六月七月八月九月十一月十二月一年十月月三日五日九日十五日二十五日一月五日清齋攝心元始錫禪西元九靈上眞仙母給九色鳳衣鳳雲之舄神鳳紫輪飛行羽蓋二十四乗令百姓子男女人至此日能清齋誦念隨心獲果去三千之重罪契九天而受福聖紀經云正月七日名舉遷賞會七月七日名慶生中會十月五日名建生大會右三會之曰三官考覈功過依日齋戒呈章賞會以祈景福又云五臘日正月一日名天臘五月初五日名地臘七月七日名道德臘十月一日名民歳臘十二月節日名王侯臘五臘通三元名八解日皆可設淨供建齋求福兼祀先亡名爲孝子得福無量餘日名爲淫祀有罪明眞科曰月一日八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日名爲十直齋㫖教經曰一日北斗下八日北斗司殺鬼下十四日太一使者下十五日天帝下天帝下者日月星宿諸官俱下十八日天一下二十三日太一八神使者下二十四日北辰下二十八日下太一下二十九日中太一下三十日上太一下太一下者日月五星二十八宿璇璣玉衡七星北斗司命司録司罰司殺大聖尊神妙行眞人天帝大王俱下當此之日天神地祇莫不傾悚周行天下伺人善惡其日有執心精進不違經教親敬守戒誦經行道遠宣法教太一歡喜益其𥮅禄度著左契刻名玉籙拜爲眞人其日若殺生詐欺淫盗罵辱道士訾毀經教太一大怒減其𥮅禄度著右契下名三官稱爲罪人若甲子日太一遣中臺大使下八節日太一八神下此日並攝齋太一歡悅庚申日身中伏尸上言人罪過本命日受法之身吏兵上天計人功失並須攝齋三皇内文曰甲子日天皇直官下以夜半時甲戌日天皇直官下以黄昏時甲申日地皇直官下以晡時甲午曰地皇直官下以日中時甲辰日人皇直官下以食時甲寅日人皇直官下以平旦時右天官下直五嶽四瀆之神各依方列位科察喜惡言功記過無不上聞兆當以其日修齋定籙南昌丁卯日天皇直官下以日出時丁丑日天皇直官下以雞鳴時丁酉日地皇直官下以日入時丁亥日地皇直官下以人定時丁未日人皇直官下以日昳時丁已日人皇直官下以禺中時右六丁日是三皇之隂神日也依日持齋五嶽眞人各遣五神營衛記名仙籙也齋時鈔千眞科曰齋時先歩圭取影天隂日以水刻分時皇人本行經曰齋依時不依時法先竪尺圭圭上爲尺寸於中庭依二十四氣取圭影之長短以爲法焉立春後影長六尺五寸以爲時五尺六寸爲非時雨水後影長六尺以爲時五尺二寸爲非時驚蟄後影長五尺五寸以爲時四尺七寸爲非時春分後影長五尺以爲時四尺二寸爲非時清明後影長四尺五寸以爲時三尺七寸爲非時榖雨後影長四尺以爲時三尺三寸爲非時立夏後影長三尺五寸以爲時二尺七寸爲非時小滿後影長三尺以爲時二尺二寸爲非時芒種後影長二尺五寸以爲時一尺七寸爲非時夏至後影長二尺以爲時一尺二寸爲非時小暑後影長二尺五寸以爲時一尺七寸爲非時大暑後影長三尺以爲時二尺二寸爲非時立秋後影長三尺五寸以爲時二尺七寸爲非時處暑後影長四尺以爲時三尺二寸爲非時白露後影長四尺五寸以爲時三尺七寸爲非時秋分後影長五尺以爲時四尺二寸爲非時寒露後影長五尺五寸以爲時四尺七寸爲非時霜降後影長六尺以爲時五尺二寸爲非時立冬後影長六尺五寸以爲時五尺七寸爲非時小雪後影長七尺以爲時六尺二寸爲非時大雪後影長七尺五寸以爲時六尺七寸爲非時冬至後影長八尺以爲時七尺二寸爲非時小寒後影長七尺五寸以爲時六尺七寸爲非時大寒後影長七尺以爲時六尺二寸爲非時皇人曰諸善男女持齋不失節度童子記名天官簿中若犯戒失度爲地官所考罰法師鈔玄都律云夫齋者正以清虚爲體恬靜爲業謙卑爲本恭敬爲事戰戰兢兢如履氷谷肅肅慄慄如對嚴君至經句處起禮拜當一心稱善隨意願念唯令丹苦必蒙感應今以建齋之家非不用意應赴之者多不存法特由大德我慢使下訛怠鈔集此律略示恭勤自然訣下曰夫感天地致羣神通仙道洞至眞解積世罪滅凶咎却怨家修盛德治疾病濟一切物莫近乎齋金籙簡文曰登齋當舉髙德法師一人都講一人監齋一人侍經一人侍香一人侍燈一人明日行道各典所署師一人廣須宣令太眞科曰若就齋戒儀大德之人應當前行前坐約語徒衆必使齊整勿使主人有所嫌鄙或各爭異論無有畏忌非唯道俗賢善同惡亦乃十方大聖冥鑒爲罪招殃各自己受太眞科曰作齋之家請清㢘道士患無多耳請人不限於數令不篤信者聞之生於歸敬自積福德非齋不濟然清㢘之人實堪歸敬貪淫之輩人我甚髙就請應物恒希先首設所簡選曽不責躬爲建福家作大患害能自退省是稱道子金籙簡文曰建齋之家未至一宿當自沐浴灑掃内外丁勑大小齋等一心太眞科曰齋官宿到悉香湯沐浴畢俱入法堂宣示科戒威儀庠序有違一刑律論科曰不從法師各私用意二刑論科曰不及宿啓不得入齋今時之人明朝尚闕行道今夜宿啓豈爲存懷或貪求外縁或房中睡卧分簡受職即有闕如明日行香乃生推注當由法師夜不宣告臨事沸亂喧爭一則㝠府書愆二則交違法事三則不生敬信四則福善無憑論云爲不善於顯明之中者人得而誅之爲不善於幽闇之中者鬼得而誅之明乎人明乎鬼然後能獨行老君云天網恢恢踈而不失旣當主人禮供豈得坐致愆殃幸各思之令從已悟太眞科曰齋官具受宣告不得與外人交言二刑論科曰齋日清靜存神念道標門斷客内外禁隔千眞科曰建齋之家未至三日灑掃内外於門首竪一長旛標門使人客知之葷辛之侣不敢至家敬信之人來乃恭肅都講鈔夫行齋引衆唱說爲先知去就之儀定早晩之節敷齋威儀曰都講其職也克明正典詮舉職任至如行道時節禮誦容止先鳴法鼓次引朋衆法則儀敬慿唱說夫以建齋行事都講要用明能一則參詳法師二則知主人齋意三則先定時節四則擊鼓鳴鐘若參詳法師者先取法師進止可不進退要共評論不得自出一意專制法徒若知主人齋意者若主人吉樂齋威儀恱衆若主人疾戹齋勤苦爲務先定三時六時行道之數金籙簡文云朝中日入人定夜半雞鳴爲六時行道若三時者朝中人定而巳太眞科曰儿爲人告齋皆三時下息苦救急謝罪消災請福皆晝夜誦詠祝願不得卧息若積日疲困分時下息讀經說戒晝夜不輟行道齊同不得虧闕若齋官病則啓告衆則退出齋堂齋所嚴肅不得養痾養痾别房勿喧齋所若幸堪在齋登堂整肅不得低睡宻相督勵不須行罰行罰參差乖祈感之至平常修習用黜罰之科使内外齊同今攺昏見曉師不得濫罰弟子弟子受罰不得有辭所罰必謬許有薄訴達心而巳不得苦言苦言怨己師與弟子同五行論若三時行道當中後下息至晡時夜半下息至雞鳴餘皆上講誦經若六時行道當中後下息至晡時黄昏後下息至人定夜半後下息至雞鳴三時下息餘時皆上講誦經使心目同注意念玄虚舉動施爲毎依儀典若擊鼓鳴鐘招仙集聖法鼓有二一則叩齒二則金鐘玉磬一則叩齒者威儀云先鳴法鼓次引朋衆然鳴法皷或三通七通九通十通十二通二十四通三十六通四十九通七十二通八十一通隨時所用老君經序云叩齒三咽液三也昇玄經云即便叩齒七通爲七曜道明當發故生神章云叩齒九通昇玄又云叩齒十二通三嘘又云叩齒二十四通度人經云叩齒三十二通上聞三十二天昇玄經云天師西向叩齒七七四十九通太上東向叩齒七十二通又云太上叩齒九九八十一通上清八道祕言經曰叩齒之法左左相叩名曰折制天鐘右右相叩名曰震椎天磬中央上下對相叩名曰嚴鳴天鼓若卒遇凶惡不祥當折天鐘三十六通若經凶辟邪威神大祝當椎天磬若存思念道致眞招靈當鳴天鼓叩齒雖一其實有三故凶惡而畏天鐘之響山神而攝天磬之洞招神而肅天鼓之震矣宫商有節希微内感不可以一㮣而求不可以偶然而合召也酆都記云鮑𦔳濟北人年四十餘亦無道術中風至口面齒常自啄年得一百二十七後遇大水隨長壽河而死北帝數遣殺鬼取之鬼不敢近鬼官問其故殺鬼答云此人乃多方術以制於我常行叩齒鳴打天鼓以警身神神不得散鬼氣不得入也二則鐘磬者太眞科曰齋堂之前經臺之上皆懸金鐘玉磬鐘磬依時鳴行道上講悉先叩擊非唯警戒人衆亦乃感動羣靈神人相關同時集㑹弘道濟物盛德交歸又曰法身叩鐘清嚴束帶諦心存神與已相見調槌正擊漸微至著數十二二十四三十六隨衆多少皇人本行經曰鳴鐘正法服先至鐘所手執鐘槌祝曰圓槌震法鐘流聲徧十方入下通長夜登髙響玉房九幽聞離苦七祖上仙堂鳴三下法隂數生於二成於十爪彈十下發長牙之音陽數生於一成於九次引九槌震瓊瑶之響三下者上聞清微禹餘大赤之三天中應無色色欲之三界下警地獄餓鬼畜生之三徒三天三界三徒三三爲九故九槌也歛長法歛長二十七槌上九通九天之道君中九覺九宫之眞帝下九招九幽之苦䰟連三下合四九三十六槌上聞三十六天帝中應三十六部尊經下徹三十六地户若得法左仙童記善若失法右玉女記惡明各詳之犯科冥考玄都律曰若都講行事不唱自罰香一斤今出家之人不依節制鳴鐘信任在下師主又無儀非但依帔鞋履不端亦乃遲疾之節失度一則人聞可醜二則龜鏡失常寫圖様以示人庶當來而可監齋鈔夫道因聖顯福寄人弘若不紏彈無遵典憲敷齋威儀云篤勵虧怠彈紏愆過不偏不黨無隱無濫秉執憲章務存允愜然所爲法事要假其人若不切磋何取成例只可依法勿惜人情昇玄經云監齋十事一者令設供之家先齋前三日投辭於法師陳說所願并修所請齋人姓名道位多少法師受辭即對辭主騰辭上剌請監齋官屬二者令供主還家更報所請齋人云巳投辭上剌訖冝各潔淨勿與俗人共同牀座莫作諸惡不善之行此至齋竟保全身口意一如太上威儀之令三者令供主不得盗鬼神之餘物及市買熟食以供齋人四者令供主見有異人聞齋欲來聽經者不得計飲食之費遏截不聽五者令供主上剌訖還家便於靜室齋堂燒香明燈爲監齋官屬當下監察六者供主不得辭託齋事不供當賔客七者當令供主解齋布施隨家豐儉一錢一縷亦足表心八者令供主不得緩帶裙裳如給使法九者令供主不得迎師有人去便不送是去就異心皆思忘義十者不得令供主因解齋之餘以解神福是名貪利惜費無恭肅心玄都律云主人内外不預相檢勑音聲髙厲者罰油五升若主供辦諸物有闕罰油二升若執紏見過不彈私隱罰油六升若受闕不啓上𥙷罰油三升若齋人妄言綺語論及私鄙罰香一斤油五升朱三兩律曰若有犯威儀彈紏不伏者當啓告三寳退出齋次若彈紏不實以罪罪之若上座法師自覺有失須收愆送失如不自收監齋准法彈紏若法事有虧從一至三監齋依事罰紏若從三以上斷功削除宣示同學不得容在法座若監齋容縱不紏亦與同罪侍香鈔夫水以洗塵香能破穢假茲百和託信三清敷齋威儀云侍香其職也炎鑪肅整芳馨恒然使畢夜煙流終朝火續此法事之所先宜晨昏而勿怠本際經云散天香花猶如雪下繽紛芳馥恱樂衆心又云燌百和反風名香散萬種天樹寳花衆篇經云飛香八湊流電揚烽又云金童揚香月宫散花定志云百和寳香不燌自薰昇玄經云香氣苾芬薰於八方五符序云然百和之香以破穢又云燒香醮五帝看流芳所歸氣正上中央黄帝先降氣東流者青帝先降氣南流者赤帝先降氣西流者白帝先降氣北流者黒帝先降玄都律曰誥朝拜竟其日燒香災殃自㓕違律罰𥮅一紀玄都律云若翻覆香火罰香二斤若侍香煙中絶罰油四斤若臨燒香突行罰油二斤若行香不洗手漱口罰油二斤登眞隱訣曰香者天眞用茲以通感地祇縁斯以達言是以祈念存注必燒之於左右特以此煙能照玄達意亦有侍衞之者宣讃辭誠故也又云建城縣及髙陵並有然石一燒令赤便永不糜耗得一丸以燒香實爲省要侍燈鈔夫就齋入靜燈燭居先朗耀八門光暉九夜續明之功旣舉長更之福可修敷齋威儀云侍燈其職也蘭釭晚映係明西日灼爍壇場照灼清夜若遇權停值風暫息賔主參詳與時興廢幸勿抑斷用虧成典登眞隱談曰眞人攝日暉以通照役月精以朗幽四極明科曰立春春分之日然九燈於中庭立夏夏至然三燈立秋秋分然七燈立冬冬至然五燈本命之日然十二燈夜半露出燈下春則向東夏則向南秋則向西冬則向北本命則向太歳叩齒二十四通祝曰髙上太眞萬聖帝皇五帝玉司總仙監眞今日吉良八節開陳陽絶隂考絶滅九隂於今永始拔釋七玄免脫火鄉永離刀山三塗五苦不累我身得同天地長保帝晨五願八㑹靡不如言畢解巾叩頭百二十過當額向地而叩竟復巾仰天心念我身今日上享天恩賜友形骸受生飛仙因仰咽二十四氣止如此三年宿愆並除身與眞同不履五苦脫過火鄉尅得眞人遊宴玉房可謂妙訣愼勿輕宣金籙簡文曰拔度生死建齋於中庭土壇縱廣上壇二丈四尺下三丈二尺開四面四角上下十門門廣五尺闌纂標牓法天象地壇中央安一長燈令長九尺上然九燈毎令光明上照九天下照九幽於門外四面各安九燈合三十六燈以圍壇金籙簡文云入堂靜明燈訖向燈三拜呪曰正一陽光熖上朱煙開光童子一十二人洞照一宅及得我身百邪摧落殺鬼萬千光明朗徹通眞達靈昇入無形與道自然畢退出堂滅燈呪曰玄隂閉光長燈續明太陽巳朗八威開清燈通太隂光附景生日月二眞與我合并便滅火本命上然燈以照七𩲸行年上然燈以照三䰟太歳上然燈以照一身大墓上然燈以照朽骸小墓上然燈以照太隂堂前然七燈以照七世中庭然九燈以照九幽俠門然二燈以照宫宅地戸然二十四燈以照二十四生氣八方然八燈以照八卦中央然九燈以照九宫天門然十燈以照十方然二十八燈以照二十八宿然三十二燈以照三十二天然五燈以照五嶽金籙簡文曰然燈威儀功德至重上照諸天下明諸地八方九夜並見光明侍燈之官勤爲用意每令燈光竟夕明眞齋儀曰於中庭然九燈於竿上以照九幽壇四面各然九燈合三十六燈露經中庭廵繞九幽燈燒香行道禮懴也黄籙簡文曰然九十神燈明眞科曰若有災急可丹書五篇眞文於中庭五方安又上金五兩仆五龍以鎭五篇五色紋繒之信以鎭五帝春則然九燈亦可九十燈亦可九百燈夏則然三燈亦可三十燈亦可三百燈秋則然七燈亦可七十燈亦可七百燈冬則然五燈亦可五十燈亦可五百燈四季之月則然十二燈亦可百二十燈亦可千二百燈中央安一長竿上然九燈玄都律曰若侍燈火中滅罰香一斤若翻燈燭罰油五升要修科儀戒律鈔卷之八
