front:
  text: 要修科儀戒律鈔卷之六唐六
  hash: sha256:7f2cd92fad349763d6a8a9d136ca7c3d55e3f06d20a3ec733fb7a0c2c285478f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_006-001a, image: hfl/0205/0205-004.png}
body:
  text: 三洞道士朱法滿編下説三百大戒約三元下元一百八十中免三十六上元八十四不得殺生蠕動之蟲不得飲酒不得淫犯百姓婦女不得盜竊人物不得嫉賢妬能不得背師恩愛不得不忠其上不得罔其下不得欺枉同學未解之人不得輕慢弟子不得口善心懷隂惡不得説人過惡不得重貴七寶不散施四輩不得樂人錢財襯物為己重擔不得畜刀杖兵器不得養六畜不得金銀器食飯不得死厚葬體骨不得貪樂榮祿不得燒敗世上土中之物不得以世間堪食之物投水火中不得貪世滋味不得食五辛不得為草書不得以粗物易人好物不得知預軍國事物不得設權變謀不得無故見王侯不得干知天時指論星宿不得以火燒田野山林不得無故摘衆草之花不得親近惡人不得無故伐樹林不得人中多語言參流俗不得人中獨食不得與世間婚姻事不得習世間伎樂不得泄人隂惡私鄙不得妄求視人書疏不得與女人獨語獨行不得與女人同行行必有宗不得與女人同坐男女同居不得與女人同食交借衣物不得親教女人不得説人祖父過惡不得面譽世人不得以毒藥投淵池江海中不得親宗族不得踈異姓不得落子傷胎不得因恨報怨不得偏愛弟子不得聚集人衆不得投書譛世人不得自貴不得自驕不得自是用性不得為世間妄多忌諱不得希望人物不得竭陂池不得評論師友才思長短不得輕慢經書訾毀法言不得薄賤老病不得棄薄乞人不得恃威勢以陵世間不得阿黨所親不得父母别門異居不得瞋恚弟子不得恚責世人不得罵人為奴婢畜生不得扣奴婢面傷其四體不得快人過失不得斂酷煩傷世間不得為人圖山丘宅不得占知世間吉凶不得去就背向不得與世人群處不得無故見貴人不得奪人所欲不得馳騁流俗求譽世間不得慶弔世間求恱衆人不得仍他人之功名為己德不得卧寢金寶雕牀不得名人飲食好惡不得驚怛百姓妄説衰厄不得驚怛鳥獸蹴以窮地不得驚怖老小不得輕陵官長有司不得預人間論議曲直施惠不得追吝不得遊遨無度不得妄登髙樓不得籠飛鳥走獸不得塞井及溝池不得快人家喪禍不得以𣗥橫人行道不得祠祀神祇不得向神鬼拜不得裸形三光妄呵風雨不得換舉人物不還債主不得斷割人財不得觀人為惡事不得禁人為善事不得諸天齋日不齋戒念道不得違六齋月中齋不得違經教科戒禁律不得為人作詞訟不得信人以恚世間不得唱論人惡不得笑人頑暗貧賤不得以意增減經戒一字天司奪算不得妄生語言不得勸人謀叛君長師父不得傲慢三寶輕忽天尊不得勸人不孝父母兄弟不得矯稱自異號為真人不得信用外道雜術邪鬼不真不得衣服盈篋不得謗人學道不得無經託學欺詐人神凡諸道學不得自為及不得教人為右觀身大戒從第五戒至一百八十戒君子之道名玉清智慧下元品戒戒前並摽道學以略於此下出中元三十六戒道學不得望人禮意不得竊寫人經戒不得榮飾衣褐不得身不潔淨上髙牀讀經或與人同行當讓人以前與人同學夏執㸑供養與人同學冬執硯供水與人同食其粗及菜與人同食當正巳前與人同學當敬先勝已與人同住當任處分與人同學當念教未解人施惡於已已受惡不得有怨不得懷怨志報於人與女人共語不得正視面容笑相對與女人同渡水不得正眼視之失物不疑以同牽及衆人失物當委運自悔多罪多災疾當恭已自責念攺往修來當忍人所不能忍當割人所不能割當衣人所不能衣當食人所不能食當學人所不能學當容人所不能容當受人所不能受當斷人所不能斷無使精神浮散真想不通身不潔淨魂魄離人有心則天真斷絶魔官不能降有家則三毒不滅三真不居有身則衆邪不去精思無應當心靜寂漠與真樹當安玄泉不使妄動先滅識藏見然後真人見觀身戒從第五至二百一十六無上正真之道名玉清智慧中元戒品下出上元戒品下出上元戒八十四道學當念菜食為常當念先度人後度身當念居山林幽靜精思當念燒衆名香流芳諸天徹魔境界當念在賢衆聽受妙音當念請受三寶洞經勤身供養當念立功度人終劫不倦殆當念執師友本德終劫不殆當念國中清靜王化太平無有不道當念鄰國有道各守境界當念祝願百姓令常安完當念萬物為先不得道巳當念逺鬼神不敬不慢當念逺外術禁忌之道當念逺聲色歌舞之術當念無疑惑聖文損益科法當念無求無欲當念崇本守真當念口不違心心不身形當念清白守真當念一無異想想念惟空寂當念寂寂安寧咸無苦痛當念世間憂危之人罪繫苦惱當念天子聖明弘道皇家日盛當念君臣相輔常有保道當念天地日月風雨霜雪以時當念父母養我因緣當念七世父母上升天堂當念我師早得登度當念我同學人來測道源淵奧典章當念同志轉相教導令入正道當念不違其口所謂之文當念視人父母如已父母當念視人子過已子當念視人身過已身當念視人傷身痛過已身當念視人辱惡過其身當念我宿命因緣根斷當念我生樹巳枯神合大無無數之劫體合道真當念胎根已絶不能生世因緣種親當念三徒路塞地獄長休當念中食養神棄諸肥滋當念愼大法常存三宫真元子丹當念觀世和光不驕於俗當念三寶經戒常誦不輟當念存雌一誦大洞經眇若神對當念登仙度世乘雲駕龍當念欲見同師之人當念見真人道士修行法事當念見聖主治世海外稽首乘風向化當念食天廚自然之膳無飢渴之想當念與天真共對淡然無為當念使仙童玉女當念東遊青林東華當念西遊安養西華當念北遊碧羅北華當念南遊太丹南華當念遊遨留憩玉京崑崙中華當念遊上齋堂講詳聖道敷釋淵賾當念遊玉清七寶宫禮三元天尊當念遊玉清丹霞宫禮太上二十四髙聖當念遊紫宫禮洞真三十九髙聖當念遊太上玉京七寶流霞髙廕蓋玉林禮太上天尊十方大聖終劫復始當念遊主十六天黃金宫禮天帝當念遊九天黃金暉宫禮天帝當念遊六天七寶宫觀化太璧王見度我籍以入仙品永離泉曲之簿當念遊諸天宫宅與天帝問道論經當念遊日月宫殿光明煥赫禮見日月王飲以日月華金汋之漿當念遊大梵天流景宫禮下仙及天帝衆聖聽諸霄絶雅妙音當念遊諸天七寶林反生靈香流芳逆風聞二千里外師子飛龍鳴嘯其間當念遊諸天沐浴安坐蓮華之上香潔自然流汨諸天池皆如一處人快樂當念遊諸天聽諸天仗樂無世間之想當念遊十方外天杞大聖衆無上正真人當念遊天地名山隱宫洞室禮聖衆先得道人當念隱祕天真名諱不犯我口當念以為道經無見異念恆令心虛意大思志玄虛安雅空寂觀身戒從第五至三百首太上無極之道名髙上玉清智慧上元戒品之微天帝曰若奉戒弟子獨宿山林可畏之地鳴天鼓二七通心存戒神衛三重祅鬼不敢近福德恆隨身諸天善神各各應護也先是𡨚家債主皆生慈心矣要修科儀戒律鈔卷之六
