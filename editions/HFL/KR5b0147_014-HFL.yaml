front:
  text: 要修科儀戒律鈔卷之十四弔四
  hash: sha256:72033cc44459f3ddbe62efa3de367860408c250c8d1d546750c301d52e0a42b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_014-001a, image: hfl/0207/0207-004.png}
body:
  text: 三洞道士朱法滿編飲酒縁經云斷酒節行調和氣性太平經云眞人問曰天下作酒以相飲市道元據凡人飲酒洽醉狂詠便作或即闘死或則相傷賊害或縁此姧淫或縁兹髙墮被酒之害不可勝記念四海之内有㡬何市一日之間消五榖數億萬斗斛復縁此致害連及縣官或使子孫呼嗟上感動皇天禍亂隂陽使四時五行之氣乖反如何故作狂藥以相飲食可斷之以否神人曰善哉飲食人命也吾言或有可從或不可從但使有德之君教勑言從今以往敢有無故飲酒一斗者笞二十二斗杖六十三斗杖九十一斛杖三百以此爲數廣令天下使賢人君子知法畏辱必不敢爲其中愚人有犯即罰作酒之家亦同飲者眞人曰或千里之客或家有老弱或祠祀神靈如何神人曰若千里君子知國有禁小小無犯不得聚集家有老疾藥酒可通千眞科曰出家之人不得飲酒或託天寒詐稱腹痛飲後色變或闘亂尊卑或應供赴齋或施行章醮或遊道路或應對公私非唯自失禮儀抑亦穢辱道衆是滅道法無生弘讃然應人就請本以清潔爲先出公入私皆用端嚴爲首有如此例皆犯律論靈寳經云生而飲酒者死則連汲溟波水灌沃四瀆中或曰道法之中聽許飲酒靈寳經云置酒浮雲觀髙飲玉清臺此何頓隔答曰何見之謬太清經云化金玉爲三十六水以金爲水則爲金漿赤玉爲水則爲瓊漿白玉爲水則爲玉漿或云玉液定志經云五者不醉常思淨行何有許法五嶽圖序云斷榖服藥縁丹蠟神方斷榖可千歳不食自肥不瘦能力作負重方眞丹一斤芒硝半兩茯苓一斤皆擣合之以白蠟二斤中合煎之九上九下可丸便盡丸之如梧桐子服十丸解一月不食也老君守中赤丸法用白蜜一斤眞丹一斤一方三兩白蠟一斤先細切蠟以銅器煑酒令沸乃投於蠟安酒中蠟消下器著冷水中蠟凝復下如此三上三下蠟凝出之棄酒乃獨以蠟著銅器中火上使沸九沸九下後下之内白蜜復上火一沸下之内眞丹攪令相得欲凝便急丸之如彈丸欲斷榖服之初服一日服一丸二日服二丸三日服三丸復從一丸始凡九日服十八丸爲一劑便守中四十年不飢顔色氣力如故可負擔遠行渇者飲少冷水亦飲少酒勿復有所食令人不畏毒但不能延年長生耳辟榖輕身氣力不減山行不極也若不能吞大丸亦可分作小丸計之合藥齋七曰王相建滿定日合勿令小兒女人雞犬見之後若欲還食榖當煑葵子一升作薄粥飲之藥即下乃先稍稍食糜勿便頓飽也此沈君所用以與牛馬服皆不復食草而肥徤如故祕驗一方直洋蠟三上三下乃内蜜一沸内丹撓之冷便成守中諸鎭丸法茯苓乾黄精术楮實人參各一兩擣篩以白蜜五合白蠟二兩合前和藥更擣千杵服如小兒拳一丸然後可服大小四鎭服丸後又應長將前件栢葉丸茯苓丸爲佳小鎭丸法丹沙半斤茯苓半斤禹餘粮半斤麥門冬一升白蜜三兩凡五物丹沙餘粮茯苓下稀和以蜜擣三萬杵麥門冬去心三兩作四丸手摩令有光以滿日平旦東向服一丸却十日服一丸却十日復服一丸是爲三十日服四丸止服此藥得度世者有三十餘人合藥時用王相滿日當齋戒勿令小兒婦人見之不得食葵菜生菜及至死䘮生産家此方長史書守中徑易法取大豆必生者三升手挼今光明帀體暖先美食竟乃頓吞之可解五十日百日渇則飲水勿餘食欲去之服熱粥二升豆即下一云每向日再拜一服一升於口中展轉誦六甲通乃咽之三日明日乃分一升爲三過小兒則半之又赤豆肉吞二升至三升亦支一歳又取大豆黄末三升一頓餐之亦可十日五日不食後欲食當服葵莖灰方寸七即下服猪膏及酪蘇亦善又法先嚼蠟大如愽棊極令柔乃内猗氏肥并含嚼之即皆消而咽之入腹正氣除病斷榖又但食一方寸蠟辟一日又法取檀榆皮白者各一斤酒一斗漬之出乾復漬盡酒止一服二兩十日行三千里又法桑椹黒者暴乾擣之水服三合日三則不飢又法三月三日若十三日二十三日取白茅根淨洗細切水服亦可暴末併備之日服五六止勿大飽長服令人美色不老伏鬼神又法薤白五斤稻米一斗豉一斗塩半合以水三斗煑令熟爛初飽食後稍稍進不飢除寒熱延年服松根法取束行松根剥白皮細剉暴燥擣篩飽食之可絶榖渇則飲水又法但取栢葉暴燥爲散蜜丸服之則不飢亦可水服亦可酒服以白酒和散暴乾又擣服益佳服松葉法四時隨王方面採近上去地文餘者細切如粟水調若薄粥汁服二三合日三亦可擣碎暴乾更末服之亦可擣末酒溲暴乾更擣篩以酒飲及水調無在千服乆服並令人輕身延年體香少眠身生緑毛還白絶穀不飢服之當使有恒栢葉亦然服氣斷榖法先閉口咽内氣勿吸外氣也一日三百六十咽以上爲但欲多耳能至千尤快以漸斷穀十日後自不用食穀斷三日或稍稍飢或小便赤黄無苦可噉兩三乾日中九枚酒日中可一二升初小極後轉好也食十二時氣法常從衣半九九咽雞鳴八八平旦七七日出六六食時五五禺中四四日中復從九九起皆當合口大咽之令氣入腹每咽一時足輙漱鼓津液吞之數過各轉向其辰之方面益佳十四五日中當頭眩瘦極過此漸佳服符水斷穀書此六甲隂陽符皆各隨其日支干書内方中也可豫作内函中至其日取以祝水而服之也服此隂陽符平旦東向左手持符右手持水器祝曰眞人某甲好樂眞道服食中和之氣甲子太玄玉女承翼給侍某用行厨所在去所當得無令飢渇軍無大小人無多少皆當得飽畢以符著口中水送之唯在人多耳若欲斷他人穀千人百人皆東向列再拜自稱名各爲書符與之共飲一器水耳甲子旬太玄玉女承翼甲戌旬黄素玉女飛廉甲申旬太素玉女瓊石甲午旬降宫玉女雲齡甲辰旬拜精玉女靈素甲寅旬青要玉女惠精此六旬玉女名當其呼之勿誤也玉君絶穀符滿日丹書紙燒以神水北向再拜服之執水向月建三祝曰金木水火土五星之氣六甲之精三眞天倉清氣常盈黄文赤子守中無傾畢輙三叩齒三啄杯乃以服符并飲水一升右並出太清下卷老君服水斷榖法不問清旦但是須飲即喫以一杯盛水向水祝曰金木水火土五星之氣六甲之精眞人天倉清氣常盈黄文赤子守中無傾三祝三叩齒飲之令人不知飢渇渇復之極有神驗近往往有人得力此方是養生經卷後録出祝與前少異更未得別本勘知之道基曰祝六畜不食法祝曰萬物皆含水如生水入腹中萬神皆驚有脉之物皆可絶無脉之物不可絶六畜皆牽向王也治祝縁登眞隱訣諸行事存想祝願並在其中令略出一兩要急耳每當經危嶮之路鬼廟之間意中諸有疑難之處心將有微忌勑所經履者乃當先反舌内向反舌向上柱喉中臨祝乃申之咽唾三過畢以左手第二第三指捻兩鼻孔下人中本之鼻中隔孔之内際也三十六過即手息按勿舉指計數也此急按中隂數以一息爲一過之久鼻中隔孔之際名曰山源一名鬼井一名神池一名邪根一名魂臺也此後祝中有此五名故先出其紫微夫人云山源是鼻下人中之本側在鼻下小入谷中也針之亦治卒死掩畢因叩齒七七通畢又進手心以掩鼻躡畢未去手仍叩齒竟仍進左手掌以掩鼻口指端至髪際并覆明堂之上也於是臨日臨目内存明堂中三君以鈴鏡赤光煥而擲之又存泥丸赤子帝君執謁大洞眞經以威攝之也乃微祝曰朱鳥陵天神威内張山源四鎭鬼井逃亡神池吐氣邪根伏藏魂臺四明瓊房玲琅玉莫巍峩坐鎭明堂手揮紫霞頭建晨光執詠洞經三十九章中有辟邪神虎截嶽斬岡猛獸奔牛衝刀吞鎗揭山攫天神雀毒龍六領吐火啖鬼之王電猪雷父掣星流横梟礚駮灼逆風横行天禽羅陳皆在我傍吐火萬丈以除不祥羣精啓道封落山鄕千神百靈併首叩頴澤尉捧燈爲我燒香所在所經萬靈奉迎十九韻畢又叩齒三通乃開目除去左手於是感激靈根天獸來衞千精震伏莫干我氣此中並是神獸靈司之名號故可以震却精邪右出大洞眞經髙上内章遏邪大祝上法長史書北帝殺鬼之法先叩齒三十六下乃祝曰天蓬天蓬九元殺童五丁都司髙刀北公七正八靈太上浩兇長顱巨獸手把帝鐘素梟三神嚴駕䕫龍威劒神王斬邪滅蹤紫氣乗天丹霞赫衝吞魔食鬼横身飲風蒼舌緑齒四目老翁天丁力士威南禦凶天騶激戾威北㗸鋒三十萬兵衞我九重辟户千里又却不祥敢有小鬼欲來見狀玃天大斧斬鬼五刑炎帝裂血北帝然骨四明破骸天猷滅𩔖神刀一下萬鬼自潰三十六句四言輙一啄齒以爲節凡三十六句則三十六啄齒若冥夜白日得祝爲恒也此無正時節修事有閑及曉夜之際諸疑闇之處便可祝之中皆當微言鬼有三被此祝者眼睛盲爛而身死矣此謂諸殺鬼邪鬼及天地闇自有惡强鬼輩聞此而死耳非人死之䰟爽爲鬼者也如此鬼眼亦是有睛故盲爛則便死此上神祝皆斬鬼之司名祝中有酆都中當位及諸神名字故鬼聞而怖死也許其領烕南兵千人即此御凶者也炎帝即大帝四明即諸公矣北帝祕其道北帝應建鬼殺人而值此祝便不可復得故祕其法若世人得此祝恒能行之便不死之道也人之死也皆爲諸鬼所殺耳今旣不可取便爲不復死也男女大小皆可行之但患其不知此祝耳智者宻用則無限於大小此語以是令告長史家困病行此立愈思旣幸走病豈不除叩齒當臨目存神五藏五藏具五神自然存在謂初叩齒三十六時應臨目内視存具五藏以次想之皆令分明五藏之神備在於内然後可得乗正以御邪神以誅鬼耳酆都中祕此祝今宻念之耳不可泄非有道者冝共祕之乎此雖非髙貴之至典而是殺鬼之上術凶惡旣消則正氣可接且以誅邪遏試學者之要法而諸人多輕其淺少每致傳泄使神祝不驗呵執不行殊爲可責之也楊君掾書兩本卧枕縁道基經曰枕髙肝縮枕下肺塞以四寸爲平枕席令煗其息乃長道林品及觀門經曰行氣枕髙二寸半太清經曰下神枕法曰五月五日若七月七日取山林之栢爲枕長一尺二寸髙四寸空中容一斗二升此則廣三寸五分栢心赤爲蓋厚四分善致下之鑚蓋上爲三行四十九孔凡百二十孔凡容一𥞫粟乃取藥内中用芎藭當歸白芷新夷杜衡山薊藁本木蘭肉蓯蓉栢實薏苡蘼蕪欵冬花白衡秦椒蜀椒桂乾薑飛㢘防風人參桔梗白薇荆實凡二十四物以應二十四氣又加八毒藥以應八風烏頭附子梨蘆皂莢罔草礬石半夏華隂細辛都合三十二物皆㕮咀以毒藥居香藥下按次滿枕中爲布嚢以衣枕之百日筋骨勁強面有光澤一年身盡香四年白髪黒落齒生常别作一幃嚢卧輙起盛覆之勿令氣泄年年易新藥合三十二種藥得一斗二升者一種轉取屑三合七圭八撮五分撮之四也且藥體有虚實又應作稱兩率取之今按大散家品藥云术十兩六銖得一升四合乾薑三兩二十二銖得五合桂三兩十四銖得五合防風二兩四銖得四合桔梗二兩九銖得四合人參一兩二十銖得三合黄芩十七銖得一合細辛一兩二十一銖得三合附子十九銖得一合茯苓十八銖得一合礬石一兩六銖得一合牡礪十六銖得一合此並諸藥之舊率令應分等枕藥先各各依准量戒之旬中白虎者以所克本旬者甲子旬在辰甲戌旬在卯甲申旬在午甲午旬在子甲辰旬在寅甲寅旬在酉也入山辟虎並在定訣也要修科儀戒律鈔卷之十四
