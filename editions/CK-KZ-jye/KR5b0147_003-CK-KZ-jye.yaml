body:
  text: 科曰俗人受籙殆未閑科法來諮所疑隨解實答不得有欺妄云不知必諫惡還善勸是除非不可阿黨爲私害法損己誤人九刑論科曰高德道士大治祭酒八十一賢清齋登壇壇是崇虛堂所皇靈之壇者如是不須受法及籙而傳籙治唯二十四卷悉微言要旨三洞寶經眾符祕諱悉應師受師是道民參受備者盛德爲師天師子孫雖是師卽皆爲弟子之禮天師子孫受眾法法信依百姓不得闕闕則三官不憫科曰受諸劵及自然劵後傳劵無有經此謬妄之師劵本度經無經何劵師須寫經盟可爲師耳年限未得爲師當爲前弟子覓有經具足師不具足者且稍受之以足爲期不限師之多少不格師之男女師不得禁錮弟子不得背叛本師背叛受十苦之考後生六畜之中禁錮者幽牢檻繫後生邊荒愚癡之群明各愼之科曰寶經禁重萬劫一出天地促運輔正須賢七百年聽傳若有骨分七年得傳三年之內無有災厄四年可傳傳得其人人我共福非其人同罪俱入火灌風刀萬劫負石之役科曰凡事師恒如兩手捧物當心勿有墜失師如父也但奉道事師有二種人一曰名二曰義凡言事道係名師門不修妙義不修大功不行無爲處處有滯煩惱生死不能知常妄作致凶此有名事師也若專心憑師動止依法建大福田濟身度物無爲而無不爲所在通利無諸障礙長生不死永享貞吉此有義事師也科曰師與弟子言皆稱吾我卿弟子弟子亦如此天親也凡事師門外稱弟子內稱名不稱姓師之師准祖師祖師之師准曾祖曾祖之師准高祖高祖之師一號宗師宗師至弟子身是爲五代祖師至敬禮訊言語書略同悉稱弟子不得慢言若有違七刑論科曰事先達與師同先達者言堪爲師崇彼如師一名心師問訊時諸師並在先拜宗師次問訊祖師次問訊籍師度師也科曰弟子法身通辭書疏皆眞書不得草犯者五刑論道士敬先達恒下師一階律曰弟子謁拜於師朔望皆朝服而朝不得陽說陰私背向異辭律曰道民籙生與師主期失信魂魄閉繫水官五十日役律曰弟子見師不敬不恭無禮語言我汝魂魄在水官拘閉六十日考竟減算二紀律曰弟子見師敬事如父母師主見弟子念之如赤子違律罰算各一紀律曰正一家三師者一正一師二天師三度師三五治籙等三師也通當有敬違律被考三十律曰弟子作書與師主須啟書悉稱名不得輕慢違律考杖十五律曰道民與師主共言語稱道民不得稱名違律考一十律曰弟子別師主經月晦朔及三元吉日不見師須拜三拜違律師罰考一十重病二十日律曰七世不同得爲師授度七世尚同不得爲師犯者減算三紀然看此律直恐弟子有過累於九祖父母傍及師之祖先若弟子忠誠七戒無犯德合十行骨相應圖父亦可以傳其子令能九祖俱仙寧有奪算之咎律曰弟子聞師有疾病厄急貧窮彫悴不能創心則無仁孝違負誓言考五十日重病一百日律曰道士不得來佗弟子前語罵及佗弟子師長皆須平正若論善惡人身中魂魄卽去違律水官考病五十日律曰弟子佗人前語及師主父母不善身中吏兵卽奏天曹罰病一百日考三十日律曰弟子得師書告皆燒香執笏整衣冠拜三拜發書讀之卽是崇依上聖弘道孝敬乃合先聖心違律罰算一紀律曰弟子別師經一月已下皆冠帶執笏問訊不得白服隨時違律罰油三斗拒不輸者杖二十律曰弟子別師主經一宿已上五宿已下皆整衣服執笏再拜問訊還如法違律罰香五兩入三寶弟子向師主皆稱名弟子詣師不得輒而坐師命方坐違律考病十日律曰弟子不得喚師作道士皆言家師和師大師尊師師主也違律罰油三斗入三寶考病十日弟子不得犯觸名諱若尊人問不已宜須下聲答名也違律罰算一紀弟子不唐突師左右左右有問察之神違律罰算一紀弟子見師過失之事當於深隱處長跪歛手恭諫請不得在別人前言師是非醜事違律罰算一紀弟子與師共房不得先在師前眠臥不得在後起違律考病五十日弟子於師處同食不得先食皆須師前弟子後也若師命同食弟子食聽在前止住弟子隨師起居行止遊履皆正當謙卑恭敬不得斯須無有禮法罰考三十下弟子事師師年少弟子年高弟子皆應恭敬譬如官長二千石父母同等不得自恃高年輕忽於師主罰杖八十主者宜科弟子師同在座席若師起居行止弟子起下地倚不得晏然端坐違律考三十弟子先未受法戒或氣類有等或復耆年後詣師法便爲師事言皆稱名恭敬不得准前違律考四十弟子先與師主姓族同從弟兄孫姪後詣師受法皆須謙卑恭敬言皆稱名不得比尋常違律杖四十主者宜科弟子與師親屬緦麻者皆不得相爲師弟所以爾者受法皆證三曾七祖父母來盟子孫所受若違盟九祖受考殃及受法人身病百日弟子不得嗔怒嫉責忿憾師主及懷恚恨在心違律被考三十弟子詣師請道法皆當冠帶執笏謙苦求請不得輒爾違律考四十弟子不得與師主諍口違律考四十弟子事師師若來還弟子皆當隨路遠近奉迎不得端然晏坐以待師主違律罰考四十弟子與師同行不得身踐踏著師影違律考三十弟子出入及所作事每先啟告諮審師主不得自專違律考五十弟子事師皆當思念信實不得猶豫二心違律考三十弟子不得竊盜發泄師器具籠笈錢物飲食禁誡科律違律杖三十弟子與師主同坐不得汙唾左右違律考二十弟子侍從師主若値賓客弟子皆侍衞師左右不得放抗大座與凡無别違律杖七十弟子受師法業後道德成就爲人所崇皆當謙謙存憶師主勿忘恩違律罰算二紀律曰道士女冠年雖已老受法卑下行道不得在大法身小者前其年雖少法戒大者可行於前不得錯亂違律考杖六十科曰大德名人同住一處有狡猾弟子若欲歸依或愛情未離或枉被威逼應須教習各誠機宜或先令苦使或誘引甜言或獨立坐忘或擯令遠去或出經寶教授或令齋戒治除或懼自尊威而令傍人撫接若終惡不改而無進善之功畜斯弟子是滅道法永須遠離科曰若有弟子愛樂正法深經大義咸願欲聞直以機在前緣眾根闇鈍如此之善預旣發可須安慰三戒五戒示靜安心大德法師是眾生依止若心性高者而令低心下意若動止强梁而須折伏若其懦弱勸進勇猛旣爲眾生父母寧不慇懃必契道場永無退轉科曰上清法師不應授人大戒不應受人依止不應畜弟子不應爲人教授不預評論眾事不得闇夜自行不得親近邪見當動止在法科曰所養弟子彌加呵責有大罪過引五事責之一我今呵責汝汝須出去二則出離之後莫入我房三則我縱無人亦不用汝作使四則我之生前莫至我所五則我能引化三塗五道終不與汝共語此之呵責折伏爲行之甚不用分外非法考打枷棒懸首反縛晝夜打罵律無此條傷大慈種若師主使令弟子沽酒買肉坐販賣牧牛養馬并爲邪淫驅使弟子弟子可言以此所作非天尊行某不敢爲師若有嗔責可須捨去科曰惡行弟子教不知悔其行有十一則爲惡不恥二則見善不修三則聞諫彌甚四則動非威儀五則強梁我慢而無恭肅六則懶惰狠戾七則友非忠信八則遊習姧婬九則好樂屠戮十則醉亂尊卑有此十種行人是破道法若不爲惡能伏勤苦清旦入房除小便器朝中日暮三時問訊求有所習隨用驅使不辭勞苦漸盈大器積德成眞有此弟子紹隆正法廣以讚嘆科曰男女官各得依止男官依止男官女官依止女官大法者爲師每一旬至師所受教訓至時整理法服赤心靈宇恭敬謹肅直詣師門不東西異向至師門已通白云某弟子問訊師知已乃端嚴衣帔燒香於誦經之室命弟子令進進至師前安詳三拜問訊云師比者起居安不德無損和師無他故乃答云比日亦無虧禮誦若有疾苦隨事應答弟子若有罪過先聞師耳可云汝有某事可加誡誨令其改革弟子拜謝乃云不能自厲勞師誡勑又拜謝云從今以去不敢復犯若是齋前設齋齋後無所施設乃便去再拜云願師以自珍重師重誡云所在之處勤行齋戒以自愼護勿起驕慢唯然起退三步乃始轉去不得更入他房歸至本觀以師誡悔之言示眾大小不得藏匿若女官無大法不解傳授者可詣男官請受有高德女官男官亦得請詣受法俯仰之格男女官通用科曰師主大德若從遠歸命所使先到觀中令知歸至弟子則整衣帔出觀迎接當以大小顧望不得無故掩人不備科曰弟子有所啟白師主及同觀外觀大德皆整衣至房房閉當屈指細細打戸三過停少時不聞人聲更三過又不聞人聲又三過不聞則退科曰弟子之禮師主有客當卽拂拭牀席机褥灑掃前後師主令命客進乃命科曰弟子之禮師主令過授物事師主若立則立受師主若坐則長跪受科曰參省師主大德皆再拜侍立命坐則拜而坐更問他故則起立而答皆條直身體並腳歛手科曰進尊者之房戸知在房中或庫內若不聞聲謦咳發覺如不問則退若問稱名啟白命入則入房開則開閉則閉入戸正視尊者不得左右斜顧科曰出家之人常合忠正出入動止五正爲先一正己身二正門徒弟子三正觀中良賤四正四遠眾法五正頑愚俗人能正己身爲物軌則能正弟子承禀有儀能正觀中大小從順能正四遠法義稱揚能正頑愚廣增慧解能如此者名爲道士若身旣不正爲物所憎弟子不教卻賤師至觀主恒無禁忌大小貴賤混淆不存信義四遠同皆厭惡欺陵愚蔽增長罪目不能廣立威恩卻更誘引他家子弟奴婢或圖物入已或私與交關不依正義立身恒以邪僻爲行有如此色名爲逃課兇賊共所防戒如不可懲國王有法
