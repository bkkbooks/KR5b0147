front:
  text: 重刊道藏輯要三洞道士朱法滿撰
  hash: sha256:0e5e249f9015743296c97bd95e08ecf82152a37333d43a1d50c671acc9704b07
  markers:
  - {type: head, offset: 6, content: 要修科儀戒律鈔卷之一, id: KR5b0147_CK-KZ-jye_001-h1, level: 1}
body:
  text: 夫聖人應物必資經教不立真寶成濟何由口吐瓊文演兹靈祕還淳反樸要此憑心就學有方現於斯矣生神章曰天尊以龍漢劫說洞真經赤明劫說洞玄經開皇劫說洞神經此三洞尊經備明奥典隨方教化開度天人能使六道歸真三乘體悟行有高下法有淺深三十六部自兹彰著真藏經云一者上清二者妙真三者太一四者妙林五者開化六者仙人七者黃林八者上真九者道教十者上鍊十一者上妙功德十二者道德此十二部經藴在大洞玉清境藏中一者洞玄二者元陽三者元辰四者大劫五者上開六者內音七者鍊生八者靈祕九者消魔十者無量十一者按摩十二者上通此十二部經在上清境藏中一者太清二者徹視三者集仙四者洞淵五者內祕六者真一七者集靈八者中精九者無量十者集宫十一者黃庭十二者小劫此十二部屬太清境藏中此則三洞著經列於金格七聖垂範明乎玉篇萬劫一開法隨人出太真科曰太上老君以漢安元年五月一日於鶴鳴山授張道陵正一盟威之經九百三十卷符圖七十卷合一千卷付授天師大洞真經二十一卷授於已成真人太平經云真人問曰何爲天經何爲地經何爲人經何爲道經何爲聖經何爲賢經何爲吉經何爲凶經何爲生經何爲死經神人曰然修積真道道者天經也天者好生道亦好生故爲天經修積德者地經也地者好養德亦好養故爲地經修積和而好施與者爲人經和氣者相通往來人有財亦當相通往來故和爲人經也修積上古中古下古道辭爲道經修積上古中古下古聖文爲聖經修積上古中古下古賢辭爲賢經其師吉者爲吉經其師凶者爲凶經其師生者爲生經其師死者爲死經也法由聖顯道寄人弘道經云侯王若能守萬物將自化當知人王有道大道興隆人王無道大道廢矣夫白羽黑翮摽出代之辭金魚玉龍豈常人之信可傳而不可受難見而亦難遵特由器宇淺深緣生麤細元始明三乘之法鏡總括殊流高上開二卷之微言咸令反一本相經云身者三惡之根神仙之本一名良福田二名蒺藜園三名種子戸四名棄生門五名道之域六名膿血村七名珍寶器八名瓦礫盆九名明智室十名九夜昏人能知斯理可名爲真人然而有言無實不可聞經有實有言乃可傳授昇玄經云末世人民有三可畏宜善詳焉一者道義嫉妬可畏二者誹謗可畏三者貪欲可畏道義嫉妬則經法不行誹謗法師則使百姓信道不濃貪欲財色人所棄薄此三者二在外一者在內除此三患乃可傳道本際經云具十善願便可授之何謂十善願一者願離世間穢雜境土二者願得出家捨俗恩愛隨緣告乞廣建福田常行慈忍永離人我三者願逢勝友引接開示四者願值明師謐受上道五者願聞正法如說奉行六者願見天尊親承聖旨七者願度一切後已先人八者願以法音廣宣愚暗九者願諸眾生皆發道意勸造經像修營靈觀香花燈燭隨力供養令諸未悟普見法門十者願我此心堅固不退具此十願乃可授之昇玄經云來世欲流通靈寶內教經者有十一事信著萬民爾乃可得宣傳此經一者奉戒完具內無毀滅二者賑給孤老貧窮有慈愍心三者勸人遠惡修善慇懃如父子四者不求名譽稱毀如一五者幽隱之處勤行禮拜修諸功德如處大眾六者不欺使民信之如四時七者總棄榮華位不加身八者捨遠妻子獨處閑靜九者親近賢智博問善道十者雖在幽冥不可孤心與賢者論議莫自專執十一者常行謙卑恭敬於人是爲十一事通內教行又有十相可傳與此經一者好求勝法從善如流二者好近賢智無猜疑行三者聰喆賞別真僞四者謹慎言不過行五者柔和少無過惡六者能師勝己無驕慢心七者敬師重教如貧得寶八者能奉師長不辭勤勞九者已於先師有報復心十者慇懃請受晝夜不懈是爲十相又云或在下賤內有實德人所未悉其人堪持此法者出在非意人所不疑處當傳授此經玉經隱注曰受經不敬師資修之亦無感而後生疾病及六畜之中太平經云是其人而不傳名爲閉天之道其害在已非人而傳之後蒙其咎定志云是其人不授令人與道隔非人而趣授現世被考責二明犯科夫麤行易染妙行難遵學者如林成者未一纔虧正典卽結罪科女青律云受道不知輕重傳非其人貪財受利取人自益借物不還以爲私寶天奪算一千二十四律曰不得妄傳經寶授與於不信泄真要訣天奪算九萬六千黃籙簡文曰未合傳經而妄傳考由明梵曹三被風刀揚而強傳考由司正曹齎信詣師階品未合威勢怒師考由四明曹不依俯仰之格考由大儀曹受經慳悋不備法信考由監天曹不關盟五帝私相傳度考由司殺曹輕泄經目放露天真考由盟天曹香燈不如法考由威靈曹不爲經師開度弟子三人籍師七人度師九人並考由明威曹爲三師建功旣足年限又登而故蔽匿斷絕法門考由太陰曹受法之後不建善功考由明都曹受法之後不廣開化度物無名考由下元曹受法之後不爲三師立願考由明都曹受法之後不度一人抑絕賢路自取功名考由幽都曹身受經法不安齋堂上座斗帳香燈考由明都曹明真科曰受真文各用命繒計歳餘壹有關考由玄曹科曰受真文用金龍三枚投於水府及山宅不投三處三官拘人命籍有違考九都曹科曰五帝紋繒各四十尺以關五帝爲告誓之信有違考泉曲曹科曰用上金五兩以盟五嶽爲寶經之信有違考陰官曹科曰用金錢二十四萬以質二十四氣無金錢銅錢亦可有違考都神曹科曰香燈以開九府有違考太陰曹科曰受經不持齋有違考太陽曹科曰天文祕重非信不寶故上聖以信效心無信則爲賤道無盟則爲輕寶有違考左右官曹科曰經不師受五帝無盟妄披篇目罪同竊經之科考由明法曹已上諸條難遵易犯尋文撫卷莫不寒心端坐勿傳便爲遏絕始順來意十行全乖進退思量永炭交結況乃貪殘之輩鞬固爲心不問前人道行唯欲弟子寶有傳經不上寶義何曾借問制伐旣無啟齋科信寧有關盟軌則弟子旣見師例後日亦學此傳不懼冥府書𠎝只覓名聲財利毁道敗法正由此人西昇經云迷迷以相傳輾轉相授與邪僞來入真虛無像如有自僞不別真爲貪利往守非常正復忘癡盲持自咎如木自出火還復自燒腐信哉斯言幸相自勵明真科曰受真文法信當十分折二以送祖師又折二散乞貧人山栖道士餘信充香燈爲弟子立功違犯考三官曹太真科曰受天師治割配領戸不得同自化十二之折當中分其功十折五進入天師治宣示此令咸使知聞如其有違五刑律論四極明科曰凡傳上清寶經受弟子信物三分散之一分投於山栖以䘏窮乏之士一分供已法服一分以爲弟子七祖立功投物於山栖之日當願天下窮乏之人清苦隱學並早得道度世昇仙作已法服之日當願兆身與神仙同色衣冠法服得仙法則明燈捻香當願弟子及兆之身七祖父母早離刀山三塗五苦之中昇度南宫反胎更仙事事如法剋得道真違盟負科考及兆身科曰受上清寶經質信詣師未充科限受經之後年數應傳皆不得受他信人已皆當傳送先師備充先限然後乃得三分散之爾若違科考及七祖明真科曰受經之身先信未備後遇賢人質信請受皆當以所受之信充備先師之限餘者可得爲身法用有違考火官曹已上三處折傳不同隨經進退今人十二折傳盡營身口上慢下暴輕脫之甚矣夫聖人隨劫輪轉感應道交是眞乃傳非賢不授五稱符曰學道受經後四十年傳一人已延壽者四百年傳一人得地仙者四千年傳一人得天仙者四萬年傳一人得無上道者四萬劫傳一人太上靈寶大法傳授之科備矣登眞隱訣曰天眞授書靈人授書三千年六傳二千二百年傳十人千年五傳七百年三傳已上年限並是聖帝相師玉籍金科非代間可擬聖紀經云夫有金格玉名者則眼有日光青齒白血若上清有金書玉籙者則背誌如河魁胷前有偃骨若太極有丹簡青文者則手理有累人倒大之字方諸有玄青紫名者則眼有四規中有紫光若太清有玉籍者則聲有玉音金響口方目圓若太素有金名者則白誌見於腹口中有紫氣斗中有玄籙者心中有九孔肺外錦文頤下有玉丸目中有緑筋眉角有上干如此之相仙眞之流出處行藏本非凡解傳授年限聽可依前今日人師促齡難保預逢經教芥子投鋒得在受書盲龜遇孔若約年限恐與願違但令行以慈仁心懷至道合前十願乃可授之登眞隱訣云有至學之子唯當勤心幽靈啟請玄師才分苟合必將感悟得是眾眞應付之限然後乃盟盟而修修而必終吾將分金與之爲友不如此者無煩強營徒守之滿笈適足累其七祖考河之石彌增其多耳古人謂之皮好吾今號爲耳學所以聞道則膝行道寂則俱亡也夫道必須授受乃得遵修者非爲徒然如世中禁術若非傳受則用之不行舉此一言足以深悟玄都律曰道士女官身上佩吏兵不得浪傳授他人道法若有至心精勤之人聽可若授惡逆之人三世被考自然訣曰傳授先齋三月或十日三十日二十日竟師與弟子俱登名山峯壇石上傳經弟子受經之後若便有至人丹心好道者乃齎寶信求受可授不須年限竟而無其人後聽并傳其法信爲一切作福田不得師自私用其罪深重明眞科曰浮好三寶執心不專輕怠經法穢慢靈文或傳授弟子不依科年或不關天地私傳無盟自作一法違負四盟或齋戒怠慢慠忽上眞其罪深重死被髠鉗循上劒樹八達交風吹樹低昂足落刀山往返無數手體爛傷痛不可忍毒不可任萬劫當得還生下愚之中或嬰六疾聾盲不聰長與道隔永遠學門轉輪五苦沉淪罪因不得開度長植惡根非法傳經自招此考師資貴愛妙之道也
