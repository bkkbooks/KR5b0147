front:
  text: 要修科儀戒律鈔卷之十六弔六
  hash: sha256:5b7ff554a9e2154b3d0cba4d376ddfe9c32015cba66381caab22fa0cf2b4c778
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_016-001a, image: hfl/0207/0207-060.png}
body:
  text: 三洞道士朱法滿編梵誦三契禮懴文衆等伏聞至聖髙眞慈哀六道冥寂大智怜愍四生情慮溺此愛河神識沉斯苦海以其善惡命根因縁未絶生死報對倚伏無窮雖復智火長然神光不照寳船恒泛舟檝未過所以生此世中身非已有今日亡人某甲見道聞法奉誡修經以鳳篆陶心龍章瑩質情超十轉智入九玄知二世皆空識四大假合仙期未滿更須改易恐存亡業累脫有違餘果報因縁或繫愆咎皆藉福田悉俟功德即時法衆爲某甲家五服亡靈三師神路頓顙歸誠運心頂禮禮太上無極大道十方應現聖人願降神力救度亡者濟拔窮䰟解除罪報皆得遨遊淨土練識仙宫受號玉京證果金闕混合正眞無上道竊惟衆聖岀化種種度人眞仙示現時時顯迹或作形像乍留聲教引接凡夫令無苦報念其出生入死疲勞心識捨身受命困辱精神未曉受納前縁寧知將來後際漂浪忘反輪廻不息如慈悲不救终没罪田今日某甲少秉竒操從師問道參經奉法布德立功功德脫有未圓幽顯須應福助衆等齊爲俱發大乗之心行上士之業普爲十方世界帝王國主君臣吏民受法師匠出世學士悉爲專情稽首歸命禮謝三十六部妙經金簡玉字龍文鳳采九品眞言五方正教特希玄力廣度公私同得眞仙俱蒙慧解四逹圓明六通具足弘闡三乗度脫五道咸令自在皆趣道場今此世界人倫生命由來斷促四大虚假五常浮僞如逝水之不停譬石火之飄忽所以白駒難駐黒影易流千載斯須百年幻惑縱如彭安亦從物化自非乗龍之侣何能獨免若大期應盡誰能運力以今某甲捨身因縁難被生事宛然由在光顔無所對晤豈親友感慟亦使行路嗟傷萬古長辭一生永别衆等皆爲廣發慈心普逮十方一切含靈抱識天神地祇𡨚親平等及世間苦受地獄罪䰟名相所緫胎卵化濕悉爲稽首歸命禮玄中大法師得道聖衆願以六通智慧放五色光明普度幽顯咸今安樂使惡縁銷盡善業成就有識四生皆歸三寳三禮竟乃三契宿命有信然人命以銷盡大賢樂經戒巳上並二孟之意三契竟案二孟行吊慰之禮後更讀移文恐煩重吟三契訖即一人讀移文不須如俗法言故自有也竟内移前鬲子中内外皆辭拜别著蓋未可下釘即奏章章畢下釘哭泣布總髪行吊慰之禮章法還書移文前經法衣物别紙書章謹條某州縣鄕里男生大洞弟子云云泰玄都正一平氣云云上言謹按文書右牒男生三洞弟子某出身入道叨禀至法妙品圖篆略備而不能幽居習誦夷神抱一逢迎人伍染累風塵罪結過滿身盡神逝以今月某日某時謝命天地長没土官旣有生時經寳符圖法具衣衾等物便以今日某時殯殮尸形緘封丘塚恐生犯死謫或爲故氣禁忌之鬼山川妖僞之精拘閡死人不通道理又恐地下四時主者篙里父老丘丞墓伯地下二千石不相安隱謹條經書歛具遷件如牒謹爲伏地拜章一通上謹臨尸使者關歛君吏一合下監臨殯歛安隱骸爽長寧蒿里隨業轉輪功成事畢所請衆官謁還天曹列受功賞進秩如常科比無令失意有恚恨者生死犯並乞原赦恩惟太上分别云云右前是臨殯章須大治道士受破殗籙者奏之旣有經目不可示外人一兩日燒之若非大行名人歛時必無子弟三禮三契非卒取能兼之上章事須明解一失節度束手無依謹依科撰三歸略陳切要亡人入棺訖先依孟先生作移書了即於棺頭鋪席然香將小磬子打三下歛長訖乃長跪騰亡者情事伏聞法本無生生而有死匹雲中電火如海上波城倏忽不與人期窈冥誰知趣向少時蹔遇所倚爲親念念遷移俱非常保時時捨故咸以哀人今日亡某命偶良縁得生聖代聞經見道奉誡修眞旦暮揖其龍章晨昏朝其鳳篆本圖鶴舉永願雲昇豈悟孔水摧年莊山促壽一朝捨命萬刼長乖思坐起而無從對衣衾而洒淚裝束旣整殯服以施良時入棺謹依䘮禮所有移文具條列䟽讀移文讀移文訖唱三歸依當爲亡者歸依十方大道願降威神拔七世苦根解三塗結縳遨遊妙苑練識仙官稽首至眞無極大道當爲亡者歸依三十六部尊經願玉宇金篇資神養性龍文鳳篆瑩府濤情永離北酆長居南極稽首宗玄自然法寳當爲亡者歸依後聖諸得道玄中大法師朗七覺光明照六通智慧普度幽顯咸濟死生稽首十方無邊聖品事竟内移文於棺頭餘任主人下釘安蓋二孟云若葬日餘至時移棺於堂上安白布幔障前大殮後三曰成服仍於柩左安靈牀東向施帷屏風机褥服飾備具如生時朝中進膳未成服前孝子於靈南頭以布巾總髮薦地北向以東爲上晝夜哭至成服出靈前再拜稽首拜畢至柩所哭盡哀還靈牀南頭倚哭輕者於靈前西向倚哭以北爲上哭拜行吊慰之禮今若按此儀大成難解非但孝子北向西向致惑吊人亦乃從此生疑今酌此儀未成服前以布巾總髮前安白布幔男左女右三日以後成服訖於棺頭南安靈施屏風几褥非但吊者見亦乃孝子左右得宜張法師制與此相似成服儀第六受治以滿籙三五元命及八劵十籙八劵者定志劵昇玄劵賣子劵乞兒劵上清四劵者血液劵神仙劵大度劵通靈劵十籙者除滿籙三五籙元命籙外更有斬邪籙破殗百鬼召籙都章畢印籙九州社令籙太玄四部籙河圖籙青甲籙東野大禁籙十將軍籙右件依小孟儀若大孟無八劵十籙石井公有十籙無八劵依小孟同絲麻三月服男女十五升布爲衣冠若大孟及石井公並云發蒙之教恩情極重制舉哀受吊無成服之儀今按易云童蒙來求我匪我求童蒙若不發童蒙終當見覆昇玄經云先師後師通當有敬豈容敬乃是同服而頓隔依小孟三月以爲通允五千文大誡百八十律眞誥五嶽六甲禁山右件二孟同制小功五月男女十一升布爲裳十二升布爲冠今人不爲冠直爲巾者務省耳按儒禮䘮服以變吉服吉服頭戴冠身上著𧟌身下著裳若按二孟十二升布冠用十一升布爲褐爲裙若石井公云此等同服小功五月男絹巾女練裳今人旣以爲巾何不絹作明學道之人麤衣布褐及其師死更著練裳非但於理有違亦乃人情未可旣言小功五月那更將絹爲衣按䘮服儀云緦麻者縷小如絲實是麻作故曰緦麻小功者布縷旣小用功則多故曰小功布縷旣大用功則少故曰大功石井公雖有此條竊不用也請依二孟未葬之前布冠布褐若其葬畢布巾布帔自然中盟三皇五符七傳寳神等經符寳神即洞神經也右件二孟同制服大功九月男女七升布爲衣十一升布為冠石井公直云九月不言升數靈寳大盟眞經三品眞經即上清大洞眞經也三品是上清受道經有二品經目合三十五卷三籙一八素曲辭籙二上皇玉籙三謂三天正法籙三奔日奔月奔星奔三奔即是三景受上清三奔登上玉清景上清景太清景今受三奔得稱三景弟子右件二孟同制服齊衰期男女四升布爲衣七升布爲冠心丧三年不從讌樂若前來五千文自然大盟等三條中經法同是一師受者皆服斬衰三年從極重之制飮食言語觀聽寢處皆依孝子本儀竟則服吉而無餘禫今人大盟之師則一期散髪上清之師或去無服或至三號或云九月非直不識三品三奔三籙未知三品復是何經直據七傳是上清枝條因而即服九月坐由不覩經卷觀覧豈復能周師以慕廣輕傳資乃愛紫爭受陶先生云古人以爲皮好吾今以爲耳學信哉斯言豈其受得上清見經而不識旣不識法豈得慢師上清大盟同是眞經俱存重服請各思審二孟乆詳經師籍師右二孟云二人而言服經師小功籍師大功亦復看師之輕重看師輕重者為師三年為籍師一期爲經師大功為師一期籍師大功經師小功爲師大功籍師小功經師三日爲師小功籍師三月經師無服若師爲籍師皆輕弟子於師又輕各從減之也同學右上二孟同制緦麻三月日服師爲弟子右二孟云師爲第子例一等爲師三年報一期齊衰者九月大功者五月小功三月石井公云報服同弟子唯不解髪耳至知俗禮所明以卑厭尊從二孟爲九師年過老若不勝衰心䘮而巳二孟云門中弟子爲師依經說度脫生死恩重二親而居䘮事周不同俗禮旣無凶苦不爲拔經諸餘服紀皆依法輕重以爲制度石井公云報服所養生小成拔並須散髪不限受法大小若着服者臨時自裁送葬儀第七若是大德名人可依鎭經五練生尸經預書五石一依經法此不具載至葬日行䘮以入塚經寳旋安供養香花幡蓋伎樂誦詠次第施列在前道士從䘮者於後以靈轝次之亦幡花於前次第三祭食轝第四䘮轝轝後孝子是其弟子重者在前輕者在後若有俗人孝子最在後若船行應尊者在後終令前吉後凶次第逐時當消息也至墓入廣安置法取中前入棺安經塚前供飬依法安靈牀塚右設祭於前男考塚左女孝塚右從道七正正向塚對經行道懴悔讃誦行香都設畢齊食竟弟子於祭前誦祭文竟哭盡哀畢起辤經法畢内經於塚中若路遠又以時消息之入棺竟於柩頭安石牀案子置上内所將經法置中安仙童於左玉女於右神仙兵馬安塚口兩邊龕前又安方牀施几案紙筆硯墨手巾香火等物孝子皆拜奉辭塞塚竟行吊慰之禮畢還巳上並二孟所制滿案其俗禮貧冨有宜徧歷眞經亦無等制佶然還䰟水上仁安反𩲸火中古以野爲棺莊周以天地爲槨豈專在禮法度數觀於衆人之耳目哉若以生能重道德死必賤形骸隨事變通逐時増減不在一二三四之數安靈儀弟八二孟云次靈牀位五尺牀南向施屏帷帳幔衣物隨四時法牀前安橙列香火巾笏梳刷服飾朝旦安几褥暮移别牀席安枕被晨仍卷取朝中進食眞楊枝淨水手巾一如生時所須四時用物陳列咸在二孟云若公王父伯師長來吊孝子出戸外迎從别道還靈東頭倚哭以北為上次輕孝於靈前北向倚哭以東爲上尊者進客位位位亦以東為上伏哭五聱音來吊孝子跪受尊者撫手仍再拜畢送至迎處還倚哭畢若俗人重者不須拜若次重者直出靈東頭倚哭客哭竟來吊跪受執手客去哭訖若平人吊直依次坐哭受客吊吊客卑者直禮拜不執手若次敬者跪執手平體者直倚執手客若法俗中有親縁者吊慰竟更於靈前倚哭展哀乃去若客自從有䘮以來未經相見者雖於孝子平體亦須出倚哭受吊弟子歸本觀儀第九二孟云若非時節各還本館者則安下下牀於北壁下南向以西爲上坐哭受吊若客尊者跪受執手平者坐受吊施安客位於西壁下安五尺牀東向開後客東向以次上牀以北爲上伏哭五聲起吊孝跪執手如前今人不安浮靈請以空堂受吊孝子居寢處安素下牀除舊屏帷以蘆發圍牀户懸白布幔蒲履言語對而不間除服儀第十二孟云自從初七二七三七至百日周年隨心功德竟過此靈上朝中無復施設唯安香火至再周亦可除之滿意言亦可除者當知有不除之義旣無名德豈乆安牀張法師云安香牀弟子旦夕哭泣三日内設齋中時下齋食至四日巳上設清水一盆百日訖毀座除服隨輕重也旣是名德百日恐情所木申今若是至德朝野共尊雖劒舄委形神昇天闕所在號慕瞻仰几筵若永安牀不俱恒例如弟子中受法至極而服斬衰可再周安牀若弟子盡服一期者可一周安牀若服九月者可九月安靈若服五月者可五月安靈有三月服者可百日安牀若過貧窮又無後胤雖安靈席空設几筵進獻靡增塵盈垢積安雖乃易除甚將難如情所不勝請隨時消息若各德旣不過人又無後胤殯葬以足送終如例不煩靈席若是絶於世事含光藏輝名譽如泡身形似夢不求厚葬無事几筵旣有遺言各隨所況也要修科儀戒律鈔卷之十六
