  text: 要修科儀戒律鈔卷之二唐二
  hash: sha256:9f6e49b4317cd6f5f6e8abaa09a4586e1d64cc65f5e87ec10d6bbda539e9e414
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_002-001a, image: hfl/0204/0204-026.png}
body:
  text: 三洞道士朱法滿編寫經鈔夫龍章炳著鳳篆流慈紫筆題篇青林奏響浮黎國土廣度天人冶錬池中高明智炬皇人注之狑曩劫青童授之於往年既開元始之章便勒帝君之筆法橋以架福岸可登抄寫書治於斯見矣本際經云若復有人紙墨縑素刻玉鐫金抄寫素治裝禠絛軸流通讀誦宣布未聞當知其人巳入道分名書金格列字玉篇大戒云抄寫經文令人代代聰明博聞妙𧷤恆值聖代當知今日明賢博逹皆由書寫三洞尊經非唯來生得益及至見在獲福大戒云抄寫尊經一錢巳上皆得七十四萬倍報萬錢巳上報不可稱然捨一得於唐二一萬倍常所譛嘆何況七十四萬之倍功德巍巍富貴之家可是虛受千真科云若寫三乘經寶本寫大乘而寫中小者得五逆罪本寫小中令寫大乘者無犯存念呪鈔夫經出聖口法乃凡修妙意難詳粗心易滯既立文字必不孤然部秩有殊存念亦異依所誦習各明典制一誦本相經存呪先鳴法鼓三十六通禮經三禮呪曰玄玄至真道清淨歸冲實天真洪曜集百靈交景日四輩傾心享故集大仙質天堂周時開咸爾等檢膝妙品布宣化拔度三塗出二誦黃庭經存念四極盟科曰誦黃庭經當燒香清齊身冠法服入戶北向四拜長跪叩齒二十四通上啓髙上萬真玉晨太上大道君甲今當入室誦詠玉經錬神保藏乞胃宫華榮身得乘虛上拜帝庭畢還向東四揖太帝又叩齒十二通上啓扶桑大帝暘谷神王甲令入室披詠玉經乞使靜室英芝自生玉華實耀三光洞明萬遍胎仙得同帝靈畢東向誦十遍為一過一過竟便還北向四拜東向四揖不須復啓若違科風刀之考三誦老君經存念太極隱訣曰先燒香整法服禮十拜心存玄中大法師老君河上真人尹先生因開經藴呪曰玄玄至道宗上德體洪元天真雖逺妙近緣泥丸君宫室皆七寶窗牖自然分清淨常致真駕景乘紫雲日月左右照升仙長年全七祖上生天世為道德門畢叩齒三十六通咽液三十六過先心存左青龍右白虎前朱雀後玄武足下八卦神龜三十六師子伏在前頭巾七星五臟生五氣羅文覆身上三一侍經各從千乘萬騎天地各有萬八千玉女玉童衛之讀經五百言輒叩齒三咽液三也四誦上清經存念金籙簡文曰讀上清經當北向經前九拜向東上座左轉北向玉經隱注開經藴呪曰微微玄宗門煥朗徹崆峒至道由靜默當見三素宫大道於比成𩥵景乘雲龍左右侍經人玉女及玊童身濟不死津解羅順靈風七祖及胎生世為神仙宗金籙簡文云當叩齒九通思九色雲氣覆滿室青龍白虎師子玄龜仙童玉女三界五帝之官備衛左右前後便行乘天偃地而誦經經竟當從西面下床禮如初玉注云叩齒三十六通咽液三十六過先存徊風混合帝一百神萬真然後讀經五誦靈寶經呪金籙簡文曰讀靈寶經當東向經前燒香禮三拜北向上座玉經隱注開經玄藴呪曰寂寂至無宗虛峙劫仭阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界塗慈心解世羅真人無上德世世為仙家畢叩齒三十六通咽液三十六過存五藏五色之氣上注五星之精而讀經六誦三皇經金籙簡文曰讀三皇文當南向經前燒香再拜西向上床左轉南向玉經隱注開經藴呪曰太上定神符勒命天地惠聞召不俟駕萬仙倏忽萃招靈無小大豈況於滓穢清齊絶人事眇然與神對上升玉清宫遨宴九遐外畢簡文云當叩齒三通思三色雲氣覆滿一室青龍白虎朱雀玄武備守四方神童玉女營衛左右咽氣三過而誦經經竟當東面下床禮如初七步虛玉經隱注曰誦步虛經時先叩齒三下咽液三通心存日月在已面上從鼻孔入洞房金華宫光明出項後煥然作九色圓象薄入玉枕徹照於十方隨我繞經旋回而行矣日從鼻左入月從鼻右入畢又叩齒如初因誦命魔密呪百姓齊威儀云命魔呪曰黃中䇿氣斬妖宗察制強精斷邪翁太上有命太上房急召北帝詣玉宫受承威令宣魔王五氣蓊鬱與命衝祕藏玉文方就隆三天運明六天運終賢者哉都講可唱云衆宫各思九色圓象咽液三通存命魔密呪步虛如法入出道戶存念金籙簡文朝入道戶齊堂於戶外叩齒三通呪曰四明功曹通真使者傳言玉童侍靖玉女為我通逹道室正神上元生氣入我身中便進老子存思圖曰四明功曹一人通真使者一人傳言玉童二人侍靖玉女二人金籙簡文云夜入道戶於戶外向戶叩齒三通呪曰四上功曹龍虎使者正一生氣侍靖素女夜有啓請願開明童子上玄少女與我俱入黃房之裏通逹所啓皆使上聞便進老子存思圖云四上功曹一人龍虎使者二人侍靖素女一人開明童子一人上玄少女一人金籙簡文云出戶又叩齒三通呪曰出隂入陽萬神開通關啓事訖請閉黃房侍靜玉女明備神宫存思圖云玉女者是自然妙氣應感成形形質明淨清皎如玉隱而有潤顯又無邪學者真階漸升進退在形出入在道道氣妙微洪纎畢應應引以次從卑至尊故白日則玉女守宫夜則少女通事濟度危難登道場也金籙簡文云夜出戶左顧又叩齒三通呪曰玄上太隂八窗開明向有所陳少女通靈事畢復位萬神潜寧講說鈔夫真經聖典煥發諸天玉字金篇流傳今日道深甚奧祕藏難開若非大大能人寧使迷迷見曉一明背向者升玄經曰講經之時法師與經師對坐座髙五尺坐時東西南北隨便以三拜為限二明存思者老君存思圖曰上講時先存三色次存三一行道有六時上講恆三時食後上晡人定三時入齊堂捻香禮三拜巡回依次坐坐竟有衆者法師以板擊席仍放板膝前臨目握固存頭氣青兩手氣赤兩足氣白三氣繞身訖次存三一者三處之神同一道也其道本一應感成三三界內外無乎不在統化主物號三天太上宣教侍經號三素老君降人成德號曰三一三一在人人有三宫頭腦名為上元宫其神曰夷心內名為中元宫其神曰希臍下名為下元宫其神曰微皆如嬰兒俱長一寸靜坐正拱無欲無為體無應有次存三師先起向座於座前禮三尊三拜次仍存經師籍師度師各禮一拜合六拜乃登髙座次存侍衛登座大坐斂板當以鳴鼓三十六通咽液三十六過臨目見左青龍右白虎前朱雀後玄武足十八卦神龜三十六獅子伏在前頭巾七星五臟生五氣羅文覆身上三一侍經各千聖萬騎仙童玉女衛之夫存思為靜念之首入定為息慮之端辨鑒神遊不疾而速座下以存三師三一上座又思侍衛威靈三拜足表三尊六拜乖於四衆今座下無勞存思但三拜訖上座安坐先存三一次三師後存威靈侍衛稍將簡要存思之法心想易周過事盤回乃近時務謹依舊典書而述焉三明讃誦本相經云齊主請法師開講便起三上香齎香爐詣法師前三拜長跪請曰弟子等千載幸㑹遭值法輪元始遺教流布於世今日某雖復奉道希聞靈音唯願法師流布慈澤法師許欲升髙座詠曰弟子仰法師敢啓有所陳衆生暗塞久思聞至法音大慈開長夜設化萬劫新主人建福齊延及四輩人法師升髙座時詠曰齊直道所務妙品元始貴故設祖劫橋廣度諸民物爾曰設清齊帳座羅五色天仙遊誕上五帝列方職功曹傳符命擁衛左右直我升龍輿座玉梯附機息神霄助授護天魔不舉目五神不移動披宣太上域定座詠曰大道無為中積氣運起形為衆設橋梁故遺無等經修之得長樂莫有三界生燒去六塵垢一心靜念聽下座詠曰妙品演布化迢迢霄玄音等受無礙智三梁度黃津神霄功曹使疲勞小停神三㑹因勞賞當報不負言須啓更當白便曹未恚懸下座服居位禮拜三寶尊夫論修建福田皆希言簡事要類以繁重行者難遵今人唯受齊主拜請兼以上座下座讃詠足得以成法事何俟曲碎云為故兩存焉恐情有去取耳發心鈔發心者聞說大乘皆須夷心注念歷耳雖言是一悟入即乃不同有六種緣緣行不等一則或見邪託正則知非正二則或信邪是正則以入邪三則或聞大悟小則入粗四則或聞小悟大則入妙五則或從心進乃白發願六則或從心退乃自成咎亦由說有巧拙亦由悟有淺深本際經云若悟理明師巧說諸法無修無得無滅無生非有非無非因非果而有而無非不因果巧解因緣假名中道解此說者能感異類如本際經云天尊一音演說法衆生隨類各得解又如本相經所明天尊於禪黎說洞玄真文七十萬劫不起于座七百萬衆悉不迫迮十方龍王放光而來聽法天尊弟子靜惠云龍獸尚復樂道而況於人言畢龍王忽怒興雲下雹積髙十丈於是天尊有五色之氣結雲成縵上軒雪雹不傾不動說法如故有此威神十方通悟本際經云若說小乘有得之義生滅相法有有有無有因有果如是說者名為明師大真科日當聽法說賞議五音調和五德時習讃詠長逺鄭聲和言徐語漸息靜辭誦詠靈文應和法唱久剋玉響世音之根永斷若修經習業以千文為先講說令通度人濟巳化物無窮此為大乘之人雖才議未堪當發勇猛之志願得大乘超出三界勿戀小乘貪著利養樂人天樂為私已之業苟存細益忘忽大功為人齊章規化䞋信醉酒耽色聲味快心假言大乘實不能解所學小術妄求大成誤巳墮苦可悲玄都律曰法師宣化天下萬民是救蒼生之道不得貪財傳奴婢等法違律考病一年若有德法師為行清苦上衣法服理合供養大戒云施散法師香油齊食法服一錢巳上二十四萬倍報功多報重代代豐有恆無窮乏一則若見邪為正則知非正者如真藏經云突敖國王恆信正道妖人來欲化王令習僞道變形騰空音樂讃誦宫人綵女觀之迷惑三七五旬遂無悟醒王告之曰汝是妖邪急須早去妖人言我是正道勸王修善王曰我聞有道之士藏名匿迹人衆不知正道杳冥有形則僞命臣通靈令與論說通靈曰外道多僞不足堪談共論惠源形無立所仍即絶對竄影逃蹤三千餘人更無敢出自然磨滅國內清正信向大乘當知邪不害正其來久矣二則若信邪是正則以入邪者如真藏經云自通國王行善智劣為野狐所惑野狐語群狐徒衆云自通國王樂善棄惡智淺不深我有妙術能飛能隱向王殿前去地百丈為人端正談空解義使王布施捨命攝歸共食可非上計群狐徒衆俱聲唱善狐王因誦幻術經文數百餘卷飛王殿前去地百丈坐虛空中口誦經典國王眷屬大小悲泣嗟嘆無巳出國寶物悉皆捨施復有三十餘人一時捨命狐王唱言捨命之人最是上士忽作疾風死尸寶物悉皆攝去到群狐窟共食人肉復遣狐子變作人形齎寶市貨至屠兒行中猛狗爭骨相囓狐子心怕不覺變形狗便囓殺屠兒惶怖即告市宫官告州州即申奏王見寶物俱皆自識王云此物並將布施聖道何故得在野狐手中時有大臣名曰仙靈上白王言前所說經教化此是狐魅但誦其文不解其理勸人作善心口乖違飛行殿前即知虛僞王曰錯失奈何仙靈曰可集軍衆圍彼丘陵狐即變作人形迎王再拜猛狗來逼變為野狐狗即囓殺王命群臣鑿土窟中大得寶物當知王無深智為邪所惑三則若聞大悟小則入粗者如升玄經云道陵所問云衆中小行者多大心者少若其不說無由可悟若說大法恐忤小機如說小乘復忤大行天尊曰此其不難機在請緣不論多少小緣請者即為說小大緣請者即為說大其中悟入亦復無常或有聞小悟小或有聞小悟大或有聞大悟大或有聞大反小昔有善男女等八千四百餘人雖解信從執求上道起有得心求無得想封執大乘人成不業經四千餘載正得地仙四則若聞小悟大則入妙者升玄經云天尊云我於始青之天大浮黎國初說法時有一地仙厥乃姓洪名曰法起為發教緣請我開說我觀其人未宜說大即隨其心說三雜經爾時大衆無億數人其中乃有一十八萬六千餘人聞說小乘深悟大道即超三有逈出道場五則若從心進自發願者本際經云若有讃說敷揚妙義應當讃嘆稱其功德無使外魔破亂其事又云若講其義趣勿使法師遇諸橫惱明以資須給其所乏要令妙教必得流通本相經云天尊說法之時八萬四千之衆心開意解發無上正真之心而不退轉即除七十二結百種煩惱又云有長者子名曰法龍信解恭敬有七十二萬人皆心務真空無上之道真藏經云天尊說法之時有三童子發願各别一則惠力童子發願修習二則寶明童子發願說經三則山際童子發願學道經云有惠力童子及諸眷屬俱發願言修習大乘誓無退轉了諸法性得到邊底悟解大乘成無上道又有寶明童子發弘願心講大乘法誓度衆生到解脫處成無上道又有山際童子勇猛精進發弘誓心學大乘道條四大城決五逆賊除七惑鬼殺十礙魔刳無明障刻三賊心堅硬不退又云有大弟子修行讀誦講說尊經能生信心常行不怠當知是人於諸尊所施行功德而種福田無量劫來尊師大乘今遇此經能生信心六則若從心退自成過咎者升玄經云有八百七十二人聞說大乘有八男子十一女人生不信意從座而退為天魔異道惑亂其心此輩即得重病髮毛墮落死入三塗生輒聾盲縱有耳目好言善譽初不聞見當知悟法深淺總從心生以此諸緣足明證信受持鈔有四緣夫以經文誰而能入雖云空有非修不成若以修持要乎真確行合規矩道位遷升穢慢靈文罪罰明矣一明讀誦緣者四極明科曰誦經當令言句相屬不得越略天音失一句更却一百言而讀失二句却二百言失至五句却五百言始就誦失一句便誦一篇而補之至三十犯刀山之考又云誦經當令目注經文心念神真不得臨經他念異想以亂天音三十犯刀山之考又云誦經千言以下不得臨經進飲千言以上至五千言得一進飲五千言以上得二進萬言以上得三進至三十犯身被左官考若至萬言神疲氣極得中住消息後得續句竟篇雖爾不得經宿殘句十犯死入地獄誦經時有善男女欲聽者得男左女右東西異位道俗殊别不得男女混亂同床共席要在出家人後不得前行有犯身被左官考玄都律曰若通經語論及世務罰油三升又云讀經忽亂請問敗句罰油五升請問下云讀誦如對太上勿得傲慢狡笑論及流俗榮利之務侍經仙童即奏名於三天司直三天司直上奏太上三奏太上子必失經鬼神亂考必不得以壽死將何仙之有又云經不從師受則侍經仙童恆司考人殃及七世金籙簡文曰上座誦經當禮經師籍師度師各一拜餘如常法皆始登座一行之後重誦經則不復如始也明日更一過行之耳誦經之次不得與下座交語經句不竟亦不得中住若住後皆更從上始五百言得進清飲咽液也此與前四極盟科稍有通塞盟科云萬言得中住即從前始前似稍通此文全塞誦經時得存念節度并不犯科條立有靈應本際經云若復讀誦此經依經修行晝夜不懈是人所在之處自然安樂隨所往生得居淨土又云若復有人於此經中受持一句意樂諷誦一念之中即能滅除無量無邊宿根罪惱譬如積夜暗室一念燈明暗暗皆盡若入大海遭值惡風誦念是經風浪恬靜若入山林逢毒蟲猛獸誦念是經蟲獸却退若值盜賊𡨚家相逢誦念是經𡨚仇渙釋若在怖畏誦念是經鬼魅消却當知夷心注念無不果剋大梵國王為國大旱迎請尊經以滅旱災多惱國王國多障難迎請尊經故疾新痾並皆痊愈當知經有威神誦念必應太極隱注曰誦道德經常有三萬六千仙童玉女侍經燒香散花通致衆仙隱注又曰誦道德經萬遍雲輿下迎若不至可一月三誦之無不至者真藏經云昔有玊印童子燒香讀誦此經忽有仙童玉女遍滿虛空一時來至燒反風名香讃詠靈文驚動一國玊印童子安然不恐今日建齊之家亦選能人上座誦經者雖妙極音句座下者曽不存心或閙語喃喃兩兩相對或爭色欲或競錢財大德髙枕安眠低頭踞傲上既不能秉正下則豈為虔恭一則交闕威儀二則不生善信三則主人鄙薄四則宣考至身幸須三思寧繁苦勸大德若能勉勵法衆何慮不從頃不切磋是滅道法二明聽誦經之得益緣自然經訣曰聽誦經人至章句輒心拜隨意願念唯令心苦必有感應玄都律曰若聽經倚據不正罰油一升若不注念清虛心想意倦為衆所覺罰油三升若能心聽誦與自受持無别本際經云若復有人一心正念聽讀此經歡喜踊躍得其義味忘於寢食不覺為久當知此人過去世中巳曽聞值暫生下世寄惠人間不久仙度終歸得道三明供養持經緣真藏經云天尊問善明童子有人將金玉重寶並悉捨施此人功德以為多不答曰功德希有然不及於此經中講說書寫受持供養功德勝彼百千萬倍此經名為惠力法城善護群生除邪惑障本際經云若復有人捨家資財或賣妻子市諸香油種種法具及以齊食供養資給持此經人所得功德最為無量何以故是人能成功十方天尊出生衆聖故升玄經云供養持經者功德相亞次供給香油燈奉上幡花本際經云若有國王及以民庶殿堂帳座寶蓋幡幢香花燈燭供養此經者汝等四衆及諸天帝三五吏兵天龍神鬼金剛力士侍經真官應將徒衆隨逐尊奉禮敬供養護其國土保祐人民本行經云昔有女人奉受是經晨夕誦習夫恆供給香火婦遂升天受號今為梵行元君夫後命過經入大山具陳供給之功婦即來授夫是經即升南宫百年得生國王之家大受經法令為九宫真人又有賢士受持此經婦意吝惜不與夫同夫得升天婦後化為餓鷹夫以化度還為女身受持經法今為南極元君皇妃當知持經奉法明明不虛誹謗慢黷自招其考四明謗法緣真藏經云衆生不信法者是為謗法是為滅法不信根中而有三寶不信去來而為真實不信大乘而為根本不信衆生等天尊性不信諸法寂滅無根無因無果不信衆生從無量劫積種未形而無生滅如此不信是名毀法是名滅法法不可滅障法不見名為滅法既滅法巳而得身相是為生死輪回不絶必墮地獄無緣得出本相經云若見經法忽若土草了無恭敬之心見他行善背面呰笑永無助仰之性斯人從六畜中來始得人形故不信法真藏經云往古劫時有五貧士不信經法不信衆生有真道性不信衆生即經妙法不信衆生不生不滅不信衆生心大如海不信衆生為太空聚如此不信即得重病生入暗獄死入暗獄食入暗獄息入暗獄諸善男女各自思惟勿生不信天尊因作頌曰為人不信法毀謗於賢良死受酆都報劒樹碎形傷萬劫無期出魂神痛斷腸呌聲聲不絶獄卒染鑊湯受報無休息瞋眼四邊張誰能受此苦迷惑亂猖狂寄語修真子修福永無殃然聖人之言本無虛誕為不信法自以招殃若更語云經有萬八千玊女玊童侍衛益不信受或以敞露或雜世典或不洗口手或無護淨但不依讀經儀則即名誹謗請問下云經汚不以香水洗沐則魂魄奔落本際經云若復有人誹謗此經生不信想輕慢法寶疑毀聖文當知此人無量劫來沉淪下鬼受諸苦報備歷異形始得受生還於人道愚癡觸辟無所解知習惡種因不能信受所行非法動為罪由背正入邪違真信俗三官九府記入功過書名黑簿死録之中或在見世恆縈諸苦或犯王法執繫鞭笞或在惡風蟲癩之病憂厄惱難貧窮困乏或為外魔異道惑亂其心雖在世間人所棄薄周詣遊處不值善緣一失生道永乖賢域死入地獄無有還期受報幽牢緘閉重檻晝夜考掠不覩三光或抱銅柱形體燋傷或上刀山痛毒難忍𡨋𡨋長夜萬劫無出縱得受生還為六畜非人之類永失人道總明經法諸緣以畢於此開經受誦子細詳之要修科儀戒律鈔卷之二
