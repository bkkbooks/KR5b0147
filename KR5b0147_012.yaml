  text: 要修科儀戒律鈔卷之十二弔二
  hash: sha256:19641258b8ed48f866bd6722e67daf82bc03950d8e4ce2069b653d2a3b4b1c91
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_012-001a, image: hfl/0206/0206-038.png}
body:
  text: 三洞道士朱法滿編飯賢緣第一夫聖教興道風著賢人出聖德隆感應之理既彰飯賢之儀見矣太真科曰家有疾厄公私設廚名曰飯賢可請清賢道士上中下十人二十四人三十人五十人百人不可不滿十人不足為福賢者廉潔亦能不食食亦不多服餌漿藥不須厚饌是世人所重獻之崇有道耳此時應須立壇先三日清齊後三日言功賢人身中多神故饒之德重故厚之食以飽為度味以適為期供食一如齊食不得葷穢犯者五刑論客月以經三請不可條名貪腆之客不可數啖天廚其科中委細十以上紙今人不多為此廚事故不具抄耳玄都律曰三㑹吉日質對天官教化愚俗布散功德使人鬼相應而有雜穢者殃及後世主者罰𥮅一紀律曰正一左右平氣以上一人當七人望丘治道士一人當三人諸佩籙吏兵以上一人當二人更令童子二人當三人散民一人當一人生男上廚生女中廚增口益財下廚律曰道士為人解廚須擇大德之人善心者不用惡逆無禮之人解不得福違律罰𥮅一紀律曰夫為廚客一時來不得參差坐並皆心存太上善心不得語殺生畋漁獵捕之事違律主客被考病三年律曰若道士為人設廚時客前燒香不得葷穢違律考病百日造殿堂緣第二夫立善方假慿慈力取證因果要藉信生功德著於因前妙因彰於來劫者矣太真科曰俗人能施散家財造治堂精室一間瓦屋賜小𥮅百二十三間三百六十𥮅功多𥮅多大戒經云建立靖觀令人代代門户髙貴身登天堂飲食自然常居無為施一錢以土皆三十二萬倍報萬錢以上報不可勝本際經云大梵國王國中大旱轉經得益乃於國中造大精舍本相經云清和國王崇信道法建習仙觀及習靈七政二廟本記云周康王時文始真人結草為樓觀占星候氣真人得道後周穆王欽尚遺躅重葺屋宇號為樓觀焉并為真人建廟立祠秦始皇三十一年又於真人南置老君廟本傳云漢武帝以元封二年正月甲子上嵩髙登大虞石室起道宫使董仲舒東方朔齊潔思真念道緣第三夫道妙難階寂而莫測虛而能出用而不窮五念彰於聖儀一心通乎真相者矣道典曰子常念道道亦念子憂患思道疾病思道貧賤思道窮困思道飲食思道入山澤思道涉江河思道常行思道道與子并道之所出萬物皆生萬神皆成無所不榮亡道須㬰身入八冥因緣經云念真心不退忠信不忘言供養諸道德所生無艱難又供養好道德齊戒見真王靖念心不懈七祖升天堂妙真經云道人圖生蓋不謀名衣弊履穿不慕尊榮胸中純白意無所傾志若流水居若空城積守無為乃能長生道者一也人能知一明如日不能知一土中出道無取正氣自居道無去邪氣自除此非禱祠鬼神之道也握之不盈於手縱之布溢四海學生者生學道者道如人墮水知泅者生不知泅者死未病者易為醫未危之國易為謀不好道之人存念各别鶉鷃髙飛志在苖禾鴽鵝髙飛志在陂池鴻鶴髙飛遊於太清之域往來九州棲息八極乃得其所也此二鳥憂喜不同其志各異而谷自謂為得其所願也故大水之淵神龍所居小魚走出髙山深澤虎豹所樂雞狗所惡故規矩不同百姓心異是以為道者損聰明棄智慮反真歸朴遊於太素輕物慠世昭然不汙喜怒不嬰於心利害不棲於意此大聖所體行也老君禁戒經云夫積德成王積怨成亡積石成山積水成海不積而成者未之有也積道德天與之地助之鬼神輔之鳯鳥翔其庭騏驎遊其郊神龍宿其沼故以道蒞天下天下之德不以道蒞天下天下之賊堯舜以有道昌桀紂以無道亡殗穢緣第四夫神氣清虛神靈所守身心混濁邪來害人入靜思真要須防患不履衆惡吉祥止焉玄都律曰民家穢汙不過晦朔不得入治哭亦三日穢三年之喪未滿百日不得入治禮拜奏表章書違律罰𥮅一紀又云遭師主父母大喪三十日殗不得齊章過三十日外限滿訖洗浴燒香違律罰𥮅二紀律曰太一極法道士女官無殗穢哭亦不殗穢佩籙唯著身不用去脫他人律曰道士女官被陽官牢獄繫閉出放皆應香湯洗浣解殗三日以後得入靖治禮拜違律罰𥮅一紀道士及女官私被陽官杖罰瘡未差未滿三十日不得入靖治禮拜呈奏違律考二十律曰帶籙不得入殗穢上溷即無忌諱黃籙簡文曰奉經威儀常當使身香潔芳盛以招真氣不得入濁神靈蕩散考由太清曹若履穢氣考由清天曹三元品戒曰常以正月十五日七月十五日十月十五日平旦正中衣半三時沐浴身形五香自洗臨沐浴時向南以金杓回香湯東南左轉三十二過閉眼思日光在左目上月光在右目上五星纓絡頭上五色之雲匝繞一身青龍白虎朱雀玄武獅子白鶴羅列左右仙童執巾玉女散花飛仙乘騎侍衛身形便即叩齒三十二通祝曰天澄氣清五色髙明日月吐輝灌我身形神津內盥香湯鍊精光景洞曜煥映上清氣不受塵五府納靈罪滅三徒禍消九冥惡根斷絶福慶自生今日大願一切告明身受開度升入帝庭畢仰咽氣三十二過止便洗沐五香沐浴畢冠帶衣服又叩齒十二通祝曰五濁已清八景巳明今日受鍊罪滅福生長與五帝齊真上靈便出而入室依法行道自然訣下曰經汙穢不沐浴一則多令病害二則示民知清濁三則神鬼不為通靈四則侍經真官計罪五則人見交不恭敬三皇經云自解殗祝曰吾以日洗身以月鍊精仙人輔巳玉女佐形二十八宿與吾合并千邪百穢逐水而清急急如律令老君養生經曰晦曰浴吉朔日浴吉千真科曰冬天洗浴每一旬浴先作密室方六尺安水槽火爐筒渠注湯水入其湯以桃枝柏葉蘭香竹葉等內水中煮取三兩沸乃去滓次加五香然作布籠濾湯尊卑以次不得與俗人共浴皆須浴衣不然犯律盜賊緣第五夫出家離俗皆須正念直心入道朝真即合防身口意若使心貪一動猶為萬劫沉淪何況竊盜常行當來永失人道也玄都律曰盜治中及供養之物一丈以上皆列考殺贓過五匹考害家一人盜贓不滿丈考病七千日奪十二年生命盜符籙職契考殺及黃書章印皆考坐若䦨外拾得者不准盜天官租米五斗以上罪入考殺一斛以上入刑殺罪滅犯考病七十日奪十二年生命劫盜取人物一丈以上入刑殺盜一匹以上入刑殺考千日及殺盜罪輸贓偷一匹輸十匹劫盜皆不得入身同收鬼贓十匹收二匹贓律曰罪莫大於劫盜强乞取强借强市皆為盜取不以道准盜論律曰借不還本主貸不償本主皆盜以列上罪借不還主考屬監氣命借貸不還主考屬此律罪滿則凶罪滿則當定八死律曰盜經書一卷考滿千日奪七年命盜天官祕書所用一卷以上罪入刑割殺律論盜衣服食具刀斧成器之物皆加罪二等毁滅罪一等殺盜語盜考屬監倉令盜香爐考殺盜罪入刑殺盜書刀奪生命二十年考病二千日盜函奪十年生命考病千日盜𥮅奪五年生命考病百日盜墨奪三年生命考病三百日盜紙奪二年生命考病百日盜食器杯飴盤榼罍𦈢雜物奪十二年生命考病二千日盜船車罪入刑殺律本相經云寶集則禍門錢聚則盜臻是故道心勤道不勤寶修德不修帛又云賊是人之惡而貪於贓晝夜候使則射空入隂默檐他所愛物自作家有得贓露王法斬魂神入地獄海中抱沙鬼䥫針無休息視之傷人心不學非來塞淫賊罪頗視競共修福德道降入人身欣樂常自在又云道士作偷有罪不答曰道士志存法不得有傾邪佩師無上契存念不得奢施與猶不取況復作偷家剕刖受身刑住還北酆枷禋祠不復立上連七世遐勸世經云劫盜營身口吞刀入腹內轗軻致衰窮申縮不得泰動止滅身命白骨受塵穢終當獲殃考絶族無苗裔憂念無知子不識禍福會何不修善道建功自竭勵功過足相𥙷延年度厄世積善有慶集積惡有殃害但處一生中何為自耻敗玄都律曰傷殺人考屬北平令升玄經云若未見經法之前或手殺人者當救垂死者一人以贖之於罪既除又得活人之功玄都律曰諍訟田宅忿鬪考屬平氣令也過咎緣第六夫欲修身先須避咎貪瞋發於六欲過咎出乎五情動用之愆現於斯矣玄都律曰人身中常有神隨時上白人善惡過滿百二十為病病者令人多凶少吉百八十過為一耗耗者令人六畜不蕃一百九十過為一漏漏者令人善致疾病五百三十過為一小凶小凶者令人破胎傷子七百二十過為一大凶大凶者令人無男多女八百二十九過為一殃殃者令人疾疾者令人瘖啞盲聾千八十過為一禍禍者令人暴夭死亡千二百過為一殘殘者令人出逆亂之人千二百六十過為一咎咎者令人絶嗣無子孫千四百過為一塞塞者殃流於五世千六百二十過為一謫謫昔令人斷無後嗣千八百過為一患患者主為奴婢家出內亂千九百八十過為一橫橫者家出癲病狂癡二千六百過為一暴暴者家出兵刃逆死二千三百四十過為一虛虛者家出反逆父子兄弟自相攻伐二千五百二十過為一增增者家出死𩚑惡病二千七百過為一害害者家出聾巫鬼病二千八百過為一災災者家出骨肉淫勃三千六十過為一暴暴者家出青盲疹殘三千二百四十過為一變變昔家出訟刑獄死門戶族誅三千四百二十過為一怪怪者家出都市乞丏人既死骸棄損三千六百過為一病病者滿應定死也妙真經云罪莫大於淫禍莫大於貪咎莫大於惜此三者禍之車小則危身大則殘家天下有富貴者三貴莫大於無罪樂莫大於無憂富莫大於知足知足之為足天道遺之祿不知止足為之害及已失之而憂得之而喜夫有排門之禁必有折關之咎身死名滅流歸子孫事天以德不以慢於人善功緣第七夫心性粗獷便為俗態未除生性和柔當知上善若水惡既不作是善行也洞神經云天老百善者人有十善必生福子人有二十善神明護巳人有三十善辟除惡鬼人有四十善應死不死人有五十善終身無罪人有六十善道君自存人有七十善得與五嶽相連人有八十善得脫死名人有九十善必為神仙人有百善必升九天本願經云學升仙之道當立千二百善功立功三千白日升天皆濟人應死之難也列記云夫學道修行之士廣行隂德慈向萬物救人艱危度人厄難輕財重道施惠布德不吝財寶救乏窮地啓誓真氣虛心跪請太虛真人曰飲凡人百人不如飲一善人飯善人千人不如飯一學道者老君家令經云道人百行當備千善當苦雖有九百九十九善一善不滿中為利動皆失前功治身關念守戒不廢乃得度世也太上科令云教人攺三過可為一勤勸化三户可為一勤濟施路窮孤寡三人亦為一勤推讓財帛有瞋不爭滿三亦為一勤憂罪疚療治三人可為一勤凡如此等以類求之本相經云功滿一萬飛升太空誦經之士一字為一功功滿三千名列上清若能建立宫觀壇靖經室齊房廚閣供飬道士衣服卧具悉以供給如斯之功受報天宫衣食自然須之便來不用則去若居家富有更能種福修建功德此人即從明受記成道若人之愚癡定有成道之期亦如嬰兒亦有其老但知修善足以成道太平經云惡人入道損敗善人亦知拙匠損敗人材木拙女毁人布帛終無成善功然惡人與善人反如人健時喫好美食大美乃得肥壯若病人食飯苦亦不肯食久久困病而死令惡人聞善言勸喻亦如臨死人喫美食耳反而為惡若善人見善人乃喜賢人見賢人乃喜智人見智人乃喜惡人見惡人乃喜姦人見姦人乃喜各得其類乃喜若子不能盡力事父母弟子不能盡力事師尊臣不能盡力事君長此三行而不善罪名不可除也因緣經云周窮救危急功德甚廣大增𥮅益年壽終身受欣泰又云積善不厭多布惠勿吝惜功德感仙真自然書帝籍妙真經云不善之人不識元首不覩本根詐天輕地罔鬼欺神屬辭變意抱嫌履疑謂之不善不善者動與天逆靜與地反言傷人物默而害鬼故分道別德散朴澆淳辨言治辭依義託仁歆物符驗運以天文廢真立僞務欲傾國開患害之路閉忠正之機阿主之術以順國家權者也升玄經云修善得善其鬼亦善作惡得惡其鬼亦惡是故半在吾道堂半在魔地獄諭如呼聲莫不應也度人出家緣第八夫纍患既除俗情亦異捨恩愛而入道脫樊籠而就真超八度以為心背十轉而齊行者也本際經云大梵國王心自念言我一國土得三寶力唯當歸敬上報天尊乃選諸王子及以國中臣人子弟擇其端正第一聰敏有善心者皆使出家紹隆正法本相經云清知國王詔度國中男女三千五百人令男居習靈廟女居七政廟為國行道樓觀本記云周穆王尚神仙因尹真人草樓之觀遂石幽逸人置為道士以其器均巢許德為物範故令修弘道事本相經云范則子與四人同往大原山中修道三十六年夢見神仙真人項負圎光無鞅數衆更得六年永無髣佛四人退還家則子願在山四人疑恐得道往看唯見太清玉碑上兩白鶴因爾而歸至半山而死化為猶預鳥三身後生西方兩面國中雖有人形而無人情又云炎明國王有女字好求年十五發願出家願捨女身生落男形因感天尊放大光明以照女身女因騰虛白日升天女去後父王思慕即造神仙宫集靈臺四周房三師堂又宣詔天下出家千真科曰男女童子依奉經戒王勑與度作何法得度後合禮父母以不答曰紹隆種相係敬護男女入道揀取端正慈憫有道心者師先戒鍊十行可聽許誦習王勑與度依王法制度合度巳依一大觀嚴整玄壇施安闌纂依明真拔罪之法預度男女於壇南依左右方面以列兩行倚立以度官長正南橫行須一大洞法師於橫行之前設案席然香讃歎曰大聖天人尊歷代所崇敬今有珍貴者是我大國王以發善心故普令入正道得入正道已實由國王恩永離有為情長尋聖境界必得大法利同趣證無生讃歎既巳白新度諸師今日之後禮聖禮真離親離俗人各三禮長與俗别第一禮國王帝主德澤無盡第二禮州縣官長度脫之恩第三禮存殁父母得與出家離俗跪拜三禮訖法師捉新度行首一人衣冠曰大哉聖化衣被無窮星宿為冠曰月為服法行天道勿替四時廣度衆生永超三界法師令大衆普皆唱善彈指三聲脫罪舊人並唱善彈指齊各三聲訖乃總著法衣竟官人行香各行道三周舊人在前引訖登壇歎事訖設齊齊竟各謝法徒從老者起至下竟列坐父母兄弟皆來禮拜於兒女邊父母並稱弟子發願云願師必定成道與弟子等同入正真或云出家之人從少至老有何階級答曰出家之人有五種階級從七歲至十一名蒲車道士十二至十四名清信道士十五至十九名施惠道士二十至六十名弘護道士七十至九十名住持道士科曰三乘之道何以為心答曰小乘之人隱處山林自調自度中乘之人德澤弘普兼濟度物大乘之人忘功絶私發四弘誓願科曰諸勸人出家有何功德答曰能勸他人男女并捨自子出家譬如微塵世界之數功德亦不如勸人捨子等出家之功德縱有人造幡蓋懸至二清境之功德亦不如勸人出家之功德也要修科儀戒律鈔卷之十二
