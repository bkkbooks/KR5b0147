  - {type: variant, offset: 6, length: 3841, content: 满編雜科第一千眞科曰施制立法要假能行衆中無知法者不問多少皆悉不得共住共住之人必須同遵聖教動止合儀惡悉能斷善共保護如勸惡者事在別律科曰道法清虚不希名利閑居靜室謂曰仙家我弟子中多畜錢財寳貨牛馬奴婢躭著不已如此之人斷三寳原奪衆生福錐持經奉戒倶爲滅法科曰上德尊人住持大衆下小有過須避嫌疑若有不和於國王妃嬪眷屬大臣宰輔俗人及兒女小道士淨人宿新怨嫌之前並不得呵責若應舉罰先喚來隱處自以示語情所不堪爲衆所惡及當白衆舉罰科曰出家之人務在簡靜非法行事動則落邪非法者一則廣求利養自說我能二則貪積無窮爲人婚姻卜相三則強稱多解瞻視天文四則行等淨人躬執耕稼五則闘亂朋衆與惡友交遊六則不以正法爲事而與兇俗結黨七則坐起無分混淆法次入則不依正律道俗同床九則闇夜出行而不秉炬自照十則摴蒱𩀱陸劫盗行非恣意所爲而不自戒入道依衆可以去之如不自懲是壞道法也科曰諸小道士所詣名德皆須修飾形儀整頓冠履安詳雅歩稽首三拜拜訖長跪啓曰某甲小末未備法教故以遠來伏願大徳賜垂解結我有所聞必無違逆大德爲白衆今有道士某甲從小以來心有結累不能自解今稽首求悔若從生至今行瞋行怒行劫行盗行貪行一切不善之行於今解釋不敢復犯進學正戒通明義理說竟謹依所說乃起更三拜而退科曰亂衆之人多不依正法飲酒醉亂輕欺上下者罰錢及米或餘貨財當時同和後便違拒不肯輸送因兹杖罰或奪財帛以用供衆或苦役治地斬伐草木鋤禾收刈如一衆不能治罰總集道衆文不能治可送與國王以依俗律科曰若有不依正法遊入他觀妄有輕欺科索酒肉或媒嫁爲人買奴婢及餘畜産或造順俗之制犯罪囚禁遭赦得免或自貨賕方便得脫或奪賊物因利求和律有正科依法與罪也科曰道士女官各須淨行道士不得畜女人女官不得畜男子各使遠離棲肅其心目不見形聽不聞聲道經云不見可欲使心不亂若有此色即須白衆告舉不肻制止國王有法也科曰大觀私房皆多混亂特由尊者不能謹愼縱恣無方或是綱維不出教令身居寳地心穢慳貪導引後生同開惡趣兇惡長養大塞道源使正信者慿心何所科曰共入寳房同開善趣懷瞋動殺咸乖大慈養牛畜馬不免鞭打藉狗放猫專懷殺意凡人淨戒此等並不合畜也科曰人有尊卑戒有小大或身雖奉戒意無在法不修靜舍詣飾殿堂招引兇黨動爲非法聞鳴鐘禮拜大笑入觀見尊德行道外生謗誹特由綱維自爾何能戮力徒衆逓至作法風教日生也科曰若衆中有一人不善可隱處示語云眞品仙階行人所踐道無形相要藉人弘十方法徒助道揚化聞有法要學擬成身豈得有過令他知覺今大德諸行無犯唯有某事不依正道請即攺之猶如月虧更满蘭歇更薰幸相用言共匡法教不得即舉白大衆也科曰出家之人與俗旣別置觀立舍並不得與俗人及家口家住若是十方法衆行往經過看前人德行髙低作三品安置尊車居止要令得所也科曰毎觀舍應須精思别院安置名德中常集衆同在齋堂若是遠方行人來蹔居止即須先問欲何處居才髙行潔精思别院若無竒行請平常居止若是上人請下分可須辭謝改處若才非所處即須詘退科曰精思入定爲性披黃戴幘爲相若淵澄霜潔玉潤氷清爲世福田行無㸃汙宗持正戒有五譬喻一者喻如富貴之家忽生一子而無兩目經渉三月两目忽明舉家歡喜無戒之人猶如無目二者喻如磨鏡漸漸增明有戒之人念念功積三者喻如嬰兒細細長大能持戒者以下之髙四者喻如飢人終念得食不得食故必死無疑不受戒人長淪盲道五者喻如舟航能度大海能持戒者必度生死苦海也科曰若國王大臣施主工匠能有益衆者可供給飲食薪火遇有求索白衆供給也科曰若威勢及惡賊能損害衆者亦須供給食此是不知法人能損壞法衆故也科曰常住錢物不得貸借充私房用其有病患切急白衆求請後一倍償還也科曰非法之物不得布施問曰何爲非法之物答曰牛馬奴婢軍戎器仗等物是也科曰時在饑荒又屬離亂各欲隨豐逐靜能有守固衆可分科財物以與守固之人也科曰若有惡口赤舌兇徒惡黨以相羣聚常懷遠離設使偶會情不獲巳要須口順心違若不能爾交爲切害科曰法物什物造像造經有所施用輕重各別答曰鍾磬幡花鑪合帳蓋寳幢經韞之屬此是法物則重冠履几笏褐帔裙𥜗衫褶等爲什物則輕本心爲重後作輕犯五刑律本作輕今作重不犯像則有三天尊爲上眞人爲中衆仙玄中法師爲下本心捨施造像爲重不得入輕入輕犯十惡若以畢入尊不犯經亦然上清爲大洞是大乗洞玄靈寳是中乗洞神三皇爲小乗本心造大乗後爲中下犯五刑律本造小今造中大不犯科曰盗法物什物罪同五逆盗造像物罪同十惡若盗將他家像縁路告乞入已罪備五獄二十四萬劫若自造像擬將告乞取物入巳被八門長考萬劫無出科曰出家之人單景獨宿與物不羣割愛遺榮超然宴處若犯濁亂世不崇敬也科曰若母姑姨姊等爲病患及急難要須扶捉者無犯若是他人兒女没水隨火縱有婬心亦須拯救不得犯觸也科曰若行往道路逢女人有所求覔并乞食飲等只得隔十歩外遥言若得物及飲食等安置床及地上去後來取不得親授手中若路逢女婦要避路與過也科曰出家同道與俗有乖是我法徒共相蔽匿惡興善遞互生恩使遠近稱揚通令深信論云天下善人少不善人多今時之人吹毛覔瑕互相䜛嫉不知巳過强數他非設有一善爭相毀謗不能改身就善及欲敗善同惡故壞道法專由此人大德尊者深所約語也科曰若淫心起時如逢猛虎想如見毒蛇想似見國王想如爲賊發逢主司想如坐在宅被火四發遭焼想如乗舩渡海舩漏欲没想作此六心淫無起處科曰共居觀舍堂殿園林田地三寳衆殿屬天尊堂屬道士若其營造尊卑有等其私房是道士自造廣狹等級出自巳身生前由身處分若死後而無付囑從衆施爲若白衣童子自所營造得度之後配別處者亦聽許自巳處分唯地屬三寳不得攺動若大衆先有別約例不犯也科曰諸初入道戒行未全依倚村坊不住觀舍上無尊德可畏下多狡猾爲朋誘引兒女同床坐起歌笑嬉戲飲酒食肉俗人見之通生穢慢乃謂名德俱應若斯如此之類是滅道法破他信敬尊德訪察依科與罪設不能治國王有法也科曰若出家之人將三寳之物贈遺官人豪勢求所潤巳飜令俗人生希望心縦能典建不如靜坐縁此受犯准盗物論也科曰出家之人清堂虚室躭著旣甚有十惡累一則廣占荒野別畜田宅二則種植國林自求地利三則出入貯積絲綿榖帛四則畜販奴婢五則愛養六畜六則貪聚八珍七則好樂玩物八則雕飾帳帷九則衣著竒異十則財寳彌勤此之十事於身不得爲清虚得之在身爲患累若有此者妨向道心礙淨解慧科曰若有人來乞索是因三寳赴齋傳度講誦轉經受施但是因三寳得者准明眞科依十二折傳處分若是此外所得聽出意布施濟惠仍不得以不淨取以爲不淨施皆抱枉法得罪也科曰若諸弟子恒懼天寒時亂飢荒等事貯積絲綿帛布五榖以備時急惠施者不禁也科曰若有人將器仗禽獸非法之物以惠施者並不合受也科曰若有人將使人婢奴以供給者悉不合受其使人能齋菜持戒者受也科曰出家人房舍與俗人兒女隣並者夜宿各須閉户不閉户犯律也科曰出家之人寧受偷鐘盗像之罪不言說他家隂私穢惡之事也科曰若野地中得藏還與國王若藏中有劵銘記云是經像堂殿之物得者爲造經像堂殿依其銘記處分施造不須白王若不尔犯十惡律如路次野中拾得之物捉取其物依摽牓得主分付如不得主入常仼也科曰出家之人外行遊見闘打不孝父母不順兄弟爲偷行盗軍兵相殺之事皆須歸觀香湯洗浴入靖思微不尓犯科科曰道士女官而被俗人不依道理輕欺若爲依止答曰若道士女官而與俗人不依道理輕欺者可告父母兄弟及村落有勢力者以爲外䕶科曰天尊初得成道聽許男子出家未審女人從何乃得入道答曰天尊因地淨信夫妻結果成遂爲元始因許男子通令出家妻以果地中候大夫人之稱亦許女人相係入道轉經度戒之後大洞女官男見女子入道受老君自然法已即須敬禮依法引接爲能紹隆聖種見其有過不得罵詈誹謗若治籙童子須禮大洞女官爲敬法故也科曰他人捨田宅園林爲人侵奪若爲處分答曰若有信敬捨施爲人侵奪報本捨施主令其轉貨科曰若於道路逢見師主及師主知故皆以下風避影不隔越道路而與共言當以曲腰折身有言則對無言則退也科曰隨從尊者出入當爲提持机杖鞋履登危臨𡽗當以親侍左右兩乎提𢹂不得散手遠離老少別朋科曰夫爲弟子之禮出則啓白還則省慰問訊上下乃復常業也科曰衆有疑惑我不勸成衆有評論我所審察衆有擅造我從衆宜衆有行遊我不矯俗自恒卑退尊敬前人科曰爲師主大德存衆之法寛弘以立節容物慈愛以約衆行事以衆勤朝修以肅敬上乃平不異心下無怨色斯爲大德者矣科曰爲人自巳有善行當與在下共之勿自取歸巳科曰學道者不發他人過不揚巳之能不拒人之諌不見巳之怨也同學縁第二太眞科曰籙生同門同志更相切磋共宣妙化小生與大生言偁小生不得謾語若僕可得兄弟齊心一意明詳科法爲人行事唯精唯嚴執憲秉儀不可怠替自求吉福爲他祈禱無有二心專篤懃行化惡爲善違科五刑論也科曰同學法衆縱復才德實勝前人名年在後猶應敬讓若前人推之因讓勿飾若彼加我我誓不報儻來崇我我誓不敢當時不獲巳事勢所須或宜師我我又三讓後雖在位心猶敬前迹無敬儀比常例人相知者道念志同號之爲友此心友也雖同學道志操非堅此泛交也其面交瞻其顔色欲結交迹而無交心其例甚衆大略有五一者門户由來相似二者仕宦階級相關三者位卑而有勢四者騃賤而有財五者年色相𩔖皆爲俗交學道心交擇人採志同者貴不黷棄於下賤賤不謟求於髙貴忘年忘勢唯志道同違者七刑論也科曰前雖結交後名宦有別或爲師長或爲師友或爲臣下皆解交執當時之禮若上命不解皆須謙下爲交在上不得呼下解在下不呼上結義上命之也造壇縁第三二十四生圖曰元始天尊延賔清堂黄金爲壇白銀薦地本際經云大𣑽國王請經得力乃國中造大精舍建大寳壇又云絶和國王好樂造壇一月三壇周而復始又云林先生爲壇有女恃於美色笑調先生後爲醜陋又云爾時地下踊出七寳靈壇髙地一百餘丈上下九級周帀八面級有九洽各有金格玉磬八十一枚晝夜六時自然而鳴八十一者同聲而發又云靜玄弟子請問天尊因何壇冶從國踊出天尊答曰初髙上帝王說本相眞經時有空王造斯壇治淪隱不見今說本相壇治聞而踊出五符序云帝嚳乃祭天帝於北阿之壇也碑闕第四本相經云范則子順子得道但見太清玉碑闕上有二白鶴碑石書云往以共學道經宗三十六部由心不專志難㑹契也要修科儀戒律鈔卷之十三, CK-KZ: ''}
  - {type: variant, offset: 6, length: 3841, content: 满編雜科第一千眞科曰施制立法要假能行衆中無知法者不問多少皆悉不得共住共住之人必須同遵聖教動止合儀惡悉能斷善共保護如勸惡者事在別律科曰道法清虚不希名利閑居靜室謂曰仙家我弟子中多畜錢財寳貨牛馬奴婢躭著不已如此之人斷三寳原奪衆生福錐持經奉戒倶爲滅法科曰上德尊人住持大衆下小有過須避嫌疑若有不和於國王妃嬪眷屬大臣宰輔俗人及兒女小道士淨人宿新怨嫌之前並不得呵責若應舉罰先喚來隱處自以示語情所不堪爲衆所惡及當白衆舉罰科曰出家之人務在簡靜非法行事動則落邪非法者一則廣求利養自說我能二則貪積無窮爲人婚姻卜相三則強稱多解瞻視天文四則行等淨人躬執耕稼五則闘亂朋衆與惡友交遊六則不以正法爲事而與兇俗結黨七則坐起無分混淆法次入則不依正律道俗同床九則闇夜出行而不秉炬自照十則摴蒱𩀱陸劫盗行非恣意所爲而不自戒入道依衆可以去之如不自懲是壞道法也科曰諸小道士所詣名德皆須修飾形儀整頓冠履安詳雅歩稽首三拜拜訖長跪啓曰某甲小末未備法教故以遠來伏願大徳賜垂解結我有所聞必無違逆大德爲白衆今有道士某甲從小以來心有結累不能自解今稽首求悔若從生至今行瞋行怒行劫行盗行貪行一切不善之行於今解釋不敢復犯進學正戒通明義理說竟謹依所說乃起更三拜而退科曰亂衆之人多不依正法飲酒醉亂輕欺上下者罰錢及米或餘貨財當時同和後便違拒不肯輸送因兹杖罰或奪財帛以用供衆或苦役治地斬伐草木鋤禾收刈如一衆不能治罰總集道衆文不能治可送與國王以依俗律科曰若有不依正法遊入他觀妄有輕欺科索酒肉或媒嫁爲人買奴婢及餘畜産或造順俗之制犯罪囚禁遭赦得免或自貨賕方便得脫或奪賊物因利求和律有正科依法與罪也科曰道士女官各須淨行道士不得畜女人女官不得畜男子各使遠離棲肅其心目不見形聽不聞聲道經云不見可欲使心不亂若有此色即須白衆告舉不肻制止國王有法也科曰大觀私房皆多混亂特由尊者不能謹愼縱恣無方或是綱維不出教令身居寳地心穢慳貪導引後生同開惡趣兇惡長養大塞道源使正信者慿心何所科曰共入寳房同開善趣懷瞋動殺咸乖大慈養牛畜馬不免鞭打藉狗放猫專懷殺意凡人淨戒此等並不合畜也科曰人有尊卑戒有小大或身雖奉戒意無在法不修靜舍詣飾殿堂招引兇黨動爲非法聞鳴鐘禮拜大笑入觀見尊德行道外生謗誹特由綱維自爾何能戮力徒衆逓至作法風教日生也科曰若衆中有一人不善可隱處示語云眞品仙階行人所踐道無形相要藉人弘十方法徒助道揚化聞有法要學擬成身豈得有過令他知覺今大德諸行無犯唯有某事不依正道請即攺之猶如月虧更满蘭歇更薰幸相用言共匡法教不得即舉白大衆也科曰出家之人與俗旣別置觀立舍並不得與俗人及家口家住若是十方法衆行往經過看前人德行髙低作三品安置尊車居止要令得所也科曰毎觀舍應須精思别院安置名德中常集衆同在齋堂若是遠方行人來蹔居止即須先問欲何處居才髙行潔精思别院若無竒行請平常居止若是上人請下分可須辭謝改處若才非所處即須詘退科曰精思入定爲性披黃戴幘爲相若淵澄霜潔玉潤氷清爲世福田行無㸃汙宗持正戒有五譬喻一者喻如富貴之家忽生一子而無兩目經渉三月两目忽明舉家歡喜無戒之人猶如無目二者喻如磨鏡漸漸增明有戒之人念念功積三者喻如嬰兒細細長大能持戒者以下之髙四者喻如飢人終念得食不得食故必死無疑不受戒人長淪盲道五者喻如舟航能度大海能持戒者必度生死苦海也科曰若國王大臣施主工匠能有益衆者可供給飲食薪火遇有求索白衆供給也科曰若威勢及惡賊能損害衆者亦須供給食此是不知法人能損壞法衆故也科曰常住錢物不得貸借充私房用其有病患切急白衆求請後一倍償還也科曰非法之物不得布施問曰何爲非法之物答曰牛馬奴婢軍戎器仗等物是也科曰時在饑荒又屬離亂各欲隨豐逐靜能有守固衆可分科財物以與守固之人也科曰若有惡口赤舌兇徒惡黨以相羣聚常懷遠離設使偶會情不獲巳要須口順心違若不能爾交爲切害科曰法物什物造像造經有所施用輕重各別答曰鍾磬幡花鑪合帳蓋寳幢經韞之屬此是法物則重冠履几笏褐帔裙𥜗衫褶等爲什物則輕本心爲重後作輕犯五刑律本作輕今作重不犯像則有三天尊爲上眞人爲中衆仙玄中法師爲下本心捨施造像爲重不得入輕入輕犯十惡若以畢入尊不犯經亦然上清爲大洞是大乗洞玄靈寳是中乗洞神三皇爲小乗本心造大乗後爲中下犯五刑律本造小今造中大不犯科曰盗法物什物罪同五逆盗造像物罪同十惡若盗將他家像縁路告乞入已罪備五獄二十四萬劫若自造像擬將告乞取物入巳被八門長考萬劫無出科曰出家之人單景獨宿與物不羣割愛遺榮超然宴處若犯濁亂世不崇敬也科曰若母姑姨姊等爲病患及急難要須扶捉者無犯若是他人兒女没水隨火縱有婬心亦須拯救不得犯觸也科曰若行往道路逢女人有所求覔并乞食飲等只得隔十歩外遥言若得物及飲食等安置床及地上去後來取不得親授手中若路逢女婦要避路與過也科曰出家同道與俗有乖是我法徒共相蔽匿惡興善遞互生恩使遠近稱揚通令深信論云天下善人少不善人多今時之人吹毛覔瑕互相䜛嫉不知巳過强數他非設有一善爭相毀謗不能改身就善及欲敗善同惡故壞道法專由此人大德尊者深所約語也科曰若淫心起時如逢猛虎想如見毒蛇想似見國王想如爲賊發逢主司想如坐在宅被火四發遭焼想如乗舩渡海舩漏欲没想作此六心淫無起處科曰共居觀舍堂殿園林田地三寳衆殿屬天尊堂屬道士若其營造尊卑有等其私房是道士自造廣狹等級出自巳身生前由身處分若死後而無付囑從衆施爲若白衣童子自所營造得度之後配別處者亦聽許自巳處分唯地屬三寳不得攺動若大衆先有別約例不犯也科曰諸初入道戒行未全依倚村坊不住觀舍上無尊德可畏下多狡猾爲朋誘引兒女同床坐起歌笑嬉戲飲酒食肉俗人見之通生穢慢乃謂名德俱應若斯如此之類是滅道法破他信敬尊德訪察依科與罪設不能治國王有法也科曰若出家之人將三寳之物贈遺官人豪勢求所潤巳飜令俗人生希望心縦能典建不如靜坐縁此受犯准盗物論也科曰出家之人清堂虚室躭著旣甚有十惡累一則廣占荒野別畜田宅二則種植國林自求地利三則出入貯積絲綿榖帛四則畜販奴婢五則愛養六畜六則貪聚八珍七則好樂玩物八則雕飾帳帷九則衣著竒異十則財寳彌勤此之十事於身不得爲清虚得之在身爲患累若有此者妨向道心礙淨解慧科曰若有人來乞索是因三寳赴齋傳度講誦轉經受施但是因三寳得者准明眞科依十二折傳處分若是此外所得聽出意布施濟惠仍不得以不淨取以爲不淨施皆抱枉法得罪也科曰若諸弟子恒懼天寒時亂飢荒等事貯積絲綿帛布五榖以備時急惠施者不禁也科曰若有人將器仗禽獸非法之物以惠施者並不合受也科曰若有人將使人婢奴以供給者悉不合受其使人能齋菜持戒者受也科曰出家人房舍與俗人兒女隣並者夜宿各須閉户不閉户犯律也科曰出家之人寧受偷鐘盗像之罪不言說他家隂私穢惡之事也科曰若野地中得藏還與國王若藏中有劵銘記云是經像堂殿之物得者爲造經像堂殿依其銘記處分施造不須白王若不尔犯十惡律如路次野中拾得之物捉取其物依摽牓得主分付如不得主入常仼也科曰出家之人外行遊見闘打不孝父母不順兄弟爲偷行盗軍兵相殺之事皆須歸觀香湯洗浴入靖思微不尓犯科科曰道士女官而被俗人不依道理輕欺若爲依止答曰若道士女官而與俗人不依道理輕欺者可告父母兄弟及村落有勢力者以爲外䕶科曰天尊初得成道聽許男子出家未審女人從何乃得入道答曰天尊因地淨信夫妻結果成遂爲元始因許男子通令出家妻以果地中候大夫人之稱亦許女人相係入道轉經度戒之後大洞女官男見女子入道受老君自然法已即須敬禮依法引接爲能紹隆聖種見其有過不得罵詈誹謗若治籙童子須禮大洞女官爲敬法故也科曰他人捨田宅園林爲人侵奪若爲處分答曰若有信敬捨施爲人侵奪報本捨施主令其轉貨科曰若於道路逢見師主及師主知故皆以下風避影不隔越道路而與共言當以曲腰折身有言則對無言則退也科曰隨從尊者出入當爲提持机杖鞋履登危臨𡽗當以親侍左右兩乎提𢹂不得散手遠離老少別朋科曰夫爲弟子之禮出則啓白還則省慰問訊上下乃復常業也科曰衆有疑惑我不勸成衆有評論我所審察衆有擅造我從衆宜衆有行遊我不矯俗自恒卑退尊敬前人科曰爲師主大德存衆之法寛弘以立節容物慈愛以約衆行事以衆勤朝修以肅敬上乃平不異心下無怨色斯爲大德者矣科曰爲人自巳有善行當與在下共之勿自取歸巳科曰學道者不發他人過不揚巳之能不拒人之諌不見巳之怨也同學縁第二太眞科曰籙生同門同志更相切磋共宣妙化小生與大生言偁小生不得謾語若僕可得兄弟齊心一意明詳科法爲人行事唯精唯嚴執憲秉儀不可怠替自求吉福爲他祈禱無有二心專篤懃行化惡爲善違科五刑論也科曰同學法衆縱復才德實勝前人名年在後猶應敬讓若前人推之因讓勿飾若彼加我我誓不報儻來崇我我誓不敢當時不獲巳事勢所須或宜師我我又三讓後雖在位心猶敬前迹無敬儀比常例人相知者道念志同號之爲友此心友也雖同學道志操非堅此泛交也其面交瞻其顔色欲結交迹而無交心其例甚衆大略有五一者門户由來相似二者仕宦階級相關三者位卑而有勢四者騃賤而有財五者年色相𩔖皆爲俗交學道心交擇人採志同者貴不黷棄於下賤賤不謟求於髙貴忘年忘勢唯志道同違者七刑論也科曰前雖結交後名宦有別或爲師長或爲師友或爲臣下皆解交執當時之禮若上命不解皆須謙下爲交在上不得呼下解在下不呼上結義上命之也造壇縁第三二十四生圖曰元始天尊延賔清堂黄金爲壇白銀薦地本際經云大𣑽國王請經得力乃國中造大精舍建大寳壇又云絶和國王好樂造壇一月三壇周而復始又云林先生爲壇有女恃於美色笑調先生後爲醜陋又云爾時地下踊出七寳靈壇髙地一百餘丈上下九級周帀八面級有九洽各有金格玉磬八十一枚晝夜六時自然而鳴八十一者同聲而發又云靜玄弟子請問天尊因何壇冶從國踊出天尊答曰初髙上帝王說本相眞經時有空王造斯壇治淪隱不見今說本相壇治聞而踊出五符序云帝嚳乃祭天帝於北阿之壇也碑闕第四本相經云范則子順子得道但見太清玉碑闕上有二白鶴碑石書云往以共學道經宗三十六部由心不專志難㑹契也要修科儀戒律鈔卷之十三, CK-KZ-jye: ''}
  - {type: variant, offset: 6, length: 3841, content: 满編雜科第一千眞科曰施制立法要假能行衆中無知法者不問多少皆悉不得共住共住之人必須同遵聖教動止合儀惡悉能斷善共保護如勸惡者事在別律科曰道法清虚不希名利閑居靜室謂曰仙家我弟子中多畜錢財寳貨牛馬奴婢躭著不已如此之人斷三寳原奪衆生福錐持經奉戒倶爲滅法科曰上德尊人住持大衆下小有過須避嫌疑若有不和於國王妃嬪眷屬大臣宰輔俗人及兒女小道士淨人宿新怨嫌之前並不得呵責若應舉罰先喚來隱處自以示語情所不堪爲衆所惡及當白衆舉罰科曰出家之人務在簡靜非法行事動則落邪非法者一則廣求利養自說我能二則貪積無窮爲人婚姻卜相三則強稱多解瞻視天文四則行等淨人躬執耕稼五則闘亂朋衆與惡友交遊六則不以正法爲事而與兇俗結黨七則坐起無分混淆法次入則不依正律道俗同床九則闇夜出行而不秉炬自照十則摴蒱𩀱陸劫盗行非恣意所爲而不自戒入道依衆可以去之如不自懲是壞道法也科曰諸小道士所詣名德皆須修飾形儀整頓冠履安詳雅歩稽首三拜拜訖長跪啓曰某甲小末未備法教故以遠來伏願大徳賜垂解結我有所聞必無違逆大德爲白衆今有道士某甲從小以來心有結累不能自解今稽首求悔若從生至今行瞋行怒行劫行盗行貪行一切不善之行於今解釋不敢復犯進學正戒通明義理說竟謹依所說乃起更三拜而退科曰亂衆之人多不依正法飲酒醉亂輕欺上下者罰錢及米或餘貨財當時同和後便違拒不肯輸送因兹杖罰或奪財帛以用供衆或苦役治地斬伐草木鋤禾收刈如一衆不能治罰總集道衆文不能治可送與國王以依俗律科曰若有不依正法遊入他觀妄有輕欺科索酒肉或媒嫁爲人買奴婢及餘畜産或造順俗之制犯罪囚禁遭赦得免或自貨賕方便得脫或奪賊物因利求和律有正科依法與罪也科曰道士女官各須淨行道士不得畜女人女官不得畜男子各使遠離棲肅其心目不見形聽不聞聲道經云不見可欲使心不亂若有此色即須白衆告舉不肻制止國王有法也科曰大觀私房皆多混亂特由尊者不能謹愼縱恣無方或是綱維不出教令身居寳地心穢慳貪導引後生同開惡趣兇惡長養大塞道源使正信者慿心何所科曰共入寳房同開善趣懷瞋動殺咸乖大慈養牛畜馬不免鞭打藉狗放猫專懷殺意凡人淨戒此等並不合畜也科曰人有尊卑戒有小大或身雖奉戒意無在法不修靜舍詣飾殿堂招引兇黨動爲非法聞鳴鐘禮拜大笑入觀見尊德行道外生謗誹特由綱維自爾何能戮力徒衆逓至作法風教日生也科曰若衆中有一人不善可隱處示語云眞品仙階行人所踐道無形相要藉人弘十方法徒助道揚化聞有法要學擬成身豈得有過令他知覺今大德諸行無犯唯有某事不依正道請即攺之猶如月虧更满蘭歇更薰幸相用言共匡法教不得即舉白大衆也科曰出家之人與俗旣別置觀立舍並不得與俗人及家口家住若是十方法衆行往經過看前人德行髙低作三品安置尊車居止要令得所也科曰毎觀舍應須精思别院安置名德中常集衆同在齋堂若是遠方行人來蹔居止即須先問欲何處居才髙行潔精思别院若無竒行請平常居止若是上人請下分可須辭謝改處若才非所處即須詘退科曰精思入定爲性披黃戴幘爲相若淵澄霜潔玉潤氷清爲世福田行無㸃汙宗持正戒有五譬喻一者喻如富貴之家忽生一子而無兩目經渉三月两目忽明舉家歡喜無戒之人猶如無目二者喻如磨鏡漸漸增明有戒之人念念功積三者喻如嬰兒細細長大能持戒者以下之髙四者喻如飢人終念得食不得食故必死無疑不受戒人長淪盲道五者喻如舟航能度大海能持戒者必度生死苦海也科曰若國王大臣施主工匠能有益衆者可供給飲食薪火遇有求索白衆供給也科曰若威勢及惡賊能損害衆者亦須供給食此是不知法人能損壞法衆故也科曰常住錢物不得貸借充私房用其有病患切急白衆求請後一倍償還也科曰非法之物不得布施問曰何爲非法之物答曰牛馬奴婢軍戎器仗等物是也科曰時在饑荒又屬離亂各欲隨豐逐靜能有守固衆可分科財物以與守固之人也科曰若有惡口赤舌兇徒惡黨以相羣聚常懷遠離設使偶會情不獲巳要須口順心違若不能爾交爲切害科曰法物什物造像造經有所施用輕重各別答曰鍾磬幡花鑪合帳蓋寳幢經韞之屬此是法物則重冠履几笏褐帔裙𥜗衫褶等爲什物則輕本心爲重後作輕犯五刑律本作輕今作重不犯像則有三天尊爲上眞人爲中衆仙玄中法師爲下本心捨施造像爲重不得入輕入輕犯十惡若以畢入尊不犯經亦然上清爲大洞是大乗洞玄靈寳是中乗洞神三皇爲小乗本心造大乗後爲中下犯五刑律本造小今造中大不犯科曰盗法物什物罪同五逆盗造像物罪同十惡若盗將他家像縁路告乞入已罪備五獄二十四萬劫若自造像擬將告乞取物入巳被八門長考萬劫無出科曰出家之人單景獨宿與物不羣割愛遺榮超然宴處若犯濁亂世不崇敬也科曰若母姑姨姊等爲病患及急難要須扶捉者無犯若是他人兒女没水隨火縱有婬心亦須拯救不得犯觸也科曰若行往道路逢女人有所求覔并乞食飲等只得隔十歩外遥言若得物及飲食等安置床及地上去後來取不得親授手中若路逢女婦要避路與過也科曰出家同道與俗有乖是我法徒共相蔽匿惡興善遞互生恩使遠近稱揚通令深信論云天下善人少不善人多今時之人吹毛覔瑕互相䜛嫉不知巳過强數他非設有一善爭相毀謗不能改身就善及欲敗善同惡故壞道法專由此人大德尊者深所約語也科曰若淫心起時如逢猛虎想如見毒蛇想似見國王想如爲賊發逢主司想如坐在宅被火四發遭焼想如乗舩渡海舩漏欲没想作此六心淫無起處科曰共居觀舍堂殿園林田地三寳衆殿屬天尊堂屬道士若其營造尊卑有等其私房是道士自造廣狹等級出自巳身生前由身處分若死後而無付囑從衆施爲若白衣童子自所營造得度之後配別處者亦聽許自巳處分唯地屬三寳不得攺動若大衆先有別約例不犯也科曰諸初入道戒行未全依倚村坊不住觀舍上無尊德可畏下多狡猾爲朋誘引兒女同床坐起歌笑嬉戲飲酒食肉俗人見之通生穢慢乃謂名德俱應若斯如此之類是滅道法破他信敬尊德訪察依科與罪設不能治國王有法也科曰若出家之人將三寳之物贈遺官人豪勢求所潤巳飜令俗人生希望心縦能典建不如靜坐縁此受犯准盗物論也科曰出家之人清堂虚室躭著旣甚有十惡累一則廣占荒野別畜田宅二則種植國林自求地利三則出入貯積絲綿榖帛四則畜販奴婢五則愛養六畜六則貪聚八珍七則好樂玩物八則雕飾帳帷九則衣著竒異十則財寳彌勤此之十事於身不得爲清虚得之在身爲患累若有此者妨向道心礙淨解慧科曰若有人來乞索是因三寳赴齋傳度講誦轉經受施但是因三寳得者准明眞科依十二折傳處分若是此外所得聽出意布施濟惠仍不得以不淨取以爲不淨施皆抱枉法得罪也科曰若諸弟子恒懼天寒時亂飢荒等事貯積絲綿帛布五榖以備時急惠施者不禁也科曰若有人將器仗禽獸非法之物以惠施者並不合受也科曰若有人將使人婢奴以供給者悉不合受其使人能齋菜持戒者受也科曰出家人房舍與俗人兒女隣並者夜宿各須閉户不閉户犯律也科曰出家之人寧受偷鐘盗像之罪不言說他家隂私穢惡之事也科曰若野地中得藏還與國王若藏中有劵銘記云是經像堂殿之物得者爲造經像堂殿依其銘記處分施造不須白王若不尔犯十惡律如路次野中拾得之物捉取其物依摽牓得主分付如不得主入常仼也科曰出家之人外行遊見闘打不孝父母不順兄弟爲偷行盗軍兵相殺之事皆須歸觀香湯洗浴入靖思微不尓犯科科曰道士女官而被俗人不依道理輕欺若爲依止答曰若道士女官而與俗人不依道理輕欺者可告父母兄弟及村落有勢力者以爲外䕶科曰天尊初得成道聽許男子出家未審女人從何乃得入道答曰天尊因地淨信夫妻結果成遂爲元始因許男子通令出家妻以果地中候大夫人之稱亦許女人相係入道轉經度戒之後大洞女官男見女子入道受老君自然法已即須敬禮依法引接爲能紹隆聖種見其有過不得罵詈誹謗若治籙童子須禮大洞女官爲敬法故也科曰他人捨田宅園林爲人侵奪若爲處分答曰若有信敬捨施爲人侵奪報本捨施主令其轉貨科曰若於道路逢見師主及師主知故皆以下風避影不隔越道路而與共言當以曲腰折身有言則對無言則退也科曰隨從尊者出入當爲提持机杖鞋履登危臨𡽗當以親侍左右兩乎提𢹂不得散手遠離老少別朋科曰夫爲弟子之禮出則啓白還則省慰問訊上下乃復常業也科曰衆有疑惑我不勸成衆有評論我所審察衆有擅造我從衆宜衆有行遊我不矯俗自恒卑退尊敬前人科曰爲師主大德存衆之法寛弘以立節容物慈愛以約衆行事以衆勤朝修以肅敬上乃平不異心下無怨色斯爲大德者矣科曰爲人自巳有善行當與在下共之勿自取歸巳科曰學道者不發他人過不揚巳之能不拒人之諌不見巳之怨也同學縁第二太眞科曰籙生同門同志更相切磋共宣妙化小生與大生言偁小生不得謾語若僕可得兄弟齊心一意明詳科法爲人行事唯精唯嚴執憲秉儀不可怠替自求吉福爲他祈禱無有二心專篤懃行化惡爲善違科五刑論也科曰同學法衆縱復才德實勝前人名年在後猶應敬讓若前人推之因讓勿飾若彼加我我誓不報儻來崇我我誓不敢當時不獲巳事勢所須或宜師我我又三讓後雖在位心猶敬前迹無敬儀比常例人相知者道念志同號之爲友此心友也雖同學道志操非堅此泛交也其面交瞻其顔色欲結交迹而無交心其例甚衆大略有五一者門户由來相似二者仕宦階級相關三者位卑而有勢四者騃賤而有財五者年色相𩔖皆爲俗交學道心交擇人採志同者貴不黷棄於下賤賤不謟求於髙貴忘年忘勢唯志道同違者七刑論也科曰前雖結交後名宦有別或爲師長或爲師友或爲臣下皆解交執當時之禮若上命不解皆須謙下爲交在上不得呼下解在下不呼上結義上命之也造壇縁第三二十四生圖曰元始天尊延賔清堂黄金爲壇白銀薦地本際經云大𣑽國王請經得力乃國中造大精舍建大寳壇又云絶和國王好樂造壇一月三壇周而復始又云林先生爲壇有女恃於美色笑調先生後爲醜陋又云爾時地下踊出七寳靈壇髙地一百餘丈上下九級周帀八面級有九洽各有金格玉磬八十一枚晝夜六時自然而鳴八十一者同聲而發又云靜玄弟子請問天尊因何壇冶從國踊出天尊答曰初髙上帝王說本相眞經時有空王造斯壇治淪隱不見今說本相壇治聞而踊出五符序云帝嚳乃祭天帝於北阿之壇也碑闕第四本相經云范則子順子得道但見太清玉碑闕上有二白鶴碑石書云往以共學道經宗三十六部由心不專志難㑹契也要修科儀戒律鈔卷之十三, YP-C: ''}
