  - {type: variant, offset: 1, length: 5110, content: 修科儀戒律鈔卷之十二弔二三洞道士朱法滿編飯賢縁第一夫聖教興道風著賢人出聖德隆感應之理旣彰飯賢之儀見矣太眞科曰家有疾厄公私設廚名曰飯賢可請清賢道士上中下十人二十四人三十人五十人百人不可不滿十人不足爲福賢者㢘潔亦能不食食亦不多服餌漿藥不須厚饌是世人所重獻之崇有道耳此時應須立壇先三日清齋後三日言功賢人身中多神故饒之德重故厚之食以飽爲度味以適爲期供食一如齋食不得葷穢犯者五刑論客月以經三請不可條名貪腆之客不可數啖天𢊍其科中委細十以上紙今人不多為此廚事故不具抄耳玄都律曰三㑹吉日質對天官教化愚俗布散功德使人鬼相應而有雜穢者殃及後世主者罰𥮅一紀律曰正一左右平氣以上一人當七人望丘治道士一人當三人諸佩籙吏兵以上一人當二人更令童子二人當三人散民一人當一人生男上廚生女中廚增口益財下廚律曰道士爲人解𢊍須擇大德之人善心者不用惡逆無禮之人解不得福違律罰𥮅一紀律曰夫爲廚客一時來不得參差坐並皆心存太上善心不得語殺生畋漁獵捕之事違律主客被考病三年律曰若道士爲人設廚時客前燒香不得葷穢違律考病百日造殿堂縁第二夫立善方假慿慈力取證因果要藉信生功德著於因前妙因彰於來刼者矣太眞科曰俗人能施散家財造治堂精室一間瓦屋賜小𥮅百二十三間三百六十𥮅功多𥮅多大戒經云建立靖觀令人代代門户髙貴身登天堂飲食自然常居無爲施一錢以土皆三十二萬倍報萬錢以上報不可勝本際經云大梵國王國中大旱轉經得益乃於國中造大精舍本相經云清和國王崇信道法建習仙觀及習靈七政二廟本記云周康王時文始眞人結草爲樓觀占星候氣眞人得道後周穆王欽尚遺躅重葺屋宇號爲樓觀焉并爲眞人建廟立祠秦始皇三十一年又於眞人南置老君廟本傳云漢武帝以元封二年正月甲子上嵩髙登大虞石室起道宫使董仲舒東方朔齋潔思眞念道縁第三夫道妙難階寂而莫測虚而能出用而不窮五念彰於聖儀一心通乎眞相者矣道典曰子常念道道亦念子憂患思道疾病思道貧賤思道窮困思道飲食思道入山澤思道渉江河思道常行思道道與子并道之所出萬物皆生萬神皆成無所不榮亡道須㬰身入八㝠因縁經云念眞心不退忠信不忘言供養諸道德所生無艱難又供養好道德齋戒見眞王靖念心不懈七祖昇天堂妙眞經云道人圖生蓋不謀名衣弊履穿不慕尊榮胷中純白意無所傾志若流水居若空城積守無爲乃能長生道者一也人能知一明如日不能知一土中出道無取正氣自居道無去邪氣自除此非禱祠鬼神之道也握之不盈於手縱之布溢四海學生者生學道者道如人墮水知泅者生不知泅者死未病者易爲醫未危之國易爲謀不好道之人存念各别鶉鷃髙飛志在苖禾鴽鵝髙飛志在陂池鴻鶴髙飛遊於太清之域往來九州棲息八極乃得其所也此二鳥憂喜不同其志各異而谷自謂爲得其所願也故大水之淵神龍所居小魚走出髙山深澤虎豹所樂雞狗所惡故規矩不同百姓心異是以爲道者損聰明棄智慮反眞歸樸遊於太素輕物慠世昭然不汙喜怒不嬰於心利害不棲於意此大聖所體行也老君禁戒經云夫積德成王積怨成亡積石成山積水成海不積而成者未之有也積道德天與之地助之鬼神輔之鳯鳥翔其庭騏驎遊其郊神龍宿其沼故以道蒞天下天下之德不以道蒞天下天下之賊堯舜以有道昌桀紂以無道亡殗穢縁第四夫神氣清虚神靈所守身心混濁邪來害人入靜思眞要須防患不履衆惡吉祥止焉玄都律曰民家穢汙不過晦朔不得入治哭亦三日穢三年之䘮未滿百日不得入治禮拜奏表章書違律罰𥮅一紀又云遭師主父母大䘮三十日殗不得齋章過三十日外限滿訖洗浴燒香違律罰𥮅二紀律曰太一極法道士女官無殗穢哭亦不殗穢佩籙唯著身不用去脫他人律曰道士女官被陽官牢獄繫閉出放皆應香湯洗浣解殗三日以後得入靖治禮拜違律罰𥮅一紀道士及女官私被陽官杖罰瘡未差未滿三十日不得入靖治禮拜呈奏違律考二十律曰帶籙不得入殗穢上溷即無忌諱黄籙簡文曰奉經威儀常當使身香潔芳盛以招眞氣不得入濁神靈蕩散考由太清曹若履穢氣考由清天曹三元品戒曰常以正月十五日七月十五日十月十五日平旦正中衣半三時沐浴身形五香自洗臨沐浴時向南以金杓廻香湯東南左轉三十二過閉眼思日光在左目上月光在右目上五星纓絡頭上五色之雲帀繞一身青龍白虎朱雀玄武獅子白鶴羅列左右仙童執巾玉女散花飛仙乗騎侍衞身形便即叩齒三十二通祝曰天澄氣清五色髙明日月吐輝灌我身形神津内盥香湯鍊精光景洞曜煥映上清氣不受塵五府納靈罪滅三徒禍消九㝠惡根斷絶福慶自生今日大願一切告明身受開度昇入帝庭畢仰咽氣三十二過止便洗沐五香沐浴畢冠帶衣服又叩齒十二通祝曰五濁已清八景巳明今日受鍊罪滅福生長與五帝齊眞上靈便出而入室依法行道自然訣下曰經汙穢不沐浴一則多令病害二則示民知清濁三則神鬼不爲通靈四則侍經眞官計罪五則人見交不恭敬三皇經云自解殗祝曰吾以日洗身以月鍊精仙人輔巳玉女佐形二十八宿與吾合并千邪百穢逐水而清急急如律令老君養生經曰晦曰浴吉朔日浴吉千眞科曰冬天洗浴每一旬浴先作宻室方六尺安水槽火鑪筒渠注湯水入其湯以桃枝栢葉蘭香竹葉等内水中煑取三兩沸乃去滓次加五香然作布籠濾湯尊卑以