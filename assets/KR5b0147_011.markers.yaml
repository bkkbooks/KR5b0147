朱砂五兩筆一管墨一丸書刀一口席二領香五兩乆病大厄金紫代形章右用紙二百張筆二管墨一丸書刀一口香十兩席二領米一碩二斗油一斗朱砂五兩金人一形重一兩一銖紫紋四十尺鎭錢二百四十文係天師張君曰凡詣治請章大者紙百張筆二管墨一丸小者紙五十張筆一管此給主者書章起草換易陋誤不開信限也且章信之法冝明各遵之章無信定未可用奏章巳後其信物多可施貧者宜行隂德不可師全用之十分爲計師可費入者三分而巳天科甚嚴犯者獲罪於三官殃及九祖永爲下鬼愼之愼之凡席一領香一兩紙百張筆一管墨一丸書刀一口貧乏者隨時所科富有者亦增重也凡操章云謬誤脫漏事委功曹此法所起本用施於闇鈍之者或行事總切委正之以氣印寫上官矜副愚誠許有斯理至如才識聦慜足可校定而還惰慢仰委功曹天官必考之得驕恣之罪三犯則不原諸祭酒特可精勤愼之疾病請章次第太眞科曰諸疾病先上首狀章若不愈又上解考章若不愈更上解先亡罪謫章若不愈上遷達章故沉上却殺收注鬼章復沉頓上解禍厄大章復不差上解五世墓謫章復不差上扶衰疫大厄章復不愈上還䰟復𩲸章復不愈上安墓解五土耗害章復不愈上安宅鎭神驅除收鬼章復不愈上分解中外大考章若急困上子午請命并却三官死解章若進退上仰謝三十二天章大危篤上贖命交𧵥又拔命又燭燈又解退復連又五燈又二十八宿又審宿又分解先亡大注復八十一章無災病不得妄求此章犯者三刑論避忌諱上章太眞科云三會大慶奏表言科戒不避疾風猛兩日月昏晦天地禁閉當其日天帝大㑹科曰三會吉日並赴言名籍不避日辰禁忌並㑹如故此日一切大聖倶下同會治堂分形布影萬里之外響應齊同此日奏上衆章授度籙契男女衆官行德修功消災散禍悉不禁制玄都律曰入治上章避戊辰戊戌不得上章穢汙不得上章月朝晦朔不得上章百姓解穢不得詣治違律罰𥮅二年入治上章皆正身趍歩科次左右肅恭致敬不得男女雜錯妄視謬誤違律罰玉三兩不得爲十惡五逆之人上章辭質而不文拙而不工朴而不華實而不僞直而不肆辯而不煩弱而不穢清而不濁眞而不邪簡要而輸誠則感天地動鬼神御上天曹報應立至違科罰𥮅一紀上章背向太眞科曰奏章向東其後奏及露章並向北白日授度向東破契子午請命星宿請急章皆向北存大帝自非星宿大章登壇大事并收捕驅除急章不煩露上玄都律曰章消疾病向鬼門消災厄向地户求長生求富貴財利向天門消口舌呪咀向人門厭虎向寅厭蛇向巳與天罡并力大吉違律罰𥮅百日律曰修福延年消却災害厭百病皆東向上章解墓除責開心聦明過災度厄皆西向上章違律病百日疾病百死一生北向上章修身養命温潤富貴皆向南上章律曰上章謝罪家中大小北向先謝三十二天舉家大小散髮交手北向對章首過違律罰病十日若用日者律曰上章求財當用天倉日戊子日是求爵位用天府日不用自刑日午酉亥辰皆是刑日寅刑巳戌刑未子刑卯申刑寅卯刑子巳刑申違律考病五十日律曰月朝月半月晦戊辰戊戌唯應禮拜修誦經文不得奏章啓訴違律者水官考罰六十日病律曰吉日戊戌戊辰得上言功章大慶之日不得爲他别奏餘章違律考病百日雜犯科律曰道士女官州縣官人百姓道民等章並不得參雜同共奏呈官位不同違者考病五十日道士女官齋㑹呈章要須笏褐法服整頓若上章治病主人不得殺生飴道士道士知而故食者師與主人同罰減𥮅二紀上章之時家中大小不得歷亂髙聲大語驚雞動犬則法氣不安違律罰𥮅一紀章奏了不得放縱文書在俗人家爲有太上名字至一年十月即燒違律罰𥮅一紀若承酒氣奏章罰病一千日減五年壽律曰大風大雨不得拜章連風連雨亦不得拜章違律罰病一年律曰身有六疾不得爲百姓拜章違律罰𥮅三紀律曰家有䘮禍不絶解凶墓謫等可上木札律曰道士女官上章不得飲酒食肉及五辛違律罰𥮅一紀若上大星宿等章用夜半時五燈火五綵符香墨書之以相厭殺其燈㸃盡餘油若以聞著再拜下下極者可在次行安以聞若書章巳成而有小事乃經年不可上若未下細字經月可上下細字上度三寸五分中度四寸五分下度五寸不得過此今人多言一寸五分皆是好意自造非細法所載也若章至太歳而紙纔足不可上餘有行可上若兩行者可全紙續之若錯誤儳字唯天帝具儀小章不過三字大章以意量之若上章一通前後可四拜讀章竟太歳皆當緊要須正心整頓取法也讀細字法長跪下聲出口而巳法無擎案讀者讀細字一氣耳若内官朝法得口章外官不得口章魏傳云若急事上章用朱筆題署若不上逐鬼章當朱書所上祭酒姓名若治邪病用青紙三官君吏貴在青色若注氣鬼病作擊鬼章書青紙朱書奏竟於靖内眞朱二分合章臼中擣之和蜜爲丸頓服之平旦入靖北向再拜服之垂死皆活勿令人知見他病亦爲之書章燒香向北書若困病入靖四面燒香安四香火上章筆硯魏傳云書章别筆硯勿雜也研墨左轉四十九過重磨亦爾案玄都律曰上章要用曲脚案若非曲脚不得上章違律罰𥮅一紀上章案長二尺四寸廣一尺二寸髙八寸曲脚違律考病百日書符者玄都律曰勑符法各各别有呪勑違律考病百日書符板法長一尺八寸印上六寸下一尺二寸作符香火不得取竈炭違罰病十日三皇經曰天老曰何以用戊戌日作符乎三皇曰戌者天門也戊者土中宫君像也天帝常以戊戌日從西北天門來岀遊觀當此日作符故得天帝歡悅賞賜所欲戊者土也必得官爵封侯食邑矣所以用午時佩之者午是太陽之精淳金之光也必得佩金紫髙位之像也藏章故本太眞科曰爲人奏章竟後諸小章復鑪畢即卷付凾中齎出别舉諸大章一時取之舉録如法若應燒者復鑪於案前燒之若在他處奏章將還與首題署人録本緘封不得泄露蟲䑕及貨易取利違太上勑命章中有眞官位號神鬼姓名靈祇祕訣並在章中不可洿辱章皆有正本傳寫令精校定分明不得輙用故本事狀不同請官舛異俗人家不得留故章本違犯五刑論斷章法太眞科曰上言謹案文書臣以某治法位依法修行宣楊道氣請召眞官救護萬姓所奏章表應燒者燒不燒者緘封箱閣卷束積多法不得散恐蟲䑕所犯漏濕爛敗有所遺落從來謹遵不敢違㫖即日依科隨期斷奠自某年月日時至今年月日合有如干通今於某靖壇淨處火化煙通升雲降氣布吉除凶謹請直使正一功曹治中虎賁威儀鈐下伍伯各二人校尉十二人功曹主簿幹佐小吏金光童子各五人中部章督郵從事使者各二人同時監臨對共科省焚除塵故採納光新原赦臣某愚短不及之愆乞前所印寫永登天府後所奏聞悉免寒池諸官證明獎助有功依都章言功不負效信恩惟太上云云斷章通数不同凡時有豐儉法有行藏藏時少行時多計滿百通爲斷如前文毎年至十月爲斷也要修科儀戒律鈔卷之十一, YP-C: ''}
