奏章竟後諸小章復鑪畢即卷付凾中齎出别舉諸大章一時取之舉録如法若應燒者復鑪於案前燒之若在他處奏章將還與首題署人録本緘封不得泄露蟲䑕及貨易取利違太上勑命章中有眞官位號神鬼姓名靈祇祕訣並在章中不可洿辱章皆有正本傳寫令精校定分明不得輙用故本事狀不同請官舛異俗人家不得留故章本違犯五刑論斷章法太眞科曰上言謹案文書臣以某治法位依法修行宣楊道氣請召眞官救護萬姓所奏章表應燒者燒不燒者緘封箱閣卷束積多法不得散恐蟲䑕所犯漏濕爛敗有所遺落從來謹遵不敢違㫖即日依科隨期斷奠自某年月日時至今年月日合有如干通今於某靖壇淨處火化煙通升雲降氣布吉除凶謹請直使正一功曹治中虎賁威儀鈐下伍伯各二人校尉十二人功曹主簿幹佐小吏金光童子各五人中部章督郵從事使者各二人同時監臨對共科省焚除塵故採納光新原赦臣某愚短不及之愆乞前所印寫永登天府後所奏聞悉免寒池諸官證明獎助有功依都章言功不負效信恩惟太上云云斷章通数不同凡時有豐儉法有行藏藏時少行時多計滿百通爲斷如前文毎年至十月爲斷也要修科儀戒律鈔卷之十一, CK-KZ-jye: ''}
