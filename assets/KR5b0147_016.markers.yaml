  - {type: variant, offset: 1468, length: 8, content: 邊聖品事竟内移文, YP-C: 所不窮無所不聞雖曰一通智慧而五音總焉地洞自然以生五音朕而不動故無損傷人則象地耳中則有五聲之神人不持戒則智慧不通不可亂聽五音之聲五音使人五神飛揚耳中空廢隆隆悲鳴五神啼泣致令耳聾故說是戒以度天人咸使男女普聞法音欲得長壽當持大戒以制耳神勿爲多聽非法之音靜聽妙經神眞人章令通智慧洞響太空持戒制己則五音歸身五音自歸則耳無惡聲保爾年命刻得長遠天尊言東爲洞空始陽之氣氣出}
