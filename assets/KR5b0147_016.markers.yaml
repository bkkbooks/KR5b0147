  - {type: variant, offset: 1899, length: 1, content: 先, CK-KZ: 太清九戒者第一戒曰身不得穢濁不清耽染欲境蒙冒身禍誕縱自恣甘惡爲非綺麗華飾所便細滑濡輭自適無有厭足不知動入罪網不能自覺身之罪大不可稱計不得身犯不得教令於人攝意持戒終身奉行是吾太上太上太一第一戒也第二戒曰心不得興惡想惡念不得形想評想貪欲務得蒙冒財利貪毒陰賊謀議非法淫邪偏僻意不平等嫉妒愚癡自是狠戾濁欲饕味無有厭足不知動入罪網不能自覺心過之罪大無有極不自心興不得教令於人攝意持戒終身奉行是吾太上太上太一第二戒也第三戒曰口不得妄言善惡咒詛罵詈欺誑妄語幻惑兩舌鬬訟告訴持人長短自作是非生災造害興生無端敗衒道法歌誦嗟詠吟嘯歎息貪美恃味無有厭足不知動入罪網不能自覺口過之罪大無有極不得口犯不得教令於人攝意持戒終身奉行是吾太上太上太一第三戒也第四戒曰手不得殺害眾生蚑行蠕動含血之屬皆不得殺劫略強取奪盜偷竊取非其物拾遺取施執持兵器興用非法不知動入罪網不能自覺手過之罪罪之莫大不自手犯不得教令於人攝意持戒終身奉行是吾太上太上太一第四戒也第五戒曰目不得視非道非法非義榮華容飾淫視女色照曜盈目貪欲洋溢綺麗珍寶淫邪妖孽不正之色目爲後主收百凶來致禍毒罪釁臻集一皆目致心目口手致殃禍主動爲禍端收罪之府不可不迮不可不伏不可不愼不可恣之不知動入罪網不能自覺目過之罪罪之莫大當宣目戒勸化一切一能戒目心想息滅想滅意空空意無著無著入無便得道慧攝意持戒奉行勿廢是吾太上太上太一第五戒也第六戒曰耳不得聽八音五樂淫聲妖孽亂正亡國妖僞之樂無有厭足不知動入罪網不能自覺耳過之罪罪亦復大不自耳犯不得令教於人攝意持戒終身奉行是吾太上太上太一第六戒也第七戒曰鼻不得貪香惡臭妄察善惡不知動入罪網不能自覺鼻過之罪罪亦爲次不自鼻犯不得教令於人攝意持戒終身奉行是吾太上太上太一第七戒也第八戒曰足不得蹈不義不踐非法不涉惡履非妖惑境界不知動入罪網不能自覺足過之罪罪亦爲次不自足犯不得教令於人攝意持戒終身奉行是吾太上太上太一第八戒也第九戒曰身不得放情任意強興神物攻非其敵精消神散三氣亡逸放情縱恣無有厭足不知動入罪網傾宗滅族不能自覺如斯之罪罪之莫大不自身犯不得教令於人攝意持戒終身奉行是吾太上太上太一第九戒也十戒者有五定志云度十戒法法}
