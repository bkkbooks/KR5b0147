  - {type: variant, offset: 1690, length: 205, content: 宜張法師制與此相似成服儀第六受治以滿籙三五元命及八劵十籙八劵者定志劵昇玄劵賣子劵乞兒劵上清四劵者血液劵神仙劵大度劵通靈劵十籙者除滿籙三五籙元命籙外更有斬邪籙破殗百鬼召籙都章畢印籙九州社令籙太玄四部籙河圖籙青甲籙東野大禁籙十將軍籙右件依小孟儀若大孟無八劵十籙石井公有十籙無八劵依小孟同絲麻三月服男女十五升布爲衣冠若大孟及石井公並云發蒙之教恩情極重制舉哀受吊無成服之儀今按易云童蒙來求我匪我求童蒙若不發童蒙終當見覆, CK-KZ: 長存}
