  - {type: substitution, offset: 1473, original: 内, replacement: 內, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4477}}
  - {type: variant, offset: 1477, length: 4, content: 棺頭餘任, CK-KZ: 空智明慧遼故曰洞空洞遠無礙不可得窮始青之氣雖曰一通智慧而五氣總焉空無所納故無損傷人雖有形形亦法空鼻有黃寧辟非之神人未持戒則智慧不通未入智慧不可雜食臭腥之物臭腥之氣使人鼻神壅塞徑源易有斷絶明梁不通故說是戒以度天人咸使男女得聞法音欲度諸苦八難之中當受是戒以制鼻神勿多受臭滌蕩明梁道引生氣通明智慧洞氣入空持戒制已則眾氣歸身眾氣自歸與氣混同長保身命終不毀傷天尊言西爲洞虛少陰之氣氣出於虛智微慧朗故曰洞虛虛之無礙洞遠難窮少陰之氣雖曰一通智慧而五味總焉虛無不入虛無不容人雖法虛身不持戒則智慧不通智慧未入則五味爲患貪啖脂熏五神不安致有傾危年命不長故說是戒以度天人咸令男女普聞法音欲得長命當持大戒以制五神愼貪五味甘其脂熏滌蕩五臟每令清涼身有智慧則五味和香內則恬夷年命不傷天尊言南爲洞清太陽之氣氣出於清智清慧開關而洞清故南有赤帝洞陽之庭冶鍊萬物受鍊而明也人不持戒則智慧不通智慧未通則心神振動生於愛欲使人迷荒喪神傷命夀不得長故說是戒以度天人咸使男女普聞法音欲得長壽過度諸患當受是戒以制心神除情遣欲棄塵入清通明智慧六覺開津身入洞清與氣自然保爾年命永得長存天尊言北曰洞微微生於玄智遠慧深微而洞眞陰察罪福}
