  - {type: indent, offset: 2368, content: 　, id: KR5b0147_krp_016-bkkind34}
  - {type: variant, offset: 2370, length: 638, content: 受者皆服斬衰三年從極重之制飮食言語觀聽寢處皆依孝子本儀竟則服吉而無餘禫今人大盟之師則一期散髪上清之師或去無服或至三號或云九月非直不識三品三奔三籙未知三品復是何經直據七傳是上清枝條因而即服九月坐由不覩經卷觀覧豈復能周師以慕廣輕傳資乃愛紫爭受陶先生云古人以爲皮好吾今以爲耳學信哉斯言豈其受得上清見經而不識旣不識法豈得慢師上清大盟同是眞經俱存重服請各思審二孟乆詳經師籍師右二孟云二人而言服經師小功籍師大功亦復看師之輕重看師輕重者為師三年為籍師一期爲經師大功為師一期籍師大功經師小功爲師大功籍師小功經師三日爲師小功籍師三月經師無服若師爲籍師皆輕弟子於師又輕各從減之也同學右上二孟同制緦麻三月日服師爲弟子右二孟云師爲第子例一等爲師三年報一期齊衰者九月大功者五月小功三月石井公云報服同弟子唯不解髪耳至知俗禮所明以卑厭尊從二孟爲九師年過老若不勝衰心䘮而巳二孟云門中弟子爲師依經說度脫生死恩重二親而居䘮事周不同俗禮旣無凶苦不爲拔經諸餘服紀皆依法輕重以爲制度石井公云報服所養生小成拔並須散髪不限受法大小若着服者臨時自裁送葬儀第七若是大德名人可依鎭經五練生尸經預書五石一依經法此不具載至葬日行䘮以入塚經寳旋安供養香花幡蓋伎樂誦詠次第施列在前道士從䘮者於後以靈轝次之亦幡花於前次第三祭食轝第四䘮轝轝後孝子是其弟子重者在前輕者在後若有俗人孝子最在後若船行應尊者在後終令前吉後凶次第逐時當消息也至墓入廣安置法取中前入棺安經塚前供飬依法安靈牀塚右設祭於前男考塚左女孝塚右從道七正正向塚對經行道懴悔讃誦行香, CK-KZ: ''}
