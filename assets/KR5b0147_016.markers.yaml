  - {type: variant, offset: 2094, length: 224, content: 緦麻者縷小如絲實是麻作故曰緦麻小功者布縷旣小用功則多故曰小功布縷旣大用功則少故曰大功石井公雖有此條竊不用也請依二孟未葬之前布冠布褐若其葬畢布巾布帔自然中盟三皇五符七傳寳神等經符寳神即洞神經也右件二孟同制服大功九月男女七升布爲衣十一升布為冠石井公直云九月不言升數靈寳大盟眞經三品眞經即上清大洞眞經也三品是上清受道經有二品經目合三十五卷三籙一八素曲辭籙二上皇玉籙三謂三天正法籙三奔日奔月奔星奔三奔即是三景受上清三奔登上玉清景上清景太清景今受三奔得稱三景, CK-KZ: ''}
