  - {type: variant, offset: 3011, length: 934, content: 齊食竟弟子於祭前誦祭文竟哭盡哀畢起辤經法畢内經於塚中若路遠又以時消息之入棺竟於柩頭安石牀案子置上内所將經法置中安仙童於左玉女於右神仙兵馬安塚口兩邊龕前又安方牀施几案紙筆硯墨手巾香火等物孝子皆拜奉辭塞塚竟行吊慰之禮畢還巳上並二孟所制滿案其俗禮貧冨有宜徧歷眞經亦無等制佶然還䰟水上仁安反𩲸火中古以野爲棺莊周以天地爲槨豈專在禮法度數觀於衆人之耳目哉若以生能重道德死必賤形骸隨事變通逐時増減不在一二三四之數安靈儀弟八二孟云次靈牀位五尺牀南向施屏帷帳幔衣物隨四時法牀前安橙列香火巾笏梳刷服飾朝旦安几褥暮移别牀席安枕被晨仍卷取朝中進食眞楊枝淨水手巾一如生時所須四時用物陳列咸在二孟云若公王父伯師長來吊孝子出戸外迎從别道還靈東頭倚哭以北為上次輕孝於靈前北向倚哭以東爲上尊者進客位位位亦以東為上伏哭五聱音來吊孝子跪受尊者撫手仍再拜畢送至迎處還倚哭畢若俗人重者不須拜若次重者直出靈東頭倚哭客哭竟來吊跪受執手客去哭訖若平人吊直依次坐哭受客吊吊客卑者直禮拜不執手若次敬者跪執手平體者直倚執手客若法俗中有親縁者吊慰竟更於靈前倚哭展哀乃去若客自從有䘮以來未經相見者雖於孝子平體亦須出倚哭受吊弟子歸本觀儀第九二孟云若非時節各還本館者則安下下牀於北壁下南向以西爲上坐哭受吊若客尊者跪受執手平者坐受吊施安客位於西壁下安五尺牀東向開後客東向以次上牀以北爲上伏哭五聲起吊孝跪執手如前今人不安浮靈請以空堂受吊孝子居寢處安素下牀除舊屏帷以蘆發圍牀户懸白布幔蒲履言語對而不間除服儀第十二孟云自從初七二七三七至百日周年隨心功德竟過此靈上朝中無復施設唯安香火至再周亦可除之滿意言亦可除者當知有不除之義旣無名德豈乆安牀張法師云安香牀弟子旦夕哭泣三日内設齋中時下齋食至四日巳上設清水一盆百日訖毀座除服隨輕重也旣是名德百日恐情所木申今若是至德朝野共尊雖劒舄委形神昇天闕所在號慕瞻仰几筵若永安牀不俱恒例如弟子中受法至極而服斬衰可再周安牀若弟子盡服一期者可一周安牀若服九月者可九月安靈若服五月者可五月安靈有三月服者可百日安牀若過貧窮又無後胤雖安靈席空設几筵進獻靡增塵盈垢積安雖乃易除甚將難如情所不勝請隨時消息若各德旣不過人又無後胤殯葬以足送終如例不煩靈席若是絶於世事含光藏輝名譽如泡身形似夢不求厚葬無事几筵旣有遺言各隨所況也, CK-KZ: ''}
