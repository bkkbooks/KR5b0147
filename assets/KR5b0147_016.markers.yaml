  - {type: variant, offset: 990, length: 462, content: 通上謹臨尸使者關歛君吏一合下監臨殯歛安隱骸爽長寧蒿里隨業轉輪功成事畢所請衆官謁還天曹列受功賞進秩如常科比無令失意有恚恨者生死犯並乞原赦恩惟太上分别云云右前是臨殯章須大治道士受破殗籙者奏之旣有經目不可示外人一兩日燒之若非大行名人歛時必無子弟三禮三契非卒取能兼之上章事須明解一失節度束手無依謹依科撰三歸略陳切要亡人入棺訖先依孟先生作移書了即於棺頭鋪席然香將小磬子打三下歛長訖乃長跪騰亡者情事伏聞法本無生生而有死匹雲中電火如海上波城倏忽不與人期窈冥誰知趣向少時蹔遇所倚爲親念念遷移俱非常保時時捨故咸以哀人今日亡某命偶良縁得生聖代聞經見道奉誡修眞旦暮揖其龍章晨昏朝其鳳篆本圖鶴舉永願雲昇豈悟孔水摧年莊山促壽一朝捨命萬刼長乖思坐起而無從對衣衾而洒淚裝束旣整殯服以施良時入棺謹依䘮禮所有移文具條列䟽讀移文讀移文訖唱三歸依當爲亡者歸依十方大道願降威神拔七世苦根解三塗結縳遨遊妙苑練識仙官稽首至眞無極大道當爲亡者歸依三十六部尊經願玉宇金篇資神養性龍文鳳篆瑩府濤情永離北酆長居南極稽首宗玄自然法寳當爲亡者歸依後聖諸得道玄中大法師朗七覺光明照六, CK-KZ: ''}
