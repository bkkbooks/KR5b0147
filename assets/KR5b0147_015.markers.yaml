  - {type: variant, offset: 6, length: 4028, content: 滿編道士吉凶儀并序法滿後識晚生未能窮究至於脉制深以致疑竊尋大孟先生諱景翼字輔明對齊文惠太子問道士送終儀體引法輪經云師如父也我若無師不得見經今見經教乃知道法黄籙簡文載事師之科典故學道修法存師在前旣荷開度禀佩經圖濟抜三世救護存亡經文言得眄篇目九祖同仙故眞人云我若無師不得學道成道也若其託形現世者皆顯師資之迹或因劒杖告終者則是託物令知變化無常也自非體道冥眞者自然有欣生惡死之心藎人倫本有者孝性乃至感動天地通逹神明哀戚之情觸境自發雖復賢愚有品而愛惡不殊乃是道俗難同大方莫異昔孔子旣爲儒學之師止教世間典禮死埋泗水之上弟子皆服三年子貢廬住塜邉六載魯人因從居者百有餘家遂名爲孔里之民四時祭禮不輟況在道家法門所禀宗匠能使德踰三界行超六道乃復冥一至眞會合常寂此則内外懸殊非是情數所能譬也仍爲立儀略將備盡又有小孟先生以酌前儀更加切要石井公所撰引抱朴内篇云昔漢太后從夏侯勝受尚書賜黄金百斤佗物不可數及亡又賜家錢二百萬爲勝素服五日成帝在東宫從張禹受論語即尊位賜禹爵關内侯食邑千户拜光禄大夫賜黄金千斤又遷丞相進爵安昌侯年老賜安車駟馬黄金百斤錢千萬及禹病嗣省之親拜禹牀下章帝在東宫桓榮以孝經授及即帝位以榮爲太宰天子幸榮東面坐說設酒會百官及榮門生數百人帝親自持業讃說賜爵關内侯食邑五千戸榮病帝幸其家入巷下車把卷趍如弟子之禮薨天子爲素服舉哀此悉儒學指教一經尚復崇師殷勤若此求眞要而不准經誥服乎乃立典儀訓門中子弟張續先生所制或異或同見此四儀不齊一意使後徒遵奉隨執見乖今會四家略爲一卷率愚注訣并酌異同隨世沉浮逐時增減兼復師在之日逺離几筵諮問寒温要憑啓䟽脫恐晚學不識重輕謹述所見名曰道士吉凶儀合十例件狀如左通啓儀第一吊䘮儀第二疾病儀第三初死小殮儀第四入棺大殮儀第五成服儀第六葬送儀第七安靈儀第八弟子還觀儀第九除靈儀第十通啓儀第一正月孟春猶寒餘寒二月仲春漸暖巳暖三月季春暄和極暄四月孟夏漸熱巳熱五月仲夏暑熱甚熱六月季夏盛熱極熱七月孟秋猶熱餘熱八月仲秋漸涼甚涼九月季秋漸泠巳冷十月孟冬薄寒巳寒十一月仲冬甚寒嚴寒十二月季冬切寒極寒右裴矩云今爲表啓及書皆云孟春猶寒以後各依前件時節十五日一改亦隨事爲之剌史縣令初到道士通啓題云某觀道士姓某啓謹上明使君記室明府侍者道士姓某惶恐伏惟明使君縣令云明府德業弘遠徽猷昭著紆降仁明屈臨弊境凡在道俗莫不歡慶孟春猶寒不審尊體何如貧道抱疾不獲隨例不任恱豫之情謹啓不宣某謹啓月目某觀道士姓某啓啓准此凡初經正冬二節書首須目言感思并問前人增懷者正謂二親不存論感思之語若不經初節及彼此二親俱在者並不須論問如父亡母在及二親俱亡云某節遠感深母亡父存者遠思前人父母有不存者云念若前又尊於已云惟增懷舊書云頓首叩頭者皆爲敬彼之辭父在稱頓首父亡稱叩頭但與五服卑親及在下官屬云頓首叩頭者以爲未可若吊答重䘮書稱爲頓首除此之外悉去頓首之言與髙祖曾祖祖父母書題云髙祖翁婆曾祖翁婆祖翁婆几前某言䟽女某氏言䟽與父母書題云爺孃几前某言䟽女某民言䟽月日某言孟春伏惟增懷若無經正冬節及尊者二親在不須云伏惟增懷即移孟春著於猶寒之上餘皆准此違離未巳乆思戀無譬奉某曰誨伏慰下情不得書云不奉近誨夙夜惶懼猶寒不審尊體起居何如伏惟寢膳勝常即日某蒙恩接侍有違唯增馳結伏願珍和某言䟽不備謹䟽若作單書移月日於後云謹䟽自此已下書皆准此修受道師書未得法師同題云師主姓尊師几前若大德云某姓法師几前弟子姓名惶恐白䟽月日某惶恐言孟春遠感伏惟增懷不審尊體起居何如若非師直云如何不用起居之語某即日粗得蒙恩若離乆即云違逺日深下情馳結若不得書云近不蒙誨思想唯精若得書云奉某日誨伏慰下情未即拜覲唯增春戀伏惟珍重某惶恐再拜師與弟子書題云弟子姓位省某告月日告某孟春遠感深不見汝乆懸憶纒懷日書爲慰寒汝可不吾如常未即見汝但以歎滿好自愛愼及此不多師某告與同學兄姊書題云同學某姓兄姊前某白䟽月日某白孟春遠思深伏惟增懷分違未乆思戀帷積奉某日問伏慰下情不得書云不奉近問下情馳懷猶寒不審體履如何某粗䝉恩奉見未由但增延結伏願珍重某謹白䟽不具某再拜與同學弟妹書題云同學姓某弟妹省某呈月日某報孟春云云分張未已乆思憶每深猶寒比何如某諸疹弊言集未由但增慨滿善自敬愛乃書不多某報與伯叔父母書題云某次弟伯叔父母某氏姑在室云次弟座前某言䟽女云某氏女言䟽與兄姊書題云某次弟兄姊某氏姊座前某白䟽與同宗絶服尊行書題云某官翁伯叔座前白䟽與堂兄書題云某位兄前某白䟽與弟妹書題云某位弟省妹云某氏妹省同堂亦然書中若親兄弟姊妹無父母云孟春遠思深伏帷同懷若與堂兄弟云惟增懷與舅舅母及姨書題云次弟座前某言䟽與外甥書題云某省與小童書題云謹呈姓位公某白孟春遠思深云云謹白書不具姓某呈與平懷書題云呈姓位公某白孟春云云遣白書不具姓某呈與小輕書題云白姓位不具姓某白與極輕書題云姓位比無言寫念想爲勞得某日書爲慰猶寒何如也次諸疹弊相見未期但增歎滿善將愛及此不多姓某䟽吊丧儀第二吊剌史縣令諸貴重䘮啓題云某觀道士某啓傍注云謹上明使君縣令云明府月日某啓禍出不圖某位公母云夫人傾背若三品以上并爲髙官云薨背下情悲惻伏惟攀慕號踊荼毒難居不任下情謹奉啓不宣謹啓吊師遭父母䘮啓題云弟子姓名啓傍注上尊師几前月日某頓首頓首禍故無常尊翁尊婆傾背哀慕抽剥不能自勝伏惟攀號無及五内摧裂何可堪居酷當柰何未即奉拜伏增悲咽謹啓不備某再拜師父母䘮吊師兄弟書題云至孝姓位凶前郡姓某白吊父在母亡云苫前尊府君母云尊夫人不終遐壽奄棄孝飬情深惻怛惟攀號躃荼毒難居甚痛柰何甚痛柰何未獲造慰望增酸哽謹遣白書慘愴不次道士白吊師丧報同學兄姊書題云同學某姓兄前某白䟽月日拜䟽某言無狀招禍禍不滅身尊師違和須諭病狀不蒙靈祐以某日奄垂棄背號天扣地貫徹骨髓不能自勝伏惟悲慕無狀柰何苦毒柰何伏增號絶謹言䟽荒迷不備某再拜師䘮報同學弟妹書題云同學姓某弟妹省某白報月日某白報無狀招禍禍不濺身上延滅尊師攀號躃踊五内屠裂不能自勝唯增哽咽迷荒不次報同學䘮報師啓月日拜䟽某言禍出不意同學姓某天殁哀痛抽割不能自勝伏惟悲悼傷切何可堪處痛當柰何痛當柰何未由奉拜伏增哽咽謹言䟽不備某再拜疾病儀第三二孟云案仙公門訓云凡道士疾篤將困之時皆須香湯沐浴冠帶如常儀出所禀經法佩帶於房前施安供養請諸名德齋戒誦經懴悔受身以來所犯諸罪不得有所隱藏顯而發露滅罪析福也張續師云可轉度人經一兩百徧仙公云若須投藏付囑經法悉作辭牒條狀申謄件别名品奏聞太上不有隱昧也中元玉籙云奉師威儀師有哀憂弟子皆當心抱憂戚出入無歡玉籙又云師有疾病弟子皆當侍近左右親視氣息有知父母玉籙又云師有災厄弟子皆當率諸同學建齋析請以立善功千眞科曰出家之人與俗有别然而死病亦無定法然稍修製疾病之時轉讀然香晝夜不絶臨終之時打無常鍾啓送终依五練生尸法夫以疾時觀内大衆數以存問檢校㕑下令前與病人食疾病之時難有達命者福勢旣盡乃欲隱避東西此並是前路功德無憑而以臨時驚懼徒作此意速死而巳可以淨灑掃開敞房舍來往善知識達命之言更相啓發諸法無常寧有住者必應壽書量命無㡬可移入遷化堂其堂可於觀西北角別立爲院堂三間五架堂面看西北其堂中髙座上造昇虚像像身坐蓮花如人大舉左手以指天門左右二眞俠侍病人恐命將絶移入堂中像座後安置用黄紋全幅爲幡長二丈四尺中央繫左眞腰幡頭與病人手捉令病人直心正念願隨二眞登天門詣金闕脫未應化隨建福田男官頭向左眞女向右眞一入此堂難得平然歸者臨命將絶咸稱未困特是貪生有此計耳達命君子豈去住爲心科曰男女官年將老病死期將至家事錢物皆委付諸弟子中可親信者師有遺書依書處分如無遺書一一條録生資與諸子弟有所知者共議修營功德及充殯葬如無子弟觀衆處分如無觀衆道衆處分不得將與俗家兄弟孫姪等費用如有父母師主在遺書所命者依書又不共活無有命書輙取者犯五逆罪私不能制止送與官司初死小殮儀第四至死時旣不沐浴無俟安牀上直敷兩重席於地南首不須攺易仍著手衣襪冠巾衣居常出入時衣佩符籙於左肘鈴印於右肘便安下衾上被覆之停住設白粥之奠於尸東當肩祭訖次兩邊鋪薦於地男孝居左女孝居右不須如俗人含珠喚𩲸也撤奠亦尸東祭文云帝號木歳某子某月朔某日弟子某甲謹以清酌蔬奠奉祭師尊之靈云云竟哭盡哀此小殮時也入棺大殮儀第五至大殮時不須香湯洗俗著衣冠帶如齋時服飾先朱臈棺安石灰梓木七星板笙簟雞鳴枕使四人扛衾内棺中以傳策置左符鏡置右少近頭邊舊來安隨身經法内前鬲子中堅安之今安棺外頭別案盛之亦好仍設大殮之奠法隨用生時所進之食先鋪席於尸西進奠於席上果莱祭文云云竟哭祭記收祭食於粮甖中安棺頭舊以白素書移文今人紙書亦得先條隨身佩帶於前次送終物置後道士移文謹條某州郡縣鄕里觀舍男女官三洞弟子某甲所受經法扎目如左録治五千文戒等右件詣某師奉受自然劵五老赤書眞文三皇上清三品經右件詣某師奉受凡授弟子若干人靈寳法若干人上清法謹條三洞弟子某甲將經法自隨入塚扎目百八十戒文仙靈二官録眞文佩筞符印等右件隨身入棺中上清經某卷七傳某卷五法佩帶及上清諸佩文右件合一凾若干卷隨身入塚中供養謹條三洞弟子隨身寒夏衣裳及紙筆等扎目某衣某物右件隨身入棺中硯筆紙手巾墨書刀奏案香鑪右件隨身入塚中合經法衣物如于條維某年太歳甲子某月朔某日天老移吿夭一地二孟仲季五路將軍蒿里父老土下二千石安都丞武夷王里域眞官河伯水府䰟門監司墓門亭長山川澤尉直符使者今有三洞弟子某州郡縣鄕里男生某甲年如于今月某日某時生期報盡奄然捨化䰟昇天府形入地居今當還某鄕某里山造立塼塚某生時離俗從師請道出世尋學受佩上清三洞大經符圖誥傳並抱還太隂及寒夏衣裳飾身服用凡若干種杉棺殯殮埋定送终之具符到明即安隱形骸肅衞經寳料領冠帶約勑所部扶迎將送不得留滯今無罣礙逕至藏所不使左右比廬東西南北佗姓等鬼貨名詐姓妄生侵奪明承符勑不得有違一如太玄都鬼法女青詔書律令右移增損隨時耳仙公曰道士經法能預投於名山福地淨宻處者是爲第一不必將死屍同穴也滿見今人受法師猶不盡備經弟子亦有不能辨本所寫受經何必與屍同穴何必預投名山經留代代相傳符籙隨棺入塚出處隨時見於斯