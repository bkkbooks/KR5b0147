及此不多姓某䟽吊丧儀第二吊剌史縣令諸貴重䘮啓題云某觀道士某啓傍注云謹上明使君縣令云明府月日某啓禍出不圖某位公母云夫人傾背若三品以上并爲髙官云薨背下情悲惻伏惟攀慕號踊荼毒難居不任下情謹奉啓不宣謹啓吊師遭父母䘮啓題云弟子姓名啓傍注上尊師几前月日某頓首頓首禍故無常尊翁尊婆傾背哀慕抽剥不能自勝伏惟攀號無及五内摧裂何可堪居酷當柰何未即奉拜伏增悲咽謹啓不備某再拜師父母䘮吊師兄弟書題云至孝姓位凶前郡姓某白吊父在母亡云苫前尊府君母云尊夫人不終遐壽奄棄孝飬情深惻怛惟攀號躃荼毒難居甚痛柰何甚痛柰何未獲造慰望增酸哽謹遣白書慘愴不次道士白吊師丧報同學兄姊書題云同學某姓兄前某白䟽月日拜䟽某言無狀招禍禍不滅身尊師違和須諭病狀不蒙靈祐以某日奄垂棄背號天扣地貫徹骨髓不能自勝伏惟悲慕無狀柰何苦毒柰何伏增號絶謹言䟽荒迷不備某再拜師䘮報同學弟妹書題云同學姓某弟妹省某白報月日某白報無狀招禍禍不濺身上延滅尊師攀號躃踊五内屠裂不能自勝唯增哽咽迷荒不次報同學䘮報師啓月日拜䟽某言禍出不意同學姓某天殁哀痛抽割不能自勝伏惟悲悼傷切何可堪處痛當柰何痛當柰何未由奉拜伏增哽咽謹言䟽不備某再拜疾病儀第三二孟云案仙公門訓云凡道士疾篤將困之時皆須香湯沐浴冠帶如常儀出所禀經法佩帶於房前施安供養請諸名德齋戒誦經懴悔受身以來所犯諸罪不得有所隱藏顯而發露滅罪析福也張續師云可轉度人經一兩百徧仙公云若須投藏付囑經法悉作辭牒條狀申謄件别名品奏聞太上不有隱昧也中元玉籙云奉師威儀師有哀憂弟子皆當心抱憂戚出入無歡玉籙又云師有疾病弟子皆當侍近左右親視氣息有知父母玉籙又云師有災厄弟子皆當率諸同學建齋析請以立善功千眞科曰出家之人與俗有别然而死病亦無定法然稍修製疾病之時轉讀然香晝夜不絶臨終之時打無常鍾啓送终依五練生尸法夫以疾時觀内大衆數以存問檢校㕑下令前與病人食疾病之時難有達命者福勢旣盡乃欲隱避東西此並是前路功德無憑而以臨時驚懼徒作此意速死而巳可以淨灑掃開敞房舍來往善知識達命之言更相啓發諸法無常寧有住者必應壽書量命無㡬可移入遷化堂其堂可於觀西北角別立爲院堂三間五架堂面看西北其堂中髙座上造昇虚像像身坐蓮花如人大舉左手以指天門左右二眞俠侍病人恐命將絶移入堂中像座後安置用黄紋全幅爲幡長二丈四尺中央繫左眞腰幡頭與病人手捉令病人直心正念願隨二眞登天門詣金闕脫未應化隨建福田男官頭向左眞女向右眞一入此堂難得平然歸者臨命將絶咸稱未困特是貪生有此計耳達命君子豈去住爲心科曰男女官年將老病死期將至家事錢物皆委付諸弟子中可親信者師有遺書依書處分如無遺書一一條録生資與諸子弟有所知者共議修營功德及充殯葬如無子弟觀衆處分如無觀衆道衆處分不得將與俗家兄弟孫姪等費用如有父母師主在遺書所命者依書又不共活無有命書輙取者犯五逆罪私不能制止送與官司初死小殮儀第四至死時旣不沐浴無俟安牀上直敷兩重席於地南首不須攺易仍著手衣襪冠巾衣居常出入時衣佩符籙於左肘鈴印於右肘便安下衾上被覆之停住設白粥之奠於尸東當肩祭訖次兩邊鋪薦於地男孝居左女孝居右不須如俗人含珠喚𩲸也撤奠亦尸東祭文云帝號木歳某子某月朔某日弟子某甲謹以清酌蔬奠奉祭師尊之靈云云竟哭盡哀此小殮時也入棺大殮儀第五至大殮時不須香湯洗俗著衣冠帶如齋時服飾先朱臈棺安石灰梓木七星板笙簟雞鳴枕使四人扛衾内棺中以傳策置左符鏡置右少近頭邊舊來安隨身經法内前鬲子中堅安之今安棺外頭別案盛之亦好仍設大殮之奠法隨用生時所進之食先鋪席於尸西進奠於席上果莱祭文云云竟哭祭記收祭食於粮甖中安棺頭舊以白素書移文今人紙書亦得先條隨身佩帶於前次送終物置後道士移文謹條某州郡縣鄕里觀舍男女官三洞弟子某甲所受經法扎目如左録治五千文戒等右件詣某師奉受自然劵五老赤書眞文三皇上清三品經右件詣某師奉受凡授弟子若干人靈寳法若干人上清法謹條三洞弟子某甲將經法自隨入塚扎目百八十戒文仙靈二官録眞文佩筞符印等右件隨身入棺中上清經某卷七傳某卷五法佩帶及上清諸佩文右件合一凾若干卷隨身入塚中供養謹條三洞弟子隨身寒夏衣裳及紙筆等扎目某衣某物右件隨身入棺中硯筆紙手巾墨書刀奏案香鑪右件隨身入塚中合經法衣物如于條維某年太歳甲子某月朔某日天老移吿夭一地二孟仲季五路將軍蒿里父老土下二千石安都丞武夷王里域眞官河伯水府䰟門監司墓門亭長山川澤尉直符使者今有三洞弟子某州郡縣鄕里男生某甲年如于今月某日某時生期報盡奄然捨化䰟昇天府形入地居今當還某鄕某里山造立塼塚某生時離俗從師請道出世尋學受佩上清三洞大經符圖誥傳並抱還太隂及寒夏衣裳飾身服用凡若干種杉棺殯殮埋定送终之具符到明即安隱形骸肅衞經寳料領冠帶約勑所部扶迎將送不得留滯今無罣礙逕至藏所不使左右比廬東西南北佗姓等鬼貨名詐姓妄生侵奪明承符勑不得有違一如太玄都鬼法女青詔書律令右移增損隨時耳仙公曰道士經法能預投於名山福地淨宻處者是爲第一不必將死屍同穴也滿見今人受法師猶不盡備經弟子亦有不能辨本所寫受經何必與屍同穴何必預投名山經留代代相傳符籙隨棺入塚出處隨時見於斯矣其有隨身物内後鬲子中不須如俗人作穀嚢腰繩終具等物事畢上蓋依科安之棺上次安應入塚法物於棺南頭施列供養燒香道士皆冠帶法服一人棺南頭唱禮三寳三拜竟要修科儀戒律鈔卷之十五, YP-C: ''}
