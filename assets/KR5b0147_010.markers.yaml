青甲籙右二契二籙明火德禮爲先主日行赤道仙攝熒感星眞一契三丑契玄籙元命籙右二契二籙明木德仁爲端主歳星三一契無終籙右一契一籙明水德智爲源主辰星五色一契太甲籙右一契一籙明金德義爲本主太白星太一劵號金劵劵乃契之别名八契有定階故言契太一通八階故言劵金者練乆彌精變化不滅八契如前十籙并滿籙爲十籙也百五十將軍籙已下至一籙天師子孫登皇壇後不受悉行若未登皇壇皆諸髙德受之而傳凡學道立功當受内外治皆稱臣妾天師命授皆稱官都功大治行版署不得稱生玄都律曰受籙章等有鬼吏兵於里中可著遊行本相經云問曰祭酒授民籙得財有罪不答曰祭酒人中師萬民看爲則取財不施散後師效爲法此是罪之首禍大殊於刼受罪如循還萬世無休帀天門永不容長與三惡合章表赤松子問天老平長前以建日己丑日未時上章何不報平長曰已丑日見扶香案齎章到門門𨳲不開便去復問平長曰一夜一周何時開平長曰閉卯已未百亥丑開辰午申戌子寅子日閉子爲日神傷師母時不可用辰午申戌子寅開卯已未酉亥丑丑日閉丑爲日神傷牛犢時不可用卯已未酉亥丑開辰午申戌子寅寅日閉寅爲日神傷六畜時不可用辰午申戌子寅開卯已未酉亥丑卯日閉卯爲日神傷師父時不可用卯已未酉亥丑開辰午申戌子寅辰日閉辰爲日神傷父母時不可用辰午申戌子寅開卯已未酉亥丑已日閉已爲日神傷女婦時不可用卯已未酉亥丑開辰午申戌子寅午日閉午爲日神傷物𩔖時不可用辰午申戌子寅開卯已未酉亥丑未日閉未爲日神傷病者時不可用卯已未酉亥丑開辰午申戌子寅申日閉申爲日神傷遠行時不可用辰午申戌子寅開卯已未酉亥丑酉日閉酉爲日神傷飛鳥時不可用卯已未酉亥丑開辰午申戌子寅戌日閉戌爲日神傷遠行時不可用辰午申戌子寅開卯已未酉亥丑亥日閉亥爲日神傷行人時不可用卯已未酉亥丑開辰午申戌子寅建日可呈章九通利上開化大道收捕凶殃鬼賊忌不上誅符破廟傷一門及師忌申時斗繫下左行除日可呈章十二通利上治病分解塜墓列考建子孫忌不上保䕶錢財忌酉時滿日可呈章六通利上安隱塜墓及保䕶錢財忌不上解一宅中虚耗傷六畜忌戌時平日可呈章十七通利上分解百功禁忌收除衆邪忌不上保䕶錢財六畜傷師及奴婢不吉忌亥時定日可呈章二十八通利上五方保䕶安鎭宅解土公虚耗忌不上收除故氣天一傷長者忌子時不吉執日可呈章五通利上收百鬼賊解中捕者忌不上洽病傷病者不吉忌丑時斗繫下破日可呈章七通利上誅房廟收滅怪伏尺茲日死忌不上解塜墓絶世不吉忌寅時危日可呈章二通利上度星解亡人復連七世牽逮子孫忌不上安宅傷六畜忌卯時成日可呈章十八通利上録署保護大小治病忌不上遠行保護行人不還凶忌辰時收日可呈章百二十通利上解首謝度厄保護六畜家宅忌不上解官訟必有獄死不吉忌已時開日可呈章百二十通利上收除故氣房廟千師萬巫六畜衆精室中魍魎雜神之鬼忌不上解亡人復連六畜死忌午時閉日可呈章五通利上解百功禁忌破射年命忌不上保䕶大小傷錢財不吉忌未時甲子上章凶甲午上章吉利乙丑上章凶乙未上章吉利丙寅上章凶女坐死丙申上章大吉一云忌家長丁卯上章凶並忌陽官丁酉上章不吉凶死戊辰上章凶諍忌戌戌上章大凶暴諍忌己已上章不吉已亥上章大吉庚午上章不吉庚子上章大吉辛丑上章不吉辛未上章三年長子坐死壬申上章一年長子坐死壬寅上章吉利一書云凶癸酉上章家母坐死癸卯上章大吉利甲戌上章大吉利甲辰上章不利凶死乙亥上章家宜蠶乙己上章不利凶死丙子上章三人坐死丙午上章大吉丁丑上章大吉利丁未上章有坐死者戊寅上章夫婦坐死戊申上章不吉凶死已卯上章小吉已百上章大吉利庚辰上章大吉庚戌上章大吉辛已上章大吉辛亥上章凶死壬午上章大吉利壬子上章大吉利癸未上章大吉利癸丑上章大吉利甲申上章吉甲寅上章凶死乙酉上章大吉一云凶乙卯上章不吉丙戌上章家有死者丙辰上章不吉丁亥上章不吉丁巳上章大吉利戊子上章小吉戊午上章大吉利丁巳戊午凶己未上章大吉利己丑上章凶死庚申上章吉利庚寅上章大凶死辛酉上章凶死辛卯上章吉壬戌上章不吉壬辰上章吉利癸亥上章不吉利癸巳上章女坐死上章當别有筆硯以書章不得雜佗也磨墨左行四十九過重磨亦准前書章時燒香北向書章向亥巳未丑上章吉時卯巳申亥此四時可治病餘時凶不可用愼之上章吉時時巳自忌師行年本命不可曾觸犯傷師愼之建日可誅符破廟繫百鬼精邪正月七月建日晡時下平日人定時下破日平旦時下收日禺中時下除日日入時下定日夜半時下危日日出時下開日日中時下滿日黄昏時下執日雞鳴時下成日食時下閉日日昳時下右此十二日忌斗繫下時不可上章治病害師及作章主人明㝷愼之諸是出䘮嫁娶定婚亦忌時治病忌日甲午甲申甲戌甲寅乙卯丙辰日皆凶又忌寅卯申酉午丑並凶不可上章辛未尤甚章醮及乞福啓告之時悉避斗繫正月七月已録如前二月八月建日戌時三月九月建日子時四月十月建日寅時五月十一月建日辰時六月十二月建日午時右章醮斗繫時或以月時將臨正日太一下爲斗繫章醮啓告之時悉避斗繫時也若欲醮命當用本命日及天生日者甲辰乙已日是也本命醮食不得飼外人餘醮之食悉須施散外客凡就星官乞福結願當避凶惡之日正月庚申二月辛酉三月甲戌四月癸亥五月壬子六月癸丑七月甲寅八月乙卯九月甲辰十月丁巳十一月丙午十二月癸未右上章殺害之日不可請乞萬事無宜也五德之日可謝罪求乞善願甲辰丙辰戊辰忌章醮庚辰忌章醮乙巳忌章醮辛巳忌章醮癸巳忌章醮巳巳忌醮丁已忌醮右五德之日宜乞願乞福欲有所願常以天願日己丑是也所乞善願易得遂心營醮啓告醮曆甲子日壬申癸酉辛已壬午甲申乙酉丁亥戊子己丑辛卯甲辰丙午丁未戊申庚戌壬子癸丑丙辰丁已戊午巳未庚申辛酉甲午丙申丁酉右醮祠良日凶日不載禁依前後又有一五德日甲子甲午最勝又忌日時相破子時破午午時破子凡啓醮之時宜用子午二時啓告若值相破及斗繫若斗繫在子須避子時若斗繫在午須避午時若病人大急亦得非時章醮正月無東向治病病者死七月無西向治病病者死二月無北向治病病者死八月無南向治病病者死三月無西向治病病者死九月無東向治病病者死四月無南向治病病者死十月無北向治病病者死五月無東向治病病者死十一月無西向治病病者死六月無北向治病病者死十二月無南向治病病者死庚辛日晡時日入時治病病者死正月十二月太上虚無丈人宫六月七月太上九氣文昌宫二月太上玄老仙都宫八月太上天帝宫三月四月無上三天太清宫九月十月太上大道宫五月太上重道官十一月太上侍中左右監神諸將軍宫一日建玉曹治赤虚宫十六日司非曹治北府宫二日太素曹治太微宫十七日司姧曹治南箕宫三日太微曹治北平宫十八日統攝曹治通明宫四日都正曹治太清宫十九日統録曹治西虚宫五日正一曹治通明宫二十日監考曹治司命宫六日玄一曹治上明宫二十一日監司曹治陽明宫七日太素曹治髙靈宫二十二日典考曹治太陽宫八日靈集曹治紫微宫二十三日司宫曹治少陽宫九日母靈曹治待春宫二十四日玄元曹治太隂宫十日太清曹治武靈宫二十五日太玄曹治少陽宫十一日三水曹治素女宫二十六日都司曹治北辰宫十二日司録曹治巨野宫二十七日都候曹治太白宫十三日清叙曹治西明宫二十八日直使曹治林明宫十四日玄正曹治上絳宫二十九日眞司考曹治清陽宫十五日中都曹治曲平宫三十日典考曹治啓明宫無上三天無極大道太上老君都正集曹領吏兵九百九十九萬人日月宫曹如故右天師所下分別宫曹諸治職祭酒男女官上章求乞皆諦案科文分别宫曹隨病輕重請官依千二百官儀小病輕事但言稽首再拜困病重事皆言頓首死罪稽首再拜困病重事皆别宫曹言泰玄都正一平氣係天師某治氣祭酒臣甲頓首死罪稽首再拜某郡縣鄕里男女氏壬年若干歳户口若干人疾病云云後言詣某宫曹如故臣甲誠惶誠恐頓首死罪稽首再拜甲辰林車主入官存之甲戌張生主入火存之甲申益章主入草存之甲子九明主入水存之甲寅城隆主入病存之甲午監兵主入闘戰爭訟存之右六甲存神思之正月平旦師時日出師婦時七月日晡時師時食時師婦時二月日出師時黄昏時婦時八月日入師時禺中師婦時三月日出師時人定師女時九月黄昏師時日出師婦時四月禺中師時人定師母時十月人定師時日出師婦時五月日中師時雞鳴師婦時十一月盡師時晡時師婦時六月日出師時平旦師婦時十二月雞鳴師時日入師婦時右十二月男女官祭酒爲人二章當避此衰時不可犯若病命在轉燭可上𠇍告諸祭酒爲能移山止流興雲造雨坐召萬神冬生草木夏結氷霜若能此者都不用此書其身故爲水火刀兵所害當承告㫖明各愼之爲道民解廚食當思天神五帝名衞六甲說諸神仙尊賢五嶽名山道士上願主人得福正月二日二月九日三月十日四月十一日五月十一日六月十一日七月二日八月十三日九月十三日十月八日十一月十五日十二月十三日巳上十二日不可上章啓事大凶正月十一日二月三日十八日三月七日九日四月十五日五月二日五日六月三日十三日七月一日十七日八月二日十八日九月九日十月五日十一月四日十六日十二月二十一日右十二月好日可焼香上章正月旦天臘五月五日地臘七月七日道德臘十月旦民歳臘十二月王侯臘此五臘吉日奉道之家則依此祭先人先須上章啓請先人然後設祭孝子之道也右上章禁忌不可犯愼之用事大吉治人疾病可用赤松子時凡一日之中不得再入靖上章要修科儀戒律鈔卷之十, YP-C: ''}
