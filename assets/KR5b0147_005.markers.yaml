門一百二十九戒者昇玄經云逺身行離口過除惡念拔逮根絶聲色捨愛欲放翫習洗垢穢寛斗局開迫迮廣心性緩促縮勿的莫省諸勞却諸累無疑想迮動作伏汲汲厭諸端斷諸障滅諸跡寛諸見闇諸智遏諸蔽原諸癡止諸漏掃諸患愈諸疹去諸計罷諸求伐諸株斬諸種刈貪冒盡沈吟散結束脫煩惱制意移無諸可無不可爲無爲無諸我無不我無彼我無空想無昏惑無淫想勤可行不疑空平好醜不邪還常住無絶心想習勝意善防害不亂轉不吾念不彼念不悠想無常准無常的無遺顧不追懷無猶豫忍不忍無是道絶無想常住無無無爲行無行作無作想無想興無興無際止無際行無際作無際想無際住察諸性了無根如無相不可滿以不可滿而自整當無想以過止觀一切皆虚空心無欲而常仁不以有諍無巳知一能除一不於一而起相如因一人無際知因無際入無爲知因無爲入虚無知因虚無爲滅盡知因滅盡成爲道知因成道爲最大知安爲安知安爲樂知樂不復憂知無憂爲泰損附著蕩意態休是非不嫌貳棄衆累廢諸蓋割諸連刻因縁愼心轉事無事無親踈等善惡寂無想不我想無常住一於無止無止住無住無際興縷觀法爲同無知有本無知因無際入滅度知因最大爲了無知奉無爲極此一百二十下明九戒處衆愛之中心在道戒之藏處憂患之舍心在善救之堂住闇㝠之室志在斷滅之戸倚不固之屋心在方便之護坐蛇虺之地心在捨逺之逕居虎豹之藪心在福德心在觀滅之庵立在荆𣗥之園心在鎧捍之障是我持戒者也行智慧方便拔死生之難絶一切想滅一切念歸無所滅至眞之道也老君百八十戒者本爲盟威等說老君曰人生雖壽萬年不持戒律與老樹乆石何異寧一日持戒爲道而死不犯惡而生持戒而死上補天官尸解昇仙世人雖爲王公之位死有重罪無益魂神魂神受罪正一道士明而奉行持戒之時弟子沐浴勿食五味五辛攺衣服弟子當執禮師敎伏地聽受禁戒禁戒受已當寫一通諷誦奉行之師曰諸賢各明聽天下萬物無有長在人生有死物成則敗日出則没月滿則虧從古至今誰能長存者唯有道德可乆耳今日亦善今月亦善今時亦善諸賢亦善師宗亦善弟子亦善萬神備具吏兵皆到今以老君故以敎諸賢者故今以萬民惜命故以弟子善心故授禁戒重律諾諾當三讃之然後說戒戒曰弟子不得多畜積不得盜取人物不得妄取人一錢以上物不得畜猪羊不得食五辛不得作草書與人不得以藥毒害人不得妄摘花果不得與兵人爲親不得金銀器食不得輕慢弟子不得妄語言不得獨食不得知人婚姻事不得持人長短不得言人隂私不得勸人令死自盡不得因恨殺人不得自用不得自驕不得惡口罵詈不得厭治病不得裸形浴不得竭水澤不得慢老人不得調戯不得阿黨所親不得門戸别居不得妄罵人作奴婢不得印奴婢面不得快人死不得張目視人不得面譽背處論人之惡不得以毒藥投𣾺水江海中不得親踈他人之尊不得強乞擾亂百姓不得爲世人作禮頭主不得干知星宿占相天時不得敎人淫泆别離夫婦當視弟子如其子不得吐苦向人不得奪人㝠中火不得毀人成功言是已得不得訛訾人器物以爲不好不得擇飲食以爲好惡不得爲人在來惡言不得預論人間儀典不直之事不得冬天發掘地蟄藏自守非急不得妄行不得妄上樹不得以汙穢物著井中不得貪戀居家不得誹謗良人爲奴婢常當慈念萬民無知如蟲當勤求生晝夜勿倦不得破壞錢物當勤避惡人當勤服食無爲斷榖斷榖爲不死道不得以書字之物投於厠前不得多舌不得探巢破卵不得與兵人爲侣不得爲人作忌諱不得祠祀鬼神以爲僥倖不得妄入湖海中浴不得淫泆家相徃來不得録毒藥著器中不得無故走馬馳車不得妄撾打六畜衆生不得手團食每得萬民當願令主人坐得福人呼汝爲師尊顧畏於人勿自輕躁世人並惡善人至少汝勿悒悒道自護汝人爲惡向汝但以善相向善之攘惡如水澆火不得向弟子論人食好惡無事不得妄多受人禮費不得妄開決陂湖女弟子不得爲男弟子畜衣衣不過三通不得自徃治病病家當自來求汝不可食衆生肉唯菜食爲常行道無家居可宿誦百八十戒神衞三重愼所投止先行視之入人家當先問主人尊老名諱不得多廣求寳物不得飲酒不得反叛去本逐末不得婬犯人婦女不得殺生蠕動之物不得燒敗一錢以上物不得以食物擲火中不得以足踏六畜不得多以書相聞不得以火燒田野山林不得知軍國中事占吉凶不得妄伐樹不得數見王公官長不得貪財物不得飲食過度不得販賣奴婢不得自習伎樂不得言人惡事不得别離人家不得投書䜛人不得自貴不得妄鑿地毀山川不得掩人目不得希望人物不得評論師不得慢經敎不得觀六畜交隂陽不得以勢陵人不得帶刀軍中不從此律不得輕瞋恚不得立小便不得亂頭行遊不得祝人令死不得以穢汚之物調人不得說人父母本末善惡不得言人隂私事不得獨與宗族爲親不得與世俗人賦歛不得爲人圖塜宅及起屋不得敎人漁獵傷害衆生不得視弟子有偏人有物與甲乙不得恨人不與己不得與世俗人共相群黨不得馳騁世俗弔問死喪不得擇好舍好牀卧息不得訾人物惡自言已物好不得驚怛令人恐懼不得縣官中傷人不得強取人物以爲恩施不得輕行望遊日月馳騁不得籠鳥獸不得穿人家壁看人婦女不得塞井池不得妄發人書讀之當念恩令我長生而勿妄當令人入名山學不得積聚財寳以招凶禍不得藏埋器物不得枉於人當勤避嫌疑當更相順如父母兄弟姊妹不得平地然火不得布槍𣗥著道中不得向鬼神妄行作禮不得多畜世俗占事八神圖書不得溺生草上及人所食水不得寡婦相親不得妄假舉人物以爲禮賂不得爲人保任劵支不得爲人作辭訟知人事不得髙聲厲言每當含顔而笑不得取人宻謀之書讀之不得驚駭鳥獸受人食飲每燒香常爲百姓請願令天下太平若有人罵汝汝但勿答人設謗汝汝但自内修大道勿憂恐怖天下有災變水旱不調勿得患厭之汝至百姓家不得希人飲食不得與女人㝠室中共語言無事不得聚㑹飲食見人殺鳥獸當生大慈心願濟度不得輕慢賢聖吾當度汝汝遇眞人賢聖尸解每當從道勿習俗禮一事當念清儉法慕清賢度食忖飲不得積聚物當易事易供養勿多難入他國必先問所禁忌不得獨行行與人俱勤誦百八十戒不得作劫賊老君語于吉曰徃古諸仙賢聖皆從百八十戒得道百病戒者老君虚無經云是以聖人求福於未兆絶禍於未有蓋災生於稍稍病起於微微人以小善爲無益故不肯爲以小惡爲無損故不肯攺小善不積大德不成小惡不止以成大罪故擿出一百病使知其所坐也百病者喜怒無常是一病忘義取利是一病好色壞德是一病專心係愛是一病憎欲令死是一病縱貪蔽過是一病毀人自譽是一病擅變自可是一病輕口喜言是一病快意逐非是一病以智輕人是一病乗權縱横是一病非人自是是一病傷易孤弱是一病以力勝人是一病威勢迫恊是一病語欲勝人是一病貸不念償是一病曲人自直是一病以直傷人是一病惡人自喜是一病怒喜自伐是一病愚人自賢是一病以功自與是一病泯人有功是一病以勞自怨是一病以虚爲實是一病喜說人過是一病以富驕人是一病以貴輕人是一病以貧妬富是一病以賤訕貴是一病䜛人求媚是一病以德自顯是一病敗人成功是一病以私亂公是一病好自唵噫是一病危人自安是一病隂懷嫉害是一病激勵旁悖是一病多憎少愛是一病評論非義是一病推負著人是一病义拒鈎鉅是一病持人短長是一病假自祝誓是一病施人望報是一病無施責人是一病與人追悔是一病好自怨爭是一病罵詈蟲畜是一病蠱道厭人是一病毀訾髙才是一病憎人勝巳是一病毒藥酖餌是一病心不平等是一病以賢嗊嗃是一病追念舊惡是一病不受諌喻是一病内踈外親是一病投書敗人是一病談愚癡人是一病煩苛輕躁是一病擿捶無理是一病好自作正是一病多疑少信是一病笑顚狂人是一病蹲踞無禮是一病醜言惡語是一病輕易老小是一病惡能醜對是一病了戾自用是一病喜好嗜美是一病喜禁錮人是一病鬼魅䛕諂是一病嗜得懷詐是一病兩舌無信是一病乗酒縱横是一病罵詈風雨是一病惡言好殺是一病敎人毒害是一病干預人事是一病孔穴窺視是一病借不念還是一病負債逃竊是一病背向異辭是一病喜抵捍戾是一病調戯必固是一病故迷誤人是一病探巢破卵是一病刳胎剖形是一病水火敗傷是一病笑盲聾瘖瘂是一病敎人嫁娶是一病敎人擿捶是一病敎人作惡是一病含禍離愛是一病唱禍導非是一病見便欲得是一病強奪人物是一病老君曰能念除此百病則無災累即爲百藥矣下岀百藥者體弱性柔是一藥行寛心和是一藥動靜有禮是一藥起居有度是一藥近德逺色是一藥除去欲心是一藥推分引義是一藥不取非分是一藥心離憎受是一藥好相中用是一藥爲人願福是一藥救禍濟難是一藥敎化愚蔽是一藥諌正邪亂是一藥誡勑童蒙是一藥開導迷誤是一藥扶接老弱是一藥以力助人是一藥與窮正分是一藥矜貧傷戹是一藥位髙下士是一藥言語謙遜是一藥恭敬卑微是一藥不負宿債是一藥愍慰篤信是一藥質直端嚴是一藥推直引曲是一藥不爭是非是一藥逢侵不鄙是一藥受辱不怨是一藥推善引惡是一藥推好取醜是一藥推多取少是一藥稱歎賢良是一藥見賢自省是一藥不自彰顯是一藥推功引苦是一藥不自伐善是一藥不泯人功是一藥勞苦不恨是一藥懷實行實是一藥覆蔽隂惡是一藥富有假乞是一藥崇進勝已是一藥安貧不怨是一藥不自尊大是一藥好成人功是一藥不好隂私是一藥得失自觀是一藥隂德樹恩是一藥生不罵詈是一藥不評論人是非是一藥好言善語是一藥災病自咎是一藥生不價𢹂是一藥施不望報是一藥不罵畜生是一藥爲人祝願是一藥心平意等是一藥心靜意定是一藥不念舊惡是一藥匡邪弼曲是一藥聽諌受化是一藥不干豫人是一藥忿怒自制是一藥解散思慮是一藥尊奉老者是一藥閨門恭肅是一藥内修孝悌是一藥蔽惡揚善是一藥清廉守分是一藥好飲食人是一藥助人報忠是一藥救日月蝕是一藥逺嫌避疑是一藥恬惔寛舒是一藥尊奉聖文是一藥思神念道是一藥宣揚聖化是一藥立功不倦是一藥尊天敬地是一藥拜謁三光是一藥恬惔清淨是一藥仁愼謙譲是一藥好生惡殺是一藥不多聚財是一藥不犯禁忌是一藥廉潔貞信是一藥不燒山伐木是一藥空車助載是一藥直諌忠信是一藥喜人有德是一藥救與窮乏是一藥代老負擔是一藥除情去愛是一藥慈心憐愍是一藥好稱人善是一藥因富布施是一藥因貴爲惠是一藥右百藥勸人遵之是以聖人雖處幽闇不敢爲非雖居榮禄不敢爲利度形而衣量腹而食矣觀身三百大戒云元始天王授之太上道君道君傳太微天帝帝君受戒時頌三首云智慧起本無朗朗超十方結空峙玄霄諸天挹流芳其妙難思議虚感眞實通有有竟不有無無無不容智慧恒觀身學道之所先𦕈𦕈任玄肆自然録我神天尊常擁護魔王爲保言晃晃金光軀超超太上仙智慧生戒根眞道戒爲主三寳由是興髙聖所崇受汎此不死舟倐欻濟大有當此說戒時天眞並稽首要修科儀戒律鈔卷之五, YP-C: ''}
