front:
  text: 要修科儀戒律鈔卷之四唐四
  hash: sha256:86c1bced2d99ac04ad9ee0674bbf44e300861cc218ec386aec5884bb0d3638bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0147_HFL_004-001a, image: hfl/0204/0204-092.png}
body:
  text: 三洞道士朱法滿編衆戒及願念合一千一百條夫經以檢惡戒以防非總任枝流難以取用撮其機要易可尋求登真隱訣云戒者遏穢垢之津路防邪風之往來千真科曰出家之人不交世俗不求名利不作有為功德靜思入定降伏外魔名為淨戒是真實法毋觀身大戒云有經而無戒猶欲涉海而無舟楫有口而無舌何緣度兆身邪夫學者不知尋經戒是永悟真要之根長夢而不覺可為痛心矣千真科曰出家之人能持三戒五戒九戒十戒乃至三百大戒等一戒之中各有二十四善神之所擁護天人供養不犯衆惡有不信戒者衆惡故犯罪結𡨋隂劫劫受生墮落盲道違戒奉戒得福獲罪不問道俗至理無偏其功等爾易注云洗心曰齋防患曰戒本際云聖真所修必名為教凡夫所行名之習業施教造業一而無二所謂一戒是發無上自然道意如是正因最為根本又有二戒所謂二觀氣觀神觀即是定慧又有三戒所謂三捨捨身命財又有四戒謂四寄心慈愛善忍又有五戒所謂五念思道清靜思道離諸色欲思道動與俗反思道無有禁忌思道非形聲法升玄又有五戒者若見色利榮華粲綵以戒掩目若聞好惡之言五音之屬以戒塞耳若有八珍之饌甘香之美以戒杜口若願想財貨七寶竒珍放情極欲以戒挫心若憶姧淫貪趣惡事以戒折足能行此五事者七祖生天又有六戒所謂六度勤信雌終㨂爭離酒色等又有七戒所謂七覺知一知三知凶知吉知俗知道知有無又有八戒所謂八能能受非不自申能讓德於人能不欲人所欲能容無理不爭能逺無道藏身幽處能不逹心能不負經戒能不伐口閉塞六情六度生六通三十八戒亦曰六覺亦曰六慧閉塞六情者第一戒者目無廣瞻亂諸華色亡精失童光不明徹第二戒者耳無亂聽混於五音傷神敗正惡聲啼吟第三戒者鼻無廣豐雜氣臭腥易有混濁形不澄正第四戒者口無貪味脂熏之屬濁注五神藏腑憤潰第五戒者手無犯惡不竊人物貪利入已禍不自覺第六戒者心無愛欲搖動五神傷精喪氣體發迷荒此六戒者身之大患六度生戒者其一者見人窮急度其死厄見世明逹能制凶逆年命長逺世享無極其二者見人窮乏寒飢困急損已布施令人富貴福報萬倍世世歡樂其三者含血之類有急投人能為開度濟其死厄見世康強不遭橫惡其四者施惠鳥獸有生之類割口飼之無所愛惜世世飽滿常在福地其五者度諸蠢動一切衆生咸使成就無有夭傷見世典盛不履衆橫其六者常行慈心愍濟一切放生度死其功甚重令人見世居危得安居疾得康居貧得富舉向從心此六戒者皆以心通智慧能施其德行合自然六通者天為洞視則天明智髙慧洞無窮自上自下四面八方無所不照無所不明雖曰一通智慧而五色總焉天洞自然故無損傷人則法天目中朱童亦有五色之光人不持戒六覺之氣不通人孔竅智慧未開廣視五色則眼童飛揚光精昏翳令人目盲故設是戒以度天人咸使男女得聞法音欲得過度年命長逺當奉是戒勤行勿忘慎勿色視放蕩目神每自制御愛養眼童思真靜念令通智慧洞觀虛空持戒制已則五色歸身五色自歸則無傷損保爾年命可得無窮天尊言地為洞聽智逺慧聞故響應天上下徹四方無所不窮無所不聞雖曰一通智慧而五音總焉地洞自然以生五音朕而不動故無損傷人則象地耳中則有五聲之神人不持戒則智慧不通不可亂聽五音之聲五音使人五神飛揚耳中空廢隆隆悲鳴五神啼泣致令耳聾故説是戒以度天人咸使男女普聞法音欲得長壽當持大戒以制耳神勿為多聽非法之音靜聽妙經神真人章令通智慧洞響太空持戒制己則五音歸身五音自歸則耳無惡聲保爾年命刻得長逺天尊言東為洞空始陽之氣氣出於空智明慧遼故曰洞空洞逺無礙不可得窮始青之氣雖曰一通智慧而五氣總焉空無所納故無損傷人雖有形形亦法空鼻有黃寧辟非之神人未持戒則智慧不通未入智慧不可雜食臭腥之物臭腥之氣使人鼻神壅塞徑源易有斷絶明梁不通故説是戒以度天人咸使男女得聞法音欲度諸苦八難之中當受是戒以制鼻神勿多受臭滌蕩明梁道引生氣通明智慧洞氣入空持戒制已則衆氣歸身衆氣自歸與氣混同長保身命終不毀傷天尊言西為洞虛少隂之氣氣出於虛智微慧朗故曰洞虛虛之無礙洞逺難窮少隂之氣雖曰一通智慧而五味總焉虛無不入虛無不容人雖法虛身不持戒則智慧不通智慧未入則五味為患貪啖脂熏五神不安致有傾危年命不長故説是戒以度天人咸令男女普聞法音欲得長命當持大戒以制五神愼貪五味甘其脂熏滌蕩五臟每令清涼身有智慧則五味和香內則恬夷年命不傷天尊言南為洞清太陽之氣氣出於清智清慧開關而洞清故南有赤帝洞陽之庭冶錬萬物受錬而明也人不持戒則智慧不通智慧未通則心神振動生於愛欲使人迷荒喪神傷命夀不得長故説是戒以度天人咸使男女普聞法音欲得長壽過度諸患當受是戒以制心神除情遣欲乘塵入清通明智慧六覺開津身入洞清與氣自然保爾年命未得長存天尊言北曰洞微微生於玄智逺慧深微而洞真隂察罪福主人生元手法四時上應天關天關恆轉手亦動焉手有大神接生方盈運人四大觀人敗成人不持戒智慧不通則搖動人心衆惡並生手作不覺貪竊自營致有智命不終天年故説是戒以度天人欲得長壽過度惡根當奉是戒以制手神通明智慧心自開明手不貪窮惡根不生應天順氣身入自然保爾年命未得長存升玄經云太清九戒者第一戒曰身不得穢濁不清耽染欲境蒙冒身禍誕縱自恣甘惡為非綺麗華飾所便細滑濡軟自適無有厭足不知動入罪網不能自覺身之罪大不可稱計不得身犯不得教令於人攝意持戒終身奉行是吾太上太上太一第一戒也第二戒曰心不得興惡想惡念不得形想評想貪欲務得蒙冒財利貪毒隂賊謀議非法淫邪偏僻意不平等嫉妒愚癡自是狠戾濁欲叨味無有厭足不知動入罪網不能自覺心過之罪大無有極不自心興不得教令於人攝意持戒終身奉行是吾太上太上太一第二戒也第三戒曰口不得妄言善惡呪詛罵詈欺誑妄語幻惑兩舌關訟告訴持人長短自作是非生災造害興生無端敗衒道法歌誦嗟詠吟嘯歎息貪美恃味無有厭足不知動入罪網不能自覺口過之罪大無有極不得口犯不得教令於人攝意持戒終身奉行是吾太上太上太一第三戒也第四戒曰手不得殺害衆生蚑行蠕動含血之屬皆不得殺劫略強取奪盜偷竊取非其物拾遺取施執持兵器興用非法不知動入罪網不能自覺手過之罪罪之莫大不自手犯不得教令於人攝意持戒終身奉行是吾太上太上太一第四戒也第五戒曰目不得視非道非法非義榮華容飾淫視女色照曜盈目貪欲洋溢綺麗珍寶淫邪妖孽不正之色目為後主收百凶來致禍毒罪釁臻集一皆目致心目口手致殃禍主動為禍端收罪之府不可不迮不可不伏不可不愼不可恣之不知動入罪網不能自覺目過之罪罪之莫大當宣目戒勸化一切一能戒目心想息滅想滅意空空意無著無著入無便得道慧攝意持戒奉行勿廢是吾太上太上太一第五戒也第六戒曰耳不得聽八音五樂淫聲妖孽亂正亡國妖偽之樂無有厭足不知動入罪網不能自覺耳過之罪罪亦復大不自耳犯不得令教於人攝意持戒終身奉行是吾太上太上太一第六戒也第七戒曰鼻不得貪香惡臭妄察善惡不知動入罪網不能自覺鼻過之罪罪亦為次不自鼻犯不得教令於人攝意持戒終身奉行是吾太上太上太一第七戒也第八戒曰足不得蹈不義不踐非法不涉惡履非妖惑境界不知動入罪網不能自覺足過之罪罪亦為次不自足犯不得教令於人攝意持戒終身奉行是吾太上太上太一第八戒也第九戒曰身不得放情任意強興神物攻非其敵精消神散三氣亡逸放情縱恣無有厭足不知動人罪網傾宗滅族不能自覺如斯之罪罪之莫大不自身犯不得教令於人攝意持戒終身奉行是吾太上太上太一第九戒也十戒者有五定志云度十戒法法師居南弟子向師三禮禮畢請曰願見成就授以十戒當終身奉行誓不敢有違於是長跪心存見十方大聖在於上方乃擎拳諦受法師燒香便為説戒一者不殺當念衆生二者不淫妄行邪念三者不盜取非義財四者不欺善惡反論五者不醉常思淨行六者宗親和睦無有非親七者見人善事心助歡喜八者見人有憂助為作福九者彼來加我志在不報十者一切未得道我不有望是為十戒受者並云弟子某甲受終身奉修又禮師都畢要修科儀戒律鈔卷之四
